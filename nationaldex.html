<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NationalDex — Kingdom Platinum</title>
<link rel="icon" type="image/x-icon" href="https://64.media.tumblr.com/c429cb57b048b0ba1d90c6451d7c3aa1/8607b48e6654212e-0d/s540x810/c1f9956cc78935a32f53346f3a7a942caa5d1d67.png">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#1a3a5c;--brand-mid:#2563a8;--brand-light:#e8f0fb;
  --accent:#e8a020;--accent-light:#fdf3dc;
  --bg-list:#808080;--bg-detail:#f0f3f8;
  --surface:#fff;--surface2:#f0f3f8;
  --border:#dde3ee;--border2:#c8d0e0;
  --text:#1a1f2e;--muted:#6b7a99;
  --green:#2a7a2a;
  --r:10px;--font-title:'Cinzel',serif;--font-body:'Nunito',sans-serif;
}
html,body{min-height:100%;font-family:var(--font-body);color:var(--text);background:var(--bg-list)}

/* ════════════════════════════════
   NAV
════════════════════════════════ */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;background:var(--brand);position:sticky;top:0;z-index:9000}
.nav-logo{font-family:var(--font-title);font-size:16px;font-weight:700;color:#fff;letter-spacing:1px;text-decoration:none;cursor:pointer}
.nav-logo span{color:var(--accent)}
.nav-center{display:flex;gap:4px}
.nav-link{font-size:13px;font-weight:600;font-family:var(--font-body);padding:7px 18px;border-radius:20px;border:none;background:transparent;color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;text-decoration:none}
.nav-link:hover{background:rgba(255,255,255,.12);color:#fff}
.nav-link.active{background:rgba(255,255,255,.18);color:#fff}
.nav-btn{font-size:12px;font-weight:700;font-family:var(--font-body);padding:7px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,.5);background:transparent;color:#fff;cursor:pointer;transition:all .2s;text-decoration:none;display:none}
.nav-btn:hover{background:var(--accent);border-color:var(--accent)}
.nav-btn.visible{display:inline-flex}

/* ════════════════════════════════
   VIEWS
════════════════════════════════ */
#view-list{display:block}
#view-detail{display:none}

/* ════════════════════════════════
   ── LIST VIEW ──
════════════════════════════════ */
.list-wrap{max-width:1200px;margin:0 auto;padding:28px 24px}

.dex-title-bar{text-align:center;margin-bottom:22px}
.dex-title{font-family:var(--font-title);font-size:28px;font-weight:700;color:#fff;letter-spacing:2px;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.dex-title span{color:var(--accent-light)}

/* Abas de região */
.region-tabs{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:14px;display:flex;gap:2px;flex-wrap:wrap}
.rtab{flex:1;min-width:74px;padding:9px 4px 7px;border:none;border-radius:7px;background:transparent;font-family:var(--font-body);font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s;letter-spacing:.4px;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:2px}
.rtab:hover{background:var(--surface2);color:var(--brand)}
.rtab.active{background:var(--brand);color:#fff}


/* Barra de busca */
.search-bar{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 18px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sinput-wrap{position:relative;flex:1;min-width:180px}
.sinput-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#search{width:100%;padding:9px 12px 9px 38px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-family:var(--font-body);font-size:13px;color:var(--text);outline:none;transition:border .2s}
#search:focus{border-color:var(--brand-mid)}
#search::placeholder{color:var(--muted)}
.tfilter{padding:9px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);font-family:var(--font-body);font-size:13px;color:var(--text);outline:none;cursor:pointer}
.tfilter:focus{border-color:var(--brand-mid)}
.cpill{background:var(--accent-light);border:1.5px solid #e8c080;border-radius:20px;padding:5px 16px;font-family:var(--font-title);font-size:11px;color:#7a5010;font-weight:700;white-space:nowrap;margin-left:auto}
.vtoggle{display:flex;gap:3px;background:var(--surface2);border-radius:8px;padding:3px}
.vbtn{padding:6px 12px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:14px;transition:all .2s}
.vbtn.active{background:var(--surface);color:var(--brand-mid);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* Grid */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.pk-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 10px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:all .25s;animation:fadeUp .3s both;text-align:center;text-decoration:none;color:inherit}
.pk-card:hover{border-color:var(--brand-mid);transform:translateY(-3px);box-shadow:0 6px 20px rgba(37,99,168,.18)}
.pk-num{font-size:10px;font-weight:700;color:var(--muted);font-family:var(--font-title);letter-spacing:.5px;align-self:flex-end}
.pk-art{width:96px;height:96px;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.12));transition:transform .25s}
.pk-card:hover .pk-art{transform:scale(1.08)}
.pk-name{font-family:var(--font-title);font-size:12px;font-weight:600;color:var(--text);letter-spacing:.3px;line-height:1.3}
.pk-types{display:flex;gap:3px;flex-wrap:wrap;justify-content:center}

/* Lista */
.plist{display:flex;flex-direction:column;gap:6px}
.pl-row{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:10px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;animation:fadeUp .2s both;text-decoration:none;color:inherit}
.pl-row:hover{border-color:var(--brand-mid);transform:translateX(4px);box-shadow:0 3px 12px rgba(37,99,168,.14)}
.pl-num{font-family:var(--font-title);font-size:10px;color:var(--muted);min-width:38px}
.pl-sprite{width:48px;height:48px;object-fit:contain}
.pl-name{font-family:var(--font-title);font-size:12px;color:var(--text);flex:1}
.pl-types{display:flex;gap:4px}

/* ════════════════════════════════
   ── DETAIL VIEW ──
════════════════════════════════ */
#view-detail{background:var(--bg-detail);min-height:100vh}
.detail-wrap{max-width:1000px;margin:0 auto;padding:24px 20px}

.breadcrumb{font-size:11px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.breadcrumb button{background:none;border:none;color:var(--brand-mid);cursor:pointer;font-size:11px;font-family:var(--font-body);padding:0}
.breadcrumb button:hover{text-decoration:underline}
.breadcrumb span{opacity:.5}

/* Card principal */
.main-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.hero{display:grid;grid-template-columns:270px 1fr;min-height:280px}

/* Hero esquerdo */
.hero-left{background:var(--surface2);border-right:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 48px;gap:10px;position:relative}
.hero-dex-num{position:absolute;top:12px;left:14px;font-family:var(--font-title);font-size:13px;font-weight:400;color:var(--muted);letter-spacing:1px}
.hero-art{width:190px;height:190px;object-fit:contain;filter:drop-shadow(0 6px 18px rgba(0,0,0,.14));transition:transform .3s}
.hero-art:hover{transform:scale(1.05)}
.shiny-row{display:flex;align-items:center;gap:8px}
.shiny-thumb{width:42px;height:42px;object-fit:contain;border-radius:50%;border:1.5px solid var(--border);padding:3px;background:var(--surface);cursor:pointer;opacity:.7;transition:all .2s}
.shiny-thumb:hover{opacity:1;border-color:var(--accent)}
.shiny-lbl{font-size:9px;font-family:var(--font-title);color:var(--muted);letter-spacing:.4px}
.nav-arrows{position:absolute;bottom:10px;left:12px;right:12px;display:flex;justify-content:space-between}
.nav-arrow{font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--font-body);letter-spacing:.3px;transition:color .2s;display:flex;flex-direction:column;align-items:flex-start;gap:1px;max-width:120px;padding:4px 6px;border-radius:6px}
.nav-arrow:hover{color:var(--brand-mid);background:var(--border)}
.nav-arrow.right{align-items:flex-end}
.nav-arrow .adir{font-size:13px;line-height:1}
.nav-arrow .aname{font-size:8px;white-space:nowrap;max-width:116px;overflow:hidden;text-overflow:ellipsis}

/* Hero direito */
.hero-right{display:flex;flex-direction:column}
.hero-header{background:var(--brand);padding:14px 18px;text-align:center}
.hero-name{font-family:var(--font-title);font-size:20px;font-weight:700;color:#fff;letter-spacing:1.5px}
.hero-genus{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;font-style:italic}
.hero-types-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center}

/* Tabela de info */
.info-table{flex:1;border-collapse:collapse;width:100%}
.info-table td{padding:7px 11px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.info-table td.lbl{font-family:var(--font-body);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;background:var(--surface2);width:140px}
.info-table tr:last-child td{border-bottom:none}

/* Stats row */
.stats-row{display:flex;border-top:1px solid var(--border)}
.stat-cell{flex:1;padding:8px 10px;text-align:center;border-right:1px solid var(--border);background:var(--surface2)}
.stat-cell:last-child{border-right:none}
.stat-cell-lbl{font-family:var(--font-title);font-size:8px;color:var(--brand-mid);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.stat-cell-val{font-family:var(--font-title);font-size:14px;font-weight:700}

/* Base Stats minimal redesign */
.base-stats-block{padding:14px 20px 10px;display:flex;flex-direction:column;gap:7px}
.base-stat-row{display:grid;grid-template-columns:56px 36px 1fr;align-items:center;gap:10px}
.base-stat-lbl{font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--muted);text-transform:lowercase;text-align:right;letter-spacing:0}
.base-stat-num{font-family:var(--font-body);font-size:12px;font-weight:700;color:var(--text);text-align:right;min-width:28px}
.base-stat-bar-track{height:6px;border-radius:99px;background:var(--border);overflow:hidden}
.base-stat-bar-fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.base-stats-bst{display:flex;justify-content:flex-end;align-items:center;gap:6px;margin-top:4px;padding-top:8px;border-top:1px solid var(--border)}
.base-stats-bst-lbl{font-family:var(--font-body);font-size:12px;color:var(--muted);font-weight:600;text-transform:lowercase}
.base-stats-bst-val{font-family:var(--font-body);font-size:14px;font-weight:700;color:var(--text)}

/* Info flat layout */
.info-flat{display:flex;flex-direction:column;border-top:1px solid var(--border)}
.info-flat-row{padding:7px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);line-height:1.5}
.info-flat-row:last-child{border-bottom:none}
.info-flat-lbl{font-family:var(--font-body);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.info-flat-split{display:flex;gap:0}
.info-flat-split>div{flex:1;padding-right:12px}
.info-flat-split>div+div{border-left:1px solid var(--border);padding-left:12px;padding-right:0}
.info-flat-stats{display:flex;flex-direction:column}
.info-flat-abilities{display:flex;flex-direction:column;padding-bottom:4px}


.ability-entry{padding:3px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center}
.ability-entry:last-child{border-bottom:none}
.ability-idx{font-family:var(--font-title);font-size:10px;color:var(--muted);padding-top:1px;min-width:16px}
.ha-badge{display:inline-block;background:#1a1a1a;color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:3px;margin-right:6px;letter-spacing:.3px;vertical-align:middle}
.ability-name-lbl{font-family:var(--font-body);font-size:12px;font-weight:700;color:var(--brand-mid);letter-spacing:normal}
.ability-name-lbl.ha{color:var(--accent)}
.ability-desc-txt{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5}

/* Seções */
.section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.sec-header{background:var(--brand);padding:8px 18px;text-align:center}
.sec-title{font-family:var(--font-title);font-size:11px;font-weight:600;color:#fff;letter-spacing:1.5px;text-transform:uppercase}
.sec-body{padding:0}

/* Damage taken */
.dmg-row{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid var(--border)}
.dmg-row:last-child{border-bottom:none}
.dmg-mult{font-family:var(--font-title);font-size:11px;min-width:26px;text-align:right;flex-shrink:0}
.dmg-mult.immune{color:#e05050}.dmg-mult.resist{color:var(--green)}.dmg-mult.weak{color:#c03030;font-weight:700}
.dmg-types{display:flex;flex-wrap:wrap;gap:3px}

/* Biology */
.bio-layout{display:flex;gap:20px;align-items:flex-start;padding:16px 20px}
.bio-sprites{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.bio-sprite{width:80px;height:80px;object-fit:contain}
.bio-sprite-lbl{font-size:9px;color:var(--muted);font-family:var(--font-title);letter-spacing:.3px}
.bio-shiny-lbl{font-size:9px;color:var(--accent);font-family:var(--font-title);letter-spacing:.3px}
.bio-text{font-size:13px;color:var(--text);line-height:1.7}
.bio-text strong{color:var(--brand)}

/* Evo chain */
.evo-chain{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;padding:20px}
.evo-node{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:10px;border-radius:8px;background:none;border:none}
.evo-node img{width:68px;height:68px;object-fit:contain;filter:drop-shadow(0 3px 8px rgba(0,0,0,.1));transition:transform .2s}
.evo-node:hover img{transform:scale(1.08)}
.evo-node-name{font-family:var(--font-title);font-size:10px;font-weight:600;color:var(--brand);letter-spacing:.3px;text-align:center}
.evo-node-num{font-size:9px;color:var(--muted);font-family:var(--font-body)}
.evo-arrow{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);padding:0 2px}
.evo-arrow-icon{font-size:15px;line-height:1}
.evo-method{font-size:8.5px;color:var(--muted);text-align:center;max-width:50px;line-height:1.4;font-family:var(--font-title);letter-spacing:.2px;background:var(--surface2);padding:2px 5px;border-radius:4px}

/* Moves */
.ficha-moves-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:20px;overflow:hidden}
.moves-tabs{display:flex;border-bottom:1.5px solid var(--border)}
.moves-tab{flex:1;padding:10px;text-align:center;font-family:var(--font-body);font-size:12px;font-weight:700;color:var(--muted);background:var(--surface2);border:none;cursor:pointer;transition:all .15s;border-right:1px solid var(--border)}
.moves-tab:last-child{border-right:none}
.moves-tab.active{background:var(--surface);color:var(--brand-mid)}
.moves-panel{display:none;padding:0}.moves-panel.active{display:block}
.moves-table{width:100%;border-collapse:collapse;font-size:12px}
.moves-table th{background:var(--surface2);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:8px 12px;text-align:left;border-bottom:1.5px solid var(--border);position:sticky;top:0}
.moves-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.moves-table tr:last-child td{border-bottom:none}
.moves-table tr:hover td{background:var(--surface2)}
.moves-table td.lvl-cell{font-family:var(--font-title);font-weight:700;color:var(--brand-mid);text-align:center;width:60px}
.moves-table td.move-name{font-weight:700}
.moves-table td.num-cell{text-align:center;color:var(--muted);width:70px}
.cat-icon{display:inline-block;font-size:11px;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.cat-fisico{background:#f8d8a0;color:#7a4000}
.cat-especial{background:#d0d8f8;color:#1a2a7a}
.cat-status{background:#e0d8f0;color:#3a1a5a}
.moves-empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}

/* Type icons abaixo da artwork */
.hero-type-icons{display:flex;gap:8px;justify-content:center;margin-top:4px}
.type-icon{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.18));transition:transform .2s}
.type-icon:hover{transform:scale(1.12)}

/* Evo branch */
.evo-branch-wrap{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;width:100%}
.evo-branch-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.evo-branch-row{display:flex;align-items:center;gap:4px}

/* Mega badge */
.mega-badge{position:absolute;top:6px;right:6px;width:22px;height:22px;background:linear-gradient(135deg,#c060ff,#7030d0);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(120,0,200,.4);z-index:2}
.mega-badge svg{width:13px;height:13px;fill:#fff}
.evo-node{position:relative}

/* Alpha Forces label */
.alpha-forces-lbl{font-family:var(--font-title);font-size:9px;color:#00d4c8;letter-spacing:.6px;margin-right:8px;text-transform:uppercase;font-weight:700;text-shadow:0 0 8px rgba(0,212,200,.4)}

/* ════════════════════════════════
   TYPE PILLS (compartilhado)
════════════════════════════════ */
.tpill{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;font-family:var(--font-body)}
.tpill-lg{display:inline-block;font-size:10px;font-weight:800;padding:3px 12px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px;font-family:var(--font-body)}

/* ════════════════════════════════
   LOADER / SPINNER
════════════════════════════════ */
.spinner-wrap{display:flex;flex-direction:column;align-items:center;padding:60px;gap:12px}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.spinner.dark{border-color:var(--border);border-top-color:var(--brand-mid)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{font-family:var(--font-title);font-size:11px;color:rgba(255,255,255,.8);letter-spacing:.4px}
.spinner-text.dark{color:var(--muted)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.moves-table .move-desc-row{display:none}
@media(max-width:720px){
  .hero{grid-template-columns:1fr}
  .hero-left{border-right:none;border-bottom:1.5px solid var(--border);padding-bottom:48px;min-height:220px}
  .hero-art{width:150px;height:150px}
  .bio-layout{flex-direction:column}
  .detail-wrap,.list-wrap{padding:14px 10px}
  .nav{padding:0 14px}
  .rtab{min-width:55px;font-size:9.5px}
  .nav-center{display:none}
}
  .stats-row{flex-wrap:wrap}
  .stat-cell{min-width:calc(100%/3)}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-logo" href="https://kingdomplatinum.vercel.app">
    <img src="https://64.media.tumblr.com/bb526b9df0c7703d60a3e491a3f2ecf6/25947a08ea9632bf-74/s1280x1920/cff7702dac61e7830b197041196e3f7da571140b.pnj" style="height:35px;object-fit:contain;" alt="Kingdom Platinum">
  </a>
  <div class="nav-center">
    <a class="nav-link active" href="#">NationalDex</a>
  </div>
  <button class="nav-btn" id="nav-back-btn" onclick="goList()">← Pokédex</button>
</nav>

<!-- ══════ VIEW: LISTA ══════ -->
<div id="view-list">
  <div class="list-wrap">

    <div class="dex-title-bar">
      <div class="dex-title">National<span>Dex</span></div>
    </div>

    <div class="region-tabs" id="region-tabs">

const STAT_NAMES={hp:'HP',attack:'ATK',defense:'DEF','special-attack':'SP.ATK','special-defense':'SP.DEF',speed:'SPD'};
const STAT_COLORS={hp:'#e05050',attack:'#e07030',defense:'#e0b030','special-attack':'#7070e0','special-defense':'#4aaa6a',speed:'#e04aaa'};
const GR={1:[1,151],2:[152,251],3:[252,386],4:[387,493],5:[494,649],6:[650,721],7:[722,809],8:[810,905],9:[906,1025]};
const TYPE_CHART={normal:{rock:.5,ghost:0,steel:.5},fire:{fire:.5,water:.5,grass:2,ice:2,bug:2,rock:.5,dragon:.5,steel:2},water:{fire:2,water:.5,grass:.5,ground:2,rock:2,dragon:.5},electric:{water:2,electric:.5,grass:.5,ground:0,flying:2,dragon:.5},grass:{fire:.5,water:2,grass:.5,poison:.5,ground:2,flying:.5,bug:.5,rock:2,dragon:.5,steel:.5},ice:{fire:.5,water:.5,grass:2,ice:.5,ground:2,flying:2,dragon:2,steel:.5},fighting:{normal:2,ice:2,poison:.5,flying:.5,psychic:.5,bug:.5,rock:2,ghost:0,dark:2,steel:2,fairy:.5},poison:{grass:2,poison:.5,ground:.5,rock:.5,ghost:.5,steel:0,fairy:2},ground:{fire:2,electric:2,grass:.5,poison:2,flying:0,bug:.5,rock:2,steel:2},flying:{electric:.5,grass:2,fighting:2,bug:2,rock:.5,steel:.5},psychic:{fighting:2,poison:2,psychic:.5,dark:0,steel:.5},bug:{fire:.5,grass:2,fighting:.5,poison:.5,flying:.5,psychic:2,ghost:.5,dark:2,steel:.5,fairy:.5},rock:{fire:2,ice:2,fighting:.5,ground:.5,flying:2,bug:2,steel:.5},ghost:{normal:0,fighting:0,poison:.5,bug:.5,ghost:2,dark:.5},dragon:{dragon:2,steel:.5,fairy:0},dark:{fighting:.5,psychic:2,ghost:2,dark:.5,fairy:.5},steel:{fire:.5,water:.5,electric:.5,ice:2,rock:2,steel:.5,fairy:2},fairy:{fire:.5,fighting:2,poison:.5,dragon:2,dark:2,steel:.5}};

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function pill(t,lg=false){const c=TC[t]||{bg:'#999',c:'#fff'};return `<span class="${lg?'tpill-lg':'tpill'}" style="background:${c.bg};color:${c.c}">${(TL[t]||t).toUpperCase()}</span>`;}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g,' ');}
function titleCase(s){return s.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
function calcDmg(types){
  const m={};for(const t of Object.keys(TYPE_CHART))m[t]=1;
  for(const def of types)for(const[atk,v]of Object.entries(TYPE_CHART))if(TYPE_CHART[atk][def]!==undefined)m[atk]*=TYPE_CHART[atk][def];
  const g={0:[],0.25:[],0.5:[],2:[],4:[]};
  for(const[t,v]of Object.entries(m)){const k=v===0?0:v<=.26?.25:v<=.51?.5:v<=1?null:v<=2?2:4;if(k!==null)g[k].push(t);}
  return g;
}

/* ═══════════════════════════════════════
   ROTEAMENTO via ?pokemon=slug
═══════════════════════════════════════ */
function getParam(){const m=window.location.pathname.match(/\/nationaldex\/(.+)$/);return m?decodeURIComponent(m[1]):null;}

function slugify(str){
  return String(str||'')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // remove acentos
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/^-+|-+$/g,'');
}

function goList(){
  resetTypeTheme();
  history.pushState({},'',(window.location.pathname.replace(/\/nationaldex(\/.*)?$/,'')||'')+'/nationaldex');
  document.getElementById('view-list').style.display='block';
  document.getElementById('view-detail').style.display='none';
  document.getElementById('nav-back-btn').classList.remove('visible');
  document.body.style.background='var(--bg-list)';
  document.title='NationalDex — Kingdom Platinum';
}

function goDetail(slug,urlSlugOverride){
  const base=window.location.pathname.replace(/\/nationaldex(\/.*)?$/,'')||'';
  // urlSlugOverride: texto amigável a exibir na URL (ex: nome do fakemon).
  // Se ausente, usa o próprio slug (caso de Pokémon oficiais, cujo "slug" já é o nome).
  const urlSlug=urlSlugOverride||slug;
  history.pushState({pokemon:slug},'',`${base}/nationaldex/${encodeURIComponent(urlSlug)}`);
  showDetail(slug);
}

function showDetail(slug){
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-detail').style.display='block';
  document.getElementById('nav-back-btn').classList.add('visible');
  loadPokemon(slug);
}

window.addEventListener('popstate',e=>{
  const slug=getParam();
  if(slug) showDetail(slug);
  else{
    document.getElementById('view-list').style.display='block';
    document.getElementById('view-detail').style.display='none';
    document.getElementById('nav-back-btn').classList.remove('visible');
    resetTypeTheme();
    document.title='NationalDex — Kingdom Platinum';
  }
});

/* ═══════════════════════════════════════
   LISTA — carregamento
═══════════════════════════════════════ */
let all=[],filtered=[],typeCache={},listView='grid',curGen=1;
// Pokémon do Nendo (RPG customizados) — carregados do JSON

// PK — PokemonStore (leitura do JSON do GitHub)
const PK = (() => {
  let _data   = [];
  let _loaded = false;
  async function load() {
    if (_loaded) return _data;
    try {
      const r = await fetch('/pokemon.json');
      if (!r.ok) throw new Error();
      _data = await r.json();
      _loaded = true;
    } catch(e) { _data = []; }
    return _data;
  }
  function getAll() { return _data; }
  return { load, getAll };
})();

// Pokémon RPG agrupados por nome (deduplicados dos biomas)
let _rpgPokemon=[]; // todos do JSON (fakemon, regionais, oficiais customizados)

async function loadRpgData(){
  try{
    const all = await PK.load();
    // Deduplica por id — cada entrada no JSON é única
    _rpgPokemon = all;
  }catch{}
}

// Retorna o prefixo de região de um id customizado (A, G, H, P, N) ou null
function idPrefix(id){ const m=String(id).match(/^([AGPHN])\d+$/i); return m?m[1].toUpperCase():null; }

// Gera o slug usado na URL para um Pokémon RPG. Se houver outro Pokémon RPG
// com o mesmo nome (slugificado), desambigua anexando o id (ex: desert-tinyvine-n0719).
function rpgUrlSlug(p){
  const base=slugify(p.name)||String(p.id);
  const colisoes=_rpgPokemon.filter(o=>slugify(o.name)===base);
  if(colisoes.length>1) return `${base}-${slugify(p.id)}`;
  return base;
}

async function initList(){
  // Carrega dados RPG em paralelo com PokeAPI
  const [pokeApiRes] = await Promise.all([
    fetch('https://pokeapi.co/api/v2/pokemon?limit=1025'),
    loadRpgData()
  ]);
  const d=await pokeApiRes.json();
  all=d.results.map((p,i)=>({...p,id:i+1}));
  applyFilters();
}

function renderList(){
  const c=document.getElementById('list-container');
  if(!filtered.length){c.innerHTML=`<div class="spinner-wrap"><div class="spinner-text">Nenhum resultado</div></div>`;return;}
  if(listView==='grid'){
    c.innerHTML=`<div class="pgrid">${filtered.map((p,i)=>gridCard(p,i)).join('')}</div>`;
  } else {
    c.innerHTML=`<div class="plist">${filtered.map((p,i)=>listRow(p,i)).join('')}</div>`;
  }
  batchTypes(filtered.filter(p=>!typeCache[p.id]).map(p=>p.id));
}

function gridCard(p,i){
  if(p._isRpg){
    const tipos=[p.tipo1,p.tipo2].filter(Boolean).map(t=>pill(t)).join('');
    const spriteUrl=p.sprite||'';
    const label=p.name;
    const pref=idPrefix(p.id);
    const regionLabel={'A':'Alola','G':'Galar','H':'Hisui','P':'Paldea','N':'Nendo'}[pref]||'';
    const numLabel=pref?`${regionLabel} #${String(p.id).slice(1).padStart(4,'0')}`:'#'+String(p.id).padStart(4,'0');
    const urlSlug=rpgUrlSlug(p);
    return `<div class="pk-card" style="animation-delay:${Math.min(i,20)*.025}s" onclick="goDetail('__rpg__${encodeURIComponent(p.id)}','${urlSlug}')">
      <div class="pk-num" style="color:var(--brand-mid)">${numLabel}</div>
      ${spriteUrl?`<img class="pk-art" loading="lazy" src="${spriteUrl}" onerror="this.style.opacity='.3'" alt="${label}">`
        :`<div class="pk-art" style="display:flex;align-items:center;justify-content:center;font-size:44px">❓</div>`}
      <div class="pk-name">${label.toUpperCase()}</div>
      <div class="pk-types">${tipos||`<span style="font-size:9px;color:var(--muted)">—</span>`}</div>
    </div>`;
  }
  const th=typeCache[p.id]?typeCache[p.id].map(t=>pill(t)).join(''):`<span style="font-size:9px;color:var(--muted)">…</span>`;
  return `<div class="pk-card" style="animation-delay:${Math.min(i,20)*.025}s" onclick="goDetail('${p.name}')">
    <div class="pk-num">#${String(p.id).padStart(4,'0')}</div>
    <img class="pk-art" loading="lazy"
      src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png"
      onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'" alt="${p.name}">
    <div class="pk-name">${p.name.replace(/-/g,' ').toUpperCase()}</div>
    <div class="pk-types" id="pt-${p.id}">${th}</div>
  </div>`;
}

function listRow(p,i){
  if(p._isRpg){
    const tipos=[p.tipo1,p.tipo2].filter(Boolean).map(t=>pill(t)).join('');
    const label=p.name;
    const pref=idPrefix(p.id);
    const regionLabel={'A':'Alola','G':'Galar','H':'Hisui','P':'Paldea','N':'Nendo'}[pref]||'';
    const numLabel=pref?`${regionLabel} #${String(p.id).slice(1).padStart(4,'0')}`:'#'+String(p.id).padStart(4,'0');
    const urlSlug=rpgUrlSlug(p);
    return `<div class="pl-row" style="animation-delay:${Math.min(i,10)*.018}s" onclick="goDetail('__rpg__${encodeURIComponent(p.id)}','${urlSlug}')">
      <div class="pl-num" style="color:var(--brand-mid)">${numLabel}</div>
      ${p.sprite?`<img class="pl-sprite" loading="lazy" src="${p.sprite}" onerror="this.style.opacity='.3'" alt="${label}">`
        :`<div class="pl-sprite" style="display:flex;align-items:center;justify-content:center;font-size:20px">❓</div>`}
      <div class="pl-name">${label.toUpperCase()}</div>
      <div class="pl-types">${tipos}</div>
    </div>`;
  }
  const th=typeCache[p.id]?typeCache[p.id].map(t=>pill(t)).join(''):'';
  return `<div class="pl-row" style="animation-delay:${Math.min(i,10)*.018}s" onclick="goDetail('${p.name}')">
    <div class="pl-num">#${String(p.id).padStart(4,'0')}</div>
    <img class="pl-sprite" loading="lazy"
      src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png"
      onerror="this.src=''" alt="${p.name}">
    <div class="pl-name">${p.name.replace(/-/g,' ').toUpperCase()}</div>
    <div class="pl-types" id="pt-${p.id}">${th}</div>
  </div>`;
}

function batchTypes(ids){
  const batches=[];for(let i=0;i<ids.length;i+=15)batches.push(ids.slice(i,i+15));
  batches.forEach((b,bi)=>setTimeout(()=>b.forEach(async id=>{
    if(typeCache[id])return;
    try{
      const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
      const d=await r.json();
      typeCache[id]=d.types.map(t=>t.type.name);
      const el=document.getElementById(`pt-${id}`);
      if(el)el.innerHTML=typeCache[id].map(t=>pill(t)).join('');
    }catch{}
  }),bi*350));
}

async function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const tp=document.getElementById('type-filter').value;

  // Aba Nendo: só fakemon Nendo (prefixo N)
  if(curGen==='nendo'){
    if(!_rpgPokemon.length) await loadRpgData();
    let rpgFiltered=_rpgPokemon.filter(p=>{
      if(idPrefix(p.id)!=='N') return false;
      const nm=!q||(p.name||'').toLowerCase().includes(q);
      const tpOk=!tp||p.tipo1===tp||p.tipo2===tp;
      return nm&&tpOk;
    });
    filtered=rpgFiltered.map(p=>({...p, _isRpg:true}));
    document.getElementById('cpill').textContent=`${filtered.length} Pokémon`;
    renderList();
    return;
  }

  // Mapa de gen → prefixo regional incluído na aba
  const GEN_REGIONAL={7:'A', 8:'G', 9:'P'};
  // Hisui não tem gen própria — aparece na aba Sinnoh (4)
  const GEN_REGIONAL_EXTRA={4:'H'};
  const regionalPrefix=GEN_REGIONAL[curGen]||GEN_REGIONAL_EXTRA[curGen]||null;

  // Carrega regionais do Supabase se esta aba tiver prefixo regional
  let regionais=[];
  if(regionalPrefix){
    if(!_rpgPokemon.length) await loadRpgData();
    regionais=_rpgPokemon
      .filter(p=>{
        if(idPrefix(p.id)!==regionalPrefix) return false;
        const nm=!q||(p.name||'').toLowerCase().includes(q);
        const tpOk=!tp||p.tipo1===tp||p.tipo2===tp;
        return nm&&tpOk;
      })
      .map(p=>({...p, _isRpg:true}))
      .sort((a,b)=>parseInt(String(a.id).slice(1))-parseInt(String(b.id).slice(1)));
  }

  // Primeiro filtra por região e nome (sem depender de cache de tipos)
  const byRegion=all.filter(p=>{
    const nm=!q||p.name.includes(q)||String(p.id).includes(q);
    const rng=GR[curGen];
    const gm=!!rng&&p.id>=rng[0]&&p.id<=rng[1];
    return nm&&gm;
  });

  if(!tp){
    // Sem filtro de tipo: exibe tudo da região + regionais do Supabase
    filtered=[...byRegion, ...regionais];
  } else {
    // Com filtro de tipo: inclui quem tem cache e bate o tipo
    const withCache=byRegion.filter(p=>typeCache[p.id]);
    const withoutCache=byRegion.filter(p=>!typeCache[p.id]);
    filtered=[...withCache.filter(p=>typeCache[p.id].includes(tp)), ...regionais];
    if(withoutCache.length){
      batchTypesAndRefilter(withoutCache.map(p=>p.id));
    }
  }

  document.getElementById('cpill').textContent=`${filtered.length} Pokémon`;
  renderList();
}

// Carrega tipos de uma lista de IDs e reaplica filtros ao concluir
function batchTypesAndRefilter(ids){
  const batches=[];for(let i=0;i<ids.length;i+=15)batches.push(ids.slice(i,i+15));
  let pending=batches.length;
  batches.forEach((b,bi)=>setTimeout(()=>{
    Promise.all(b.map(async id=>{
      if(typeCache[id])return;
      try{const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);const d=await r.json();typeCache[id]=d.types.map(t=>t.type.name);}catch{}
    })).then(()=>{
      pending--;
      if(pending===0) applyFilters(); // reaplica quando todos os lotes terminarem
    });
  },bi*350));
}

document.getElementById('search').addEventListener('input',applyFilters);
document.getElementById('type-filter').addEventListener('change',applyFilters);
document.querySelectorAll('.rtab').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const g=btn.dataset.gen;
  curGen=g==='nendo'?'nendo':parseInt(g);
  applyFilters();
}));
function setView(v){listView=v;document.getElementById('btn-grid').classList.toggle('active',v==='grid');document.getElementById('btn-list-btn').classList.toggle('active',v==='list');renderList();}

/* ═══════════════════════════════════════
   DETALHE — carregamento
═══════════════════════════════════════ */
const detailCache={};
let shinyOn=false;

async function loadPokemon(slug){
  window.scrollTo(0,0);
  shinyOn=false;
  document.title='Carregando… — NationalDex';
  const dc=document.getElementById('detail-content');
  dc.innerHTML=`<div class="spinner-wrap"><div class="spinner dark"></div><div class="spinner-text dark">Consultando registros…</div></div>`;

  // Caso 1: navegação interna (clique no card) já manda o id prefixado
  if(slug.startsWith('__rpg__')){
    const pkId=decodeURIComponent(slug.replace('__rpg__',''));
    await loadRpgData();
    const rpgPk=_rpgPokemon.find(p=>String(p.id)===pkId);
    if(rpgPk){renderRpgDetail(rpgPk,dc);}
    else{showNotFound(dc);}
    return;
  }

  // Caso 2: deep-link / reload — a URL só tem o slug amigável (ex: desert-tinyvine
  // ou, em caso de nomes repetidos, desert-tinyvine-n0719). Tenta resolver contra
  // os Pokémon RPG primeiro (slug completo, depois id puro, depois nome simples),
  // e só then cai para a PokeAPI (Pokémon oficiais usam o próprio nome como slug).
  await loadRpgData();
  const slugNorm=slugify(slug);
  // Só considera rpgMatch para fakemon/regionais (ID não-numérico).
  // Pokémon oficiais (ID numérico) sempre usam a PokéAPI para ter a ficha completa.
  const rpgOnly=_rpgPokemon.filter(p=>!/^\d+$/.test(String(p.id)));
  const rpgMatch=
    rpgOnly.find(p=>rpgUrlSlug(p)===slugNorm) ||
    rpgOnly.find(p=>String(p.id).toLowerCase()===slug.toLowerCase()) ||
    rpgOnly.find(p=>slugify(p.name)===slugNorm);
  if(rpgMatch){renderRpgDetail(rpgMatch,dc);return;}

  try{
    if(!detailCache[slug]){
      const[pRes,sRes]=await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${slug}`),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${slug}`)
      ]);
      if(!pRes.ok)throw new Error('not found');
      detailCache[slug]={p:await pRes.json(),s:await sRes.json()};
    }
    const{p,s}=detailCache[slug];
    renderDetail(p,s,dc);
  }catch{
    showNotFound(dc);
  }
}

function showNotFound(dc){
  dc.innerHTML=`<div style="text-align:center;padding:60px">
    <div style="font-size:40px;margin-bottom:12px">⚠️</div>
    <div style="font-family:var(--font-title);font-size:13px;color:var(--muted)">Pokémon não encontrado</div>
    <button onclick="goList()" style="margin-top:16px;font-size:12px;color:var(--brand-mid);background:none;border:none;cursor:pointer;font-family:var(--font-body)">← Voltar à Pokédex</button>
  </div>`;
}

// Renderiza página de detalhe para Pokémon RPG customizado — mesmo layout dos oficiais
async function renderRpgDetail(p, container){
  const tipos=[p.tipo1,p.tipo2].filter(Boolean);
  const primaryType=tipos[0]||'normal';
  applyTypeTheme(primaryType);
  const TT=TYPE_THEME[primaryType]||TYPE_THEME.normal;
  const label=p.name;
  const pref=idPrefix(p.id);
  const regionName={'A':'Alola','G':'Galar','H':'Hisui','P':'Paldea','N':'Nendo'}[pref]||'';
  const baseNum=pref?String(p.id).slice(1).padStart(4,'0'):String(p.id).padStart(4,'0');
  const numDisplay=pref?`${regionName} #${baseNum}`:`#${baseNum}`;
  const originLabel=pref&&pref!=='N'?`Forma Regional de ${regionName}`:'Pokémon Nendo — Kingdom Platinum';
  document.title=`${label} — NationalDex`;

  // ── Stats ──
  const statKeys=['hp','attack','defense','special-attack','special-defense','speed'];
  const statNames={hp:'HP',attack:'ATK',defense:'DEF','special-attack':'SP.ATK','special-defense':'SP.DEF',speed:'SPD'};
  const statFields={hp:p.hp,attack:p.atk,defense:p.def,'special-attack':p.sp_atk,'special-defense':p.sp_def,speed:p.spd};
  const bst=statKeys.reduce((a,k)=>a+(parseInt(statFields[k])||0),0);
  const statsHtml=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:4px">
    ${statKeys.map(k=>`<div style="text-align:center">
      <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">${statNames[k]}</div>
      <div style="font-size:12px;font-weight:700;color:${STAT_COLORS[k]||'var(--brand)'}">${statFields[k]||'—'}</div>
    </div>`).join('')}
    <div style="text-align:center">
      <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">BST</div>
      <div style="font-size:12px;font-weight:700;color:${TT.dark}">${bst||'—'}</div>
    </div>
  </div>`;

  // ── Abilities ──
  const habEntries=[
    p.habilidade1?{name:p.habilidade1,ha:false}:null,
    p.habilidade2?{name:p.habilidade2,ha:false}:null,
    p.habilidade_oculta?{name:p.habilidade_oculta,ha:true}:null
  ].filter(Boolean);
  // fetch descriptions from PokeAPI if available
  const abHtml=await Promise.all(habEntries.map(async(h,i)=>{
    let desc='';
    try{
      const r=await fetch(`https://pokeapi.co/api/v2/ability/${h.name.toLowerCase().replace(/ /g,'-')}`);
      if(r.ok){const d=await r.json();const en=d.effect_entries?.find(e=>e.language.name==='en');desc=en?en.short_effect:'';}
    }catch{}
    // fallback: check localStorage like official
    if(!desc){try{const s=JSON.parse(localStorage.getItem('kdex_abilities_pt'))||{};desc=s[h.name.toLowerCase().replace(/ /g,'-')]||'';}catch{}}
    return `<div class="ability-entry">
      <span class="ability-idx">${h.ha?'':i+1+'.'}</span>
      <div>
        ${h.ha?`<span class="ha-badge">HA</span>`:'' }
        <span class="ability-name-lbl ${h.ha?'ha':''}">${h.name.toUpperCase().replace(/-/g,' ')}</span>
        ${desc?`<div class="ability-desc-txt">: ${desc}</div>`:''}
      </div>
    </div>`;
  }));

  // ── Gender ──
  const genderMap={macho:'100% ♂',femea:'100% ♀',genderless:'Sem gênero','1d2':'Aleatório (♂/♀)'};
  const genderHtml=genderMap[p.genero]||p.genero||'—';

  // ── Egg groups ──
  const eggs=[p.egg_group1,p.egg_group2].filter(Boolean).map(cap).join(', ')||'—';

  // ── Genus / Classification ──
  const genus=p.genus_en||p.genus_pt||'Pokémon';

  // ── Shiny ──
  const hasShiny=!!p.sprite_shiny;
  const shinyHtml=hasShiny?`<div class="shiny-row">
    <img class="shiny-thumb" id="rpg-shiny-thumb" src="${p.sprite_shiny}" onclick="toggleRpgShiny()" title="Ver Shiny" alt="shiny" style="opacity:.7">
    <span class="shiny-lbl">✦ SHINY</span>
  </div>`:'';

  // ── Nav arrows (prev/next within nendo list) ──
  const nendoList=_rpgPokemon.filter(x=>idPrefix(x.id)==='N').sort((a,b)=>parseInt(String(a.id).slice(1))-parseInt(String(b.id).slice(1)));
  const curIdx=nendoList.findIndex(x=>String(x.id)===String(p.id));
  const prevPk=curIdx>0?nendoList[curIdx-1]:null;
  const nextPk=curIdx<nendoList.length-1?nendoList[curIdx+1]:null;
  const prevHtml=prevPk?`<button class="nav-arrow" onclick="goDetail('__rpg__${encodeURIComponent(prevPk.id)}','${rpgUrlSlug(prevPk)}')"><span class="adir">‹</span><span class="aname"><strong>${String(prevPk.id).slice(1).padStart(4,'0')}</strong> ${prevPk.name}</span></button>`:`<span></span>`;
  const nextHtml=nextPk?`<button class="nav-arrow right" onclick="goDetail('__rpg__${encodeURIComponent(nextPk.id)}','${rpgUrlSlug(nextPk)}')"><span class="adir">›</span><span class="aname"><strong>${String(nextPk.id).slice(1).padStart(4,'0')}</strong> ${nextPk.name}</span></button>`:`<span></span>`;

  // ── Damage taken ──
  const dmg=calcDmg(tipos);
  const allTypes=Object.keys(TC);
  const allMults=[{k:0,lbl:'×0'},{k:.25,lbl:'×¼'},{k:.5,lbl:'×½'},{k:2,lbl:'×2'},{k:4,lbl:'×4'}];
  dmg[1]=allTypes.filter(t=>!allMults.some(r=>dmg[r.k]?.includes(t)));
  const dmgHtml=`<div style="padding:10px 14px;display:flex;flex-direction:column;gap:6px">
    ${allMults.filter(r=>dmg[r.k]&&dmg[r.k].length).map(r=>{
      const isImmune=r.k===0;const isResist=r.k>0&&r.k<1;const isWeak=r.k>=2;
      const multColor=isImmune?'#e05050':isResist?'#2a7a2a':isWeak?'#c03030':'#888';
      const multBg=isImmune?'#ffeaea':isResist?'#eaffea':isWeak?'#fff0f0':'#f5f5f5';
      return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0">

  // ── Biology ──
  const bioText=p.bio_pt||p.bio||'';

    <div class="sec-header" style="background:${TT.dark}"><div class="sec-title">Biology</div></div>

  // ── Evo chain (from p.evo array or single) ──
  let evoChainHtml='';

    evoChainHtml=p.evolucoes.map((ev,i)=>{
      const evPk=_rpgPokemon.find(x=>String(x.id)===String(ev.id)||slugify(x.name)===slugify(ev.name||''));
      const sprite=evPk?.sprite||'';

      return `${arrow}<button class="evo-node" onclick="goDetail('__rpg__${encodeURIComponent(evId)}','${evPk?rpgUrlSlug(evPk):slugify(evName)}')" style="${isMe?'opacity:.6;cursor:default':''}">

        <span class="evo-node-name">${evName}</span>
        <span class="evo-node-num">${String(evId).slice(1).padStart(4,'0')}</span>
      </button>`;
    }).join('');
  }

  // ── Moves ──
  const STYLE_COLORS={cool:'#e03030',beauty:'#2080e0',cute:'#e030a0',smart:'#30a030',tough:'#e0a020'};
  const CAT_COLORS_M={physical:'#e07030',special:'#6070e0',status:'#90a090'};
  const moveDataCacheRpg={};
  async function fetchRpgMoveData(name){
    const k=name.toLowerCase().replace(/ /g,'-');
    if(moveDataCacheRpg[k])return moveDataCacheRpg[k];
    // Check local storage translations first
    let ptDesc='';
    try{const s=JSON.parse(localStorage.getItem('kdex_moves_pt'))||{};ptDesc=s[k]||'';}catch{}
    try{
      const r=await fetch(`https://pokeapi.co/api/v2/move/${k}`);
      if(r.ok){
        const d=await r.json();
        const en=d.effect_entries?.find(e=>e.language.name==='en');
        const data={power:d.power||null,type:d.type?.name||null,category:d.damage_class?.name||null,style:d.contest_type?.name||null,desc:(ptDesc||(en?en.short_effect:'')).replace(/\$effect_chance/g,d.effect_chance||'?').replace(/\n/g,' ')};
        moveDataCacheRpg[k]=data;return data;
      }
    }catch{}
    // fallback: use what the pokemon.json provides
    return moveDataCacheRpg[k]={power:null,type:null,category:null,style:null,desc:ptDesc};
  }

  async function rpgMovesTable(moves,showLvl=false){

  // ── Render HTML ──
  container.innerHTML=`

        </div>

      </div>

      <div class="hero-right">
        <div class="hero-header" style="background:${TT.dark}">

        </div>

          </div>

function toggleRpgShiny(){

async function renderDetail(p,s,container){

function toggleShiny(id){
  shinyOn=!shinyOn;
  const a=document.getElementById('main-art');
  if(a)a.src=shinyOn
    ?`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/${id}.png`
    :`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
}

function toggleMoveDesc(el){
  // Suporta tanto <tr> (desktop) quanto <div> (mobile)
  const isDiv=el.tagName==='DIV';
  const descEl=isDiv
    ? el.nextElementSibling  // div.move-desc-row logo após o div clicável
    : el.nextElementSibling; // tr.move-desc-row logo após o tr
  if(!descEl||!descEl.classList.contains('move-desc-row'))return;
  const expanded=descEl.style.display==='none'||!descEl.style.display;
  descEl.style.display=expanded?(isDiv?'block':'table-row'):'none';
  // Rotaciona a seta no mobile
  const arrow=el.querySelector('span[style*="›"]');
  if(arrow)arrow.style.transform=expanded?'rotate(90deg)':'';
}

function switchMovesTab(btn,panelId){
  document.querySelectorAll('.moves-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.moves-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const panel=document.getElementById(panelId);
  if(panel) panel.classList.add('active');
}

function evoMethod(det){
  if(!det)return'';
  const d=det;
  if(d.min_level)return`Lv. ${d.min_level}`;
  if(d.item)return cap(d.item.name);
  if(d.trigger?.name==='trade')return'Trade';
  if(d.min_happiness)return`Friendship`;
  if(d.known_move)return`Know ${cap(d.known_move.name)}`;
  if(d.min_beauty)return`Beauty`;
  if(d.time_of_day)return cap(d.time_of_day);
  if(d.trigger?.name)return cap(d.trigger.name);
  return'';
}

function evoNode(name,id,det,isFirst){
  const method=evoMethod(det);
  const arrow=!isFirst?`<div class="evo-arrow"><span class="evo-arrow-icon">›</span>${method?`<span class="evo-method">${method}</span>`:''}</div>`:'';
  return `${arrow}<button class="evo-node" onclick="goDetail('${name}')">
    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png"
         onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png'" alt="${name}">
    <span class="evo-node-name">${cap(name)}</span>
    <span class="evo-node-num">#${String(id).padStart(3,'0')}</span>
  </button>`;
}

function buildEvo(chain){
  // Flatten full tree respecting branches
  function flatten(node,depth,parentDet,result){
    const name=node.species.name;
    const id=node.species.url.split('/').filter(Boolean).pop();
    const det=node.evolution_details?.[0]||null;
    result.push({name,id,det,depth,parentDet,branches:node.evolves_to.length});
    for(const child of node.evolves_to) flatten(child,depth+1,det,result);
    return result;
  }
  const nodes=flatten(chain,0,null,[]);

  // Build HTML — group by depth columns
  const maxDepth=Math.max(...nodes.map(n=>n.depth));
  let html='';
  // Simple linear chain (no branches)
  const hasBranch=nodes.some(n=>n.branches>1)||nodes.filter(n=>n.depth===1).length>1;
  if(!hasBranch){
    html=nodes.map((n,i)=>evoNode(n.name,n.id,n.det,i===0)).join('');
  } else {
    // Branched: render base, then each branch on its own row
    const base=nodes.find(n=>n.depth===0);
    const mid=nodes.filter(n=>n.depth===1);
    const finals=nodes.filter(n=>n.depth===2);
    html=`<div class="evo-branch-wrap">`;
    // Base
    html+=`<div class="evo-branch-col">${evoNode(base.name,base.id,null,true)}</div>`;
    // Mid + finals
    if(mid.length){
      html+=`<div class="evo-branch-col">`;
      for(const m of mid){
        const mFinals=finals.filter(f=>nodes.find(n=>n.name===f.name&&n.depth===2));
        html+=`<div class="evo-branch-row">${evoNode(m.name,m.id,m.det,false)}`;
        const myFinals=nodes.filter(n=>n.depth===2);// simplified
        if(myFinals.length&&mid.length===1){
          for(const f of myFinals) html+=evoNode(f.name,f.id,f.det,false);
        }
        html+=`</div>`;
      }
      html+=`</div>`;
    } else {
      // Only final evolutions branching from base
      for(const f of finals) html+=evoNode(f.name,f.id,f.det,false);
    }
    html+=`</div>`;
  }

  // Mega evolutions — fetch from pokemon forms
  return html;
}

const MEGA_BADGE_SVG=`<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 1L12.5 7H19L13.5 11L15.5 17L10 13L4.5 17L6.5 11L1 7H7.5L10 1Z"/><circle cx="10" cy="10" r="3" fill="rgba(255,255,255,0.3)"/><text x="10" y="14" text-anchor="middle" font-size="7" font-weight="900" fill="white" font-family="sans-serif">M</text></svg>`;

async function appendMegas(speciesName, container){
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${speciesName}`);
    const s=await r.json();
    const megaVarieties=s.varieties.filter(v=>v.pokemon.name.includes('-mega')||v.pokemon.name.includes('-primal'));
    if(!megaVarieties.length)return;

    const megaData=await Promise.all(megaVarieties.map(async v=>{
      try{
        const pr=await fetch(v.pokemon.url);
        const pd=await pr.json();
        const formId=pd.id;
        const rawName=v.pokemon.name;
        const isMega=rawName.includes('-mega');
        const isPrimal=rawName.includes('-primal');
        let displayName;
        if(isMega){
          const base=rawName.replace(/-mega(-[xy])?$/,'');
          const suffix=rawName.match(/-mega(-[xy])?$/)?.[1]?.replace('-',' ')||'';
          displayName='Mega '+cap(base)+(suffix?' '+suffix.toUpperCase():'');
        } else if(isPrimal){
          const base=rawName.replace(/-primal$/,'');
          displayName='Primal '+cap(base);
        } else {
          displayName=cap(rawName);
        }

        // Fetch stats for inline display
        const megaTypes=pd.types.map(t=>t.type.name);
        const megaBst=pd.stats.reduce((a,b)=>a+b.base_stat,0);
        const STAT_N={hp:'HP',attack:'ATK',defense:'DEF','special-attack':'SP.ATK','special-defense':'SP.DEF',speed:'SPD'};
        const STAT_C={hp:'#e05050',attack:'#e07030',defense:'#e0b030','special-attack':'#7070e0','special-defense':'#4aaa6a',speed:'#e04aaa'};

        // Mega abilities
        let megaAbHtml='';
        for(const a of pd.abilities){
          let desc='';
          try{const ar=await fetch(a.ability.url);const ad=await ar.json();const en=ad.effect_entries.find(e=>e.language.name==='en');desc=en?en.short_effect:'';}catch{}
          megaAbHtml+=`<div style="padding:4px 0;border-bottom:1px solid var(--border)">
            <span style="font-family:var(--font-body);font-size:11px;font-weight:700;color:#7030d0">${a.ability.name.toUpperCase().replace(/-/g,' ')}</span>
            ${desc?`<div style="font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4">${desc}</div>`:''}
          </div>`;
        }

        const statsHtml=pd.stats.map(st=>`<span style="display:inline-flex;flex-direction:column;align-items:center;background:#f5eaff;border:1px solid #c090e080;border-radius:6px;padding:4px 8px;min-width:44px">
          <span style="font-family:var(--font-title);font-size:8px;color:#7030d0;text-transform:uppercase;letter-spacing:.3px">${STAT_N[st.stat.name]||st.stat.name}</span>
          <span style="font-family:var(--font-title);font-size:14px;font-weight:700;color:${STAT_C[st.stat.name]||'#888'}">${st.base_stat}</span>
        </span>`).join('');

        const typeIconsHtml=megaTypes.map(t=>`<img style="width:28px;height:28px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.18))" src="https://raw.githubusercontent.com/partywhale/pokemon-type-icons/main/icons/${t}.svg" alt="${t}">`).join('');

        const nodeHtml=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px;border-radius:8px;cursor:default">
          <div style="position:relative;display:inline-block">
            <img style="width:68px;height:68px;object-fit:contain;filter:drop-shadow(0 3px 8px rgba(0,0,0,.1))"
              src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${formId}.png"
              onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${formId}.png'" alt="${rawName}">
          </div>
          <span style="font-family:var(--font-title);font-size:10px;font-weight:600;color:#5020a0;text-transform:uppercase;letter-spacing:.3px;text-align:center">${displayName}</span>
        </div>`;

        const infoHtml=`
        <div id="mega-info-${rawName}" style="display:none;margin-top:16px;padding:16px;background:#f8f0ff;border:1.5px solid #c090e0;border-radius:10px;animation:fadeUp .3s both">
          <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;min-width:120px">
              <div style="position:relative;display:inline-block">
                <img style="width:110px;height:110px;object-fit:contain;filter:drop-shadow(0 6px 18px rgba(100,0,200,.2))"
                  src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${formId}.png"
                  onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${formId}.png'" alt="${rawName}">
              </div>
              <div style="display:flex;gap:6px">${typeIconsHtml}</div>
            </div>
            <div style="flex:1;min-width:200px">
              <div style="font-family:var(--font-title);font-size:14px;font-weight:700;color:#5020a0;margin-bottom:10px;letter-spacing:.5px">${displayName}</div>
              <div style="margin-bottom:10px">
                <div style="font-family:var(--font-title);font-size:9px;color:#7030d0;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Habilidades</div>
                ${megaAbHtml||'<div style="font-size:11px;color:var(--muted)">—</div>'}
              </div>
              <div>
                <div style="font-family:var(--font-title);font-size:9px;color:#7030d0;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Base Stats</div>
                <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">
                  ${statsHtml}
                  <span style="display:inline-flex;flex-direction:column;align-items:center;background:#5020a0;border-radius:6px;padding:4px 8px;min-width:44px">
                    <span style="font-family:var(--font-title);font-size:8px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.3px">BST</span>
                    <span style="font-family:var(--font-title);font-size:14px;font-weight:700;color:#fff">${megaBst}</span>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>`;

        return {nodeHtml, infoHtml, rawName};
      }catch{return null;}
    }));

    const validMegas=megaData.filter(Boolean);
    if(!validMegas.length)return;
    const wrap=document.getElementById('evo-chain-wrap');
    if(wrap){
      const nodesHtml=validMegas.map((m,i)=>`
        <div onclick="toggleMegaInfo('${m.rawName}')" style="cursor:pointer;border-radius:10px;transition:background .2s" onmouseenter="this.style.background='rgba(100,0,200,.06)'" onmouseleave="this.style.background='transparent'">
          ${m.nodeHtml}
          <div style="font-family:var(--font-title);font-size:8px;color:#00d4c8;text-align:center;letter-spacing:.4px;margin-top:-4px">▼ ver detalhes</div>
        </div>`).join('');
      const infosHtml=validMegas.map(m=>m.infoHtml).join('');
      wrap.insertAdjacentHTML('beforeend',`
        <div style="width:100%;border-top:1px solid var(--border);margin-top:12px;padding-top:12px">
          <div style="display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;margin-bottom:8px">
            <span class="alpha-forces-lbl">⬡ FORÇAS ALFAS</span>
            ${nodesHtml}
          </div>
          ${infosHtml}
        </div>`);
    }
  }catch{}
}

function toggleMegaInfo(rawName){
  const el=document.getElementById(`mega-info-${rawName}`);
  if(!el)return;
  const isHidden=el.style.display==='none';
  // close all others
  document.querySelectorAll('[id^="mega-info-"]').forEach(e=>e.style.display='none');
  el.style.display=isHidden?'block':'none';
}

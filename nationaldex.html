<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NationalDex — Kingdom Platinum</title>
<link rel="icon" type="image/x-icon" href="https://64.media.tumblr.com/c429cb57b048b0ba1d90c6451d7c3aa1/8607b48e6654212e-0d/s540x810/c1f9956cc78935a32f53346f3a7a942caa5d1d67.png">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#1a3a5c;--brand-mid:#2563a8;--brand-light:#e8f0fb;
  --accent:#e8a020;--accent-light:#fdf3dc;
  --bg-list:transparent;--bg-detail:#f0f3f8;
  --surface:#fff;--surface2:#f0f3f8;
  --border:#dde3ee;--border2:#c8d0e0;
  --text:#1a1f2e;--muted:#6b7a99;
  --green:#2a7a2a;
  --r:10px;--font-title:'Cinzel',serif;--font-body:'Nunito',sans-serif;

  /* ── tokens do tema "smartwatch" (mesmo do DataDex) ── */
  --deep:#050c18;--panel:#0c1a2c;--panel2:#0f2138;
  --cyan:#3fe8ff;--cyan-dim:rgba(63,232,255,.35);
  --magenta:#ff3fa0;--magenta-dim:rgba(255,63,160,.3);
  --tline:rgba(63,232,255,.14);
  --ink:#cfe4f5;--ink-dim:#7b93ad;
  --font-mono:'Space Mono',monospace;
}
html,body{min-height:100%;font-family:var(--font-body);color:var(--text);background:transparent}
html{
  background-image:
    radial-gradient(ellipse 900px 500px at 8% -5%, rgba(63,232,255,.10), transparent 60%),
    radial-gradient(ellipse 700px 600px at 100% 30%, rgba(255,63,160,.08), transparent 60%),
    repeating-linear-gradient(0deg, var(--tline) 0 1px, transparent 1px 42px),
    repeating-linear-gradient(90deg, var(--tline) 0 1px, transparent 1px 42px);
  background-color:var(--deep);
  background-attachment:fixed;
}

/* ════════════════════════════════
   NAV
════════════════════════════════ */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;background:var(--brand);position:sticky;top:0;z-index:9000;border-bottom:1px solid rgba(63,232,255,.18);box-shadow:0 1px 24px rgba(0,0,0,.35)}
.nav-logo{font-family:var(--font-title);font-size:16px;font-weight:700;color:#fff;letter-spacing:1px;text-decoration:none;cursor:pointer}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:4px;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
.nav-link{font-size:13px;font-weight:600;font-family:var(--font-body);padding:7px 18px;border-radius:20px;border:none;background:transparent;color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center}
.nav-link:hover{background:rgba(255,255,255,.12);color:#fff}
.nav-link.active{background:rgba(255,255,255,.18);color:#fff}
.nav-link.locked{opacity:.4;cursor:not-allowed;pointer-events:none}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-hamburger{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;width:36px;height:36px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);border-radius:8px;cursor:pointer;padding:0;flex-shrink:0}
.nav-hamburger span{display:block;width:18px;height:2px;background:#fff;border-radius:2px;transition:all .25s}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hamburger.open span:nth-child(2){opacity:0}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.nav-dropdown{display:none;position:absolute;top:58px;left:0;right:0;background:var(--brand);border-bottom:2px solid rgba(63,232,255,.18);z-index:8999;padding:10px 14px 14px;flex-direction:column;gap:4px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.nav-dropdown.open{display:flex}
.nav-dropdown .nav-link{width:100%;text-align:left;border-radius:8px;padding:10px 14px;font-size:13px}
.nav-btn{font-size:12px;font-weight:700;font-family:var(--font-body);padding:7px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,.5);background:transparent;color:#fff;cursor:pointer;transition:all .2s;text-decoration:none;display:none}
.nav-btn:hover{background:var(--accent);border-color:var(--accent)}
.nav-btn.visible{display:inline-flex}

/* ════════════════════════════════
   VIEWS
════════════════════════════════ */
#view-list{display:block}
#view-detail{display:none}

/* ════════════════════════════════
   ── LIST VIEW ──
════════════════════════════════ */
.list-wrap{max-width:1200px;margin:0 auto;padding:28px 24px}

.dex-title-bar{text-align:center;margin-bottom:30px;padding-top:10px}
.hero-eyebrow{
  font-family:var(--font-mono);font-size:11px;color:var(--cyan);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;
  display:inline-flex;align-items:center;gap:8px;
}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:26px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan))}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--cyan),transparent)}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px 2px var(--cyan-dim);animation:pulse-dot 1.8s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.dex-title{font-family:var(--font-title);font-size:36px;font-weight:900;color:#fff;letter-spacing:3px;text-shadow:0 0 18px rgba(63,232,255,.35),0 2px 20px rgba(0,0,0,.4)}
.dex-title span{color:var(--cyan)}
.hero-scan{
  width:min(420px,80%);height:2px;margin:22px auto 0;position:relative;
  background:linear-gradient(90deg,transparent,var(--tline),transparent);
  overflow:hidden;border-radius:2px;
}
.hero-scan::after{
  content:'';position:absolute;top:0;left:-30%;width:30%;height:100%;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  animation:scan 2.6s linear infinite;
}
@keyframes scan{from{left:-30%}to{left:100%}}

/* Abas de região */
.region-tabs{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1.5px solid var(--tline);border-radius:var(--r);padding:4px;margin-bottom:14px;display:flex;gap:2px;flex-wrap:wrap}
.rtab{flex:1;min-width:74px;padding:9px 4px 7px;border:none;border-radius:7px;background:transparent;font-family:var(--font-body);font-size:11px;font-weight:700;color:var(--ink-dim);cursor:pointer;transition:all .18s;letter-spacing:.4px;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:2px}
.rtab:hover{background:rgba(63,232,255,.08);color:var(--cyan)}
.rtab.active{background:rgba(63,232,255,.14);color:var(--cyan);box-shadow:0 0 0 1px var(--cyan-dim) inset}


/* Barra de busca */
.search-bar{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1.5px solid var(--tline);border-radius:var(--r);padding:12px 18px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sinput-wrap{position:relative;flex:1;min-width:180px}
.sinput-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-dim);pointer-events:none}
#search{width:100%;padding:9px 12px 9px 38px;border-radius:20px;border:1.5px solid var(--tline);background:rgba(5,12,24,.5);font-family:var(--font-body);font-size:13px;color:var(--ink);outline:none;transition:border .2s}
#search:focus{border-color:var(--cyan)}
#search::placeholder{color:var(--ink-dim)}
.tfilter{padding:9px 14px;border-radius:8px;border:1.5px solid var(--tline);background:rgba(5,12,24,.5);font-family:var(--font-body);font-size:13px;color:var(--ink);outline:none;cursor:pointer}
.tfilter option{background:var(--panel);color:var(--ink)}
.tfilter:focus{border-color:var(--cyan)}
.cpill{background:rgba(63,232,255,.08);border:1px solid var(--cyan-dim);border-radius:20px;padding:5px 16px;font-family:var(--font-mono);font-size:11px;color:var(--cyan);font-weight:700;white-space:nowrap;margin-left:auto;letter-spacing:.5px}
.vtoggle{display:flex;gap:3px;background:rgba(5,12,24,.5);border-radius:8px;padding:3px}
.vbtn{padding:6px 12px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:var(--ink-dim);font-size:14px;transition:all .2s}
.vbtn.active{background:rgba(63,232,255,.14);color:var(--cyan);box-shadow:0 0 0 1px var(--cyan-dim) inset}

/* Grid */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.pk-card{position:relative;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1.5px solid var(--tline);border-radius:var(--r);padding:14px 10px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:all .25s;animation:fadeUp .3s both;text-align:center;text-decoration:none;color:inherit;overflow:hidden}
.pk-card::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;background:linear-gradient(160deg,var(--cyan-dim),transparent 40%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.pk-card:hover{border-color:var(--cyan);transform:translateY(-3px);box-shadow:0 6px 20px rgba(63,232,255,.16)}
.pk-num{font-size:10px;font-weight:700;color:var(--ink-dim);font-family:var(--font-mono);letter-spacing:.5px;align-self:flex-end}
.pk-art{width:96px;height:96px;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.35));transition:transform .25s}
.pk-card:hover .pk-art{transform:scale(1.08)}
.pk-name{font-family:var(--font-title);font-size:12px;font-weight:600;color:#fff;letter-spacing:.3px;line-height:1.3;min-height:2.6em;display:flex;align-items:center;justify-content:center}
.pk-types{display:flex;gap:3px;flex-wrap:wrap;justify-content:center}

/* Lista */
.plist{display:flex;flex-direction:column;gap:6px}
.pl-row{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1.5px solid var(--tline);border-radius:8px;padding:10px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;animation:fadeUp .2s both;text-decoration:none;color:inherit}
.pl-row:hover{border-color:var(--cyan);transform:translateX(4px);box-shadow:0 3px 12px rgba(63,232,255,.14)}
.pl-num{font-family:var(--font-mono);font-size:10px;color:var(--ink-dim);min-width:38px}
.pl-sprite{width:48px;height:48px;object-fit:contain}
.pl-name{font-family:var(--font-title);font-size:12px;color:#fff;flex:1}
.pl-types{display:flex;gap:4px}

/* ════════════════════════════════
   ── DETAIL VIEW ──
════════════════════════════════ */
#view-detail{
  background-color:var(--bg-detail);min-height:100vh;
  background-image:
    radial-gradient(ellipse 900px 420px at 50% -8%, rgba(63,232,255,.07), transparent 60%),
    repeating-linear-gradient(0deg, rgba(10,20,35,.03) 0 1px, transparent 1px 40px),
    repeating-linear-gradient(90deg, rgba(10,20,35,.03) 0 1px, transparent 1px 40px);
}
.detail-wrap{max-width:1000px;margin:0 auto;padding:24px 20px}

.breadcrumb{font-size:11px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.breadcrumb button{background:none;border:none;color:var(--brand-mid);cursor:pointer;font-size:11px;font-family:var(--font-body);padding:0}
.breadcrumb button:hover{text-decoration:underline}
.breadcrumb span{opacity:.5}

/* Card principal */
.main-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.hero{display:grid;grid-template-columns:270px 1fr;min-height:280px}

/* Hero esquerdo */
.hero-left{background:var(--surface2);border-right:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 48px;gap:10px;position:relative}
.hero-dex-num{position:absolute;top:12px;left:14px;font-family:var(--font-title);font-size:13px;font-weight:400;color:var(--muted);letter-spacing:1px;z-index:2}
.form-switch-wrap{position:absolute;top:8px;left:0;right:0;display:flex;justify-content:center}
.hero-art{width:190px;height:190px;object-fit:contain;filter:drop-shadow(0 6px 18px rgba(0,0,0,.14));transition:transform .3s;margin-top:15px}
.hero-art:hover{transform:scale(1.05)}
.shiny-row{position:absolute;top:10px;right:10px}
.shiny-thumb{width:32px;height:32px;object-fit:contain;border-radius:50%;border:1.5px solid var(--border);padding:3px;background:var(--surface);cursor:pointer;opacity:.55;transition:all .2s;display:block}
.shiny-thumb:hover{opacity:1;border-color:var(--accent);transform:scale(1.12)}
.shiny-thumb.active{opacity:1;border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,160,32,.35)}
.shiny-lbl{display:none}
.nav-arrows{position:absolute;bottom:10px;left:12px;right:12px;display:flex;justify-content:space-between}
.nav-arrow{font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--font-body);letter-spacing:.3px;transition:color .2s;display:flex;flex-direction:column;align-items:flex-start;gap:1px;max-width:120px;padding:4px 6px;border-radius:6px}
.nav-arrow:hover{color:var(--brand-mid);background:var(--border)}
.nav-arrow.right{align-items:flex-end}
.nav-arrow .adir{font-size:13px;line-height:1}
.nav-arrow .aname{font-size:8px;white-space:nowrap;max-width:116px;overflow:hidden;text-overflow:ellipsis}

/* Hero direito */
.hero-right{display:flex;flex-direction:column}
.hero-header{background:var(--brand);padding:14px 18px;text-align:center}
.hero-name{font-family:var(--font-title);font-size:20px;font-weight:700;color:#fff;letter-spacing:1.5px}
.hero-genus{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;font-style:italic}
.hero-types-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center}

/* Tabela de info */
.info-table{flex:1;border-collapse:collapse;width:100%}
.info-table td{padding:7px 11px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.info-table td.lbl{font-family:var(--font-body);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;background:var(--surface2);width:140px}
.info-table tr:last-child td{border-bottom:none}

/* Stats row */
.stats-row{display:flex;border-top:1px solid var(--border)}
.stat-cell{flex:1;padding:8px 10px;text-align:center;border-right:1px solid var(--border);background:var(--surface2)}
.stat-cell:last-child{border-right:none}
.stat-cell-lbl{font-family:var(--font-title);font-size:8px;color:var(--brand-mid);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.stat-cell-val{font-family:var(--font-title);font-size:14px;font-weight:700}

/* Base Stats minimal redesign */
.base-stats-block{padding:14px 20px 10px;display:flex;flex-direction:column;gap:7px}
.base-stat-row{display:grid;grid-template-columns:56px 36px 1fr;align-items:center;gap:10px}
.base-stat-lbl{font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--muted);text-transform:lowercase;text-align:right;letter-spacing:0}
.base-stat-num{font-family:var(--font-body);font-size:12px;font-weight:700;color:var(--text);text-align:right;min-width:28px}
.base-stat-bar-track{height:6px;border-radius:99px;background:var(--border);overflow:hidden}
.base-stat-bar-fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.base-stats-bst{display:flex;justify-content:flex-end;align-items:center;gap:6px;margin-top:4px;padding-top:8px;border-top:1px solid var(--border)}
.base-stats-bst-lbl{font-family:var(--font-body);font-size:12px;color:var(--muted);font-weight:600;text-transform:lowercase}
.base-stats-bst-val{font-family:var(--font-body);font-size:14px;font-weight:700;color:var(--text)}

/* Info flat layout */
.info-flat{display:flex;flex-direction:column;border-top:1px solid var(--border)}
.info-flat-row{padding:7px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);line-height:1.5}
.info-flat-row:last-child{border-bottom:none}
.info-flat-lbl{font-family:var(--font-body);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.info-flat-split{display:flex;gap:0}
.info-flat-split>div{flex:1;padding-right:12px}
.info-flat-split>div+div{border-left:1px solid var(--border);padding-left:12px;padding-right:0}
.info-flat-stats{display:flex;flex-direction:column}
.base-stats-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:4px}
@media(max-width:600px){
  .base-stats-grid{grid-template-columns:repeat(4,1fr);row-gap:8px}
}
@media(max-width:380px){
  .base-stats-grid{grid-template-columns:repeat(3,1fr)}
}
.info-flat-abilities{display:flex;flex-direction:column;padding-bottom:4px}


.ability-entry{padding:6px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:flex-start}
.ability-entry:last-child{border-bottom:none}
.ability-idx{font-family:var(--font-title);font-size:10px;color:var(--muted);margin-right:5px}
.ha-badge{display:inline-block;background:#1a1a1a;color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:3px;margin-right:6px;letter-spacing:.3px;vertical-align:middle}
.ability-name-lbl{font-family:var(--font-body);font-size:12px;font-weight:700;color:var(--brand-mid);letter-spacing:normal}
.ability-name-lbl.ha{color:var(--accent)}
.ability-desc-txt{font-size:11px;color:var(--muted);line-height:1.5}

/* Seções */
.section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.sec-header{background:var(--brand);padding:8px 18px;text-align:center}
.sec-title{font-family:var(--font-title);font-size:11px;font-weight:600;color:#fff;letter-spacing:1.5px;text-transform:uppercase}
.sec-body{padding:0}

/* Damage taken */
.dmg-row{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid var(--border)}
.dmg-row:last-child{border-bottom:none}
.dmg-mult{font-family:var(--font-title);font-size:11px;min-width:26px;text-align:right;flex-shrink:0}
.dmg-mult.immune{color:#e05050}.dmg-mult.resist{color:var(--green)}.dmg-mult.weak{color:#c03030;font-weight:700}
.dmg-types{display:flex;flex-wrap:wrap;gap:3px}

/* Biology */
.bio-layout{display:flex;gap:20px;align-items:flex-start;padding:16px 20px}
.bio-sprites{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.bio-sprite{width:80px;height:80px;object-fit:contain}
.bio-sprite-lbl{font-size:9px;color:var(--muted);font-family:var(--font-title);letter-spacing:.3px}
.bio-shiny-lbl{font-size:9px;color:var(--accent);font-family:var(--font-title);letter-spacing:.3px}
.bio-text{font-size:13px;color:var(--text);line-height:1.7}
.bio-text strong{color:var(--brand)}

/* Evo chain */
.evo-chain{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;padding:20px}
.evo-node{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:10px;border-radius:8px;background:none;border:none}
.evo-node img{width:68px;height:68px;object-fit:contain;filter:drop-shadow(0 3px 8px rgba(0,0,0,.1));transition:transform .2s}
.evo-node:hover img{transform:scale(1.08)}
.evo-node-name{font-family:var(--font-title);font-size:10px;font-weight:600;color:var(--brand);letter-spacing:.3px;text-align:center}
.evo-node-num{font-size:9px;color:var(--muted);font-family:var(--font-body)}
.evo-arrow{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);padding:0 6px}
.evo-arrow-icon{font-size:18px;line-height:1}
.evo-method{font-size:9.5px;font-weight:700;color:#3d4a63;text-align:center;max-width:64px;line-height:1.3;font-family:var(--font-title);letter-spacing:.2px;background:#e2e8f5;border:1px solid var(--border2);padding:3px 6px;border-radius:5px;order:-1}

/* Moves */
.ficha-moves-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:20px;overflow:hidden}
.moves-tabs{display:flex;border-bottom:1.5px solid var(--border)}
.moves-tab{flex:1;padding:10px;text-align:center;font-family:var(--font-body);font-size:12px;font-weight:700;color:var(--muted);background:var(--surface2);border:none;cursor:pointer;transition:all .15s;border-right:1px solid var(--border)}
.moves-tab:last-child{border-right:none}
.moves-tab.active{background:var(--surface);color:var(--brand-mid)}
.moves-panel{display:none;padding:0}.moves-panel.active{display:block}
.moves-table{width:100%;border-collapse:collapse;font-size:12px}
.moves-table th{background:var(--surface2);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:8px 12px;text-align:left;border-bottom:1.5px solid var(--border);position:sticky;top:0}
.moves-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.moves-table tr:last-child td{border-bottom:none}
.moves-table tr:hover td{background:var(--surface2)}
.moves-table td.lvl-cell{font-family:var(--font-title);font-weight:700;color:var(--brand-mid);text-align:center;width:60px}
.moves-table td.move-name{font-weight:700}
.moves-table td.num-cell{text-align:center;color:var(--muted);width:70px}
.cat-icon{display:inline-block;font-size:11px;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.cat-fisico{background:#f8d8a0;color:#7a4000}
.cat-especial{background:#d0d8f8;color:#1a2a7a}
.cat-status{background:#e0d8f0;color:#3a1a5a}
.moves-empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}

/* Type icons abaixo da artwork */
.hero-type-icons{display:flex;gap:8px;justify-content:center;margin-top:4px}
.type-icon{width:29px;height:29px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.18));transition:transform .2s}
.type-icon:hover{transform:scale(1.12)}
.form-switch-row{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.form-switch-btn{display:flex;align-items:center;justify-content:center;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;padding:2px;cursor:pointer;transition:all .15s ease;width:22px;height:22px;box-sizing:border-box}
.form-switch-btn img{width:16px;height:16px;object-fit:contain;pointer-events:none}
.form-switch-btn:hover{border-color:var(--brand-mid);background:var(--border)}
.form-switch-btn.active{border-color:var(--accent);background:rgba(232,160,32,.15);box-shadow:0 0 0 2px rgba(232,160,32,.25)}

/* Evo branch */
.evo-branch-wrap{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;width:100%}
.evo-branch-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.evo-branch-row{display:flex;align-items:center;gap:4px}

/* Mega badge */
.mega-badge{position:absolute;top:6px;right:6px;width:22px;height:22px;background:linear-gradient(135deg,#c060ff,#7030d0);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(120,0,200,.4);z-index:2}
.mega-badge svg{width:13px;height:13px;fill:#fff}
.evo-node{position:relative}

/* Alpha Forces label */
.alpha-forces-lbl{font-family:var(--font-title);font-size:9px;color:#00d4c8;letter-spacing:.6px;margin-right:8px;text-transform:uppercase;font-weight:700;text-shadow:0 0 8px rgba(0,212,200,.4)}

/* ════════════════════════════════
   TYPE PILLS (compartilhado)
════════════════════════════════ */
.tpill{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;font-family:var(--font-body)}
.tpill-lg{display:inline-block;font-size:10px;font-weight:800;padding:3px 12px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px;font-family:var(--font-body)}

/* ════════════════════════════════
   LOADER / SPINNER
════════════════════════════════ */
.spinner-wrap{display:flex;flex-direction:column;align-items:center;padding:60px;gap:12px}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.spinner.dark{border-color:var(--border);border-top-color:var(--text)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{font-family:var(--font-title);font-size:11px;color:rgba(255,255,255,.8);letter-spacing:.4px}
.spinner-text.dark{color:var(--muted)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.moves-table .move-desc-row{display:none}
.moves-table .desc-col{display:none}
.moves-table td.move-name{cursor:pointer}
.moves-table .move-row:hover .move-name{color:var(--brand-mid)}
@media(max-width:768px){
  .hero{grid-template-columns:1fr}
  .hero-left{border-right:none;border-bottom:1.5px solid var(--border);padding-bottom:48px;min-height:220px}
  .hero-art{width:150px;height:150px}
  .bio-layout{flex-direction:column}

  .nav{padding:0 14px}
  .rtab{min-width:55px;font-size:9.5px}
  .nav-links{display:none}
  .nav-hamburger{display:flex}
}
  .stats-row{flex-wrap:wrap}
  .stat-cell{min-width:calc(100%/3)}
}

<script>
/* ═══════════════════════════════════════
   CONSTANTES
═══════════════════════════════════════ */
const TL={normal:'Normal',fire:'Fire',water:'Water',electric:'Electric',grass:'Grass',ice:'Ice',fighting:'Fighting',poison:'Poison',ground:'Ground',flying:'Flying',psychic:'Psychic',bug:'Bug',rock:'Rock',ghost:'Ghost',dragon:'Dragon',dark:'Dark',steel:'Steel',fairy:'Fairy',light:'Light',scent:'Scent'};
const TC={normal:{bg:'#c8c8a0',c:'#4a4a2a'},fire:{bg:'#ff9b4a',c:'#7a2a00'},water:{bg:'#6ab8ff',c:'#003a6a'},electric:{bg:'#ffe030',c:'#5a4a00'},grass:{bg:'#78d878',c:'#1a5a1a'},ice:{bg:'#96d8d8',c:'#1a4a4a'},fighting:{bg:'#c03030',c:'#fff'},poison:{bg:'#a060c0',c:'#fff'},ground:{bg:'#e0c060',c:'#3a2a00'},flying:{bg:'#88aaee',c:'#1a1a5a'},psychic:{bg:'#ff8fb0',c:'#6a0030'},bug:{bg:'#a0c020',c:'#2a3a00'},rock:{bg:'#b8a050',c:'#3a2a00'},ghost:{bg:'#9090c0',c:'#1a1a4a'},dragon:{bg:'#7060f0',c:'#fff'},dark:{bg:'#705040',c:'#fff'},steel:{bg:'#aababb',c:'#2a3a3a'},fairy:{bg:'#ffaad8',c:'#6a0050'},light:{bg:'#fff8c0',c:'#5a4a00'},scent:{bg:'#80c880',c:'#1a3a1a'}};

const TYPE_THEME={
  normal:  {dark:'#6b6b50',mid:'#9a9a78',light:'#f0f0e0',bg:'#f7f7f2',text:'#fff'},
  fire:    {dark:'#b84000',mid:'#e06820',light:'#fff0e0',bg:'#fff5ee',text:'#fff'},
  water:   {dark:'#005a9a',mid:'#2a80c8',light:'#e0f0ff',bg:'#f0f8ff',text:'#fff'},
  electric:{dark:'#7a6000',mid:'#c8a000',light:'#fffbe0',bg:'#fffdf0',text:'#3a3000'},
  grass:   {dark:'#1a5a1a',mid:'#3a8a3a',light:'#e0f5e0',bg:'#f2fbf2',text:'#fff'},
  ice:     {dark:'#1a5a5a',mid:'#3a9090',light:'#e0f8f8',bg:'#f0fbfb',text:'#fff'},
  fighting:{dark:'#7a0000',mid:'#b02020',light:'#ffe0e0',bg:'#fff0f0',text:'#fff'},
  poison:  {dark:'#5a1a7a',mid:'#8040a8',light:'#f5e0ff',bg:'#faf0ff',text:'#fff'},
  ground:  {dark:'#5a3a00',mid:'#a07820',light:'#fff5d0',bg:'#fffaee',text:'#fff'},
  flying:  {dark:'#1a2a6a',mid:'#4a6ab8',light:'#e8eeff',bg:'#f2f5ff',text:'#fff'},
  psychic: {dark:'#6a0030',mid:'#c83060',light:'#ffe8f0',bg:'#fff5f8',text:'#fff'},
  bug:     {dark:'#2a3a00',mid:'#608010',light:'#f0f8d0',bg:'#f7fcea',text:'#fff'},
  rock:    {dark:'#3a2800',mid:'#806830',light:'#f5eed0',bg:'#faf7ee',text:'#fff'},
  ghost:   {dark:'#1a1a4a',mid:'#5858a0',light:'#eeeeff',bg:'#f5f5ff',text:'#fff'},
  dragon:  {dark:'#2a00b0',mid:'#5030d0',light:'#e8e0ff',bg:'#f2eeff',text:'#fff'},
  dark:    {dark:'#1a0f00',mid:'#503828',light:'#e8e0d8',bg:'#f5f0ea',text:'#fff'},
  steel:   {dark:'#2a3a3a',mid:'#6a8888',light:'#e8f0f0',bg:'#f2f7f7',text:'#fff'},
  fairy:   {dark:'#6a0050',mid:'#c060a0',light:'#ffe8f5',bg:'#fff5fb',text:'#fff'},
};

function applyTypeTheme(primaryType){
  const t=TYPE_THEME[primaryType]||TYPE_THEME.normal;
  document.body.style.backgroundColor=t.bg;
  const nav=document.querySelector('.nav');
  if(nav) nav.style.background=t.mid;
  const viewDetail=document.getElementById('view-detail');
  if(viewDetail) viewDetail.style.backgroundColor=t.bg;
}

function resetTypeTheme(){
  document.body.style.backgroundColor='var(--bg-list)';
  const nav=document.querySelector('.nav');
  if(nav) nav.style.background='var(--brand)';
  const viewDetail=document.getElementById('view-detail');
  if(viewDetail) viewDetail.style.backgroundColor='var(--bg-detail)';
}
const STAT_NAMES={hp:'HP',attack:'ATK',defense:'DEF','special-attack':'SP.ATK','special-defense':'SP.DEF',speed:'SPD'};
const STAT_COLORS={hp:'#e05050',attack:'#e07030',defense:'#e0b030','special-attack':'#7070e0','special-defense':'#4aaa6a',speed:'#e04aaa'};
const GR={1:[1,151],2:[152,251],3:[252,386],4:[387,493],5:[494,649],6:[650,721],7:[722,809],8:[810,905],9:[906,1025]};
const TYPE_CHART={normal:{rock:.5,ghost:0,steel:.5,scent:.5},fire:{fire:.5,water:.5,grass:2,ice:2,bug:2,rock:.5,dragon:.5,steel:2,scent:2},water:{fire:2,water:.5,grass:.5,ground:2,rock:2,dragon:.5,light:2,scent:2},electric:{water:2,electric:.5,grass:.5,ground:0,flying:2,dragon:.5,light:.5,scent:.5},grass:{fire:.5,water:2,grass:.5,poison:.5,ground:2,flying:.5,bug:.5,rock:2,dragon:.5,steel:.5,scent:0},ice:{fire:.5,water:.5,grass:2,ice:.5,ground:2,flying:2,dragon:2,steel:.5,light:2,scent:2},fighting:{normal:2,ice:2,poison:.5,flying:.5,psychic:.5,bug:.5,rock:2,ghost:0,dark:2,steel:2,fairy:.5,scent:.5},poison:{grass:2,poison:.5,ground:.5,rock:.5,ghost:.5,steel:0,fairy:2,scent:2},ground:{fire:2,electric:2,grass:.5,poison:2,flying:0,bug:.5,rock:2,steel:2,light:.5,scent:.5},flying:{electric:.5,grass:2,fighting:2,bug:2,rock:.5,steel:.5,light:2,scent:2},psychic:{fighting:2,poison:2,psychic:.5,dark:0,steel:.5,scent:2},bug:{fire:.5,grass:2,fighting:.5,poison:.5,flying:.5,psychic:2,ghost:.5,dark:2,steel:.5,fairy:.5,light:2,scent:2},rock:{fire:2,ice:2,fighting:.5,ground:.5,flying:2,bug:2,steel:.5,light:0,scent:.5},ghost:{normal:0,fighting:0,poison:.5,bug:.5,ghost:2,dark:.5,light:2,scent:0},dragon:{dragon:2,steel:.5,fairy:0,scent:.5},dark:{fighting:.5,psychic:2,ghost:2,dark:.5,fairy:.5,light:2,scent:2},steel:{fire:.5,water:.5,electric:.5,ice:2,rock:2,steel:.5,fairy:2,light:.5,scent:.5},fairy:{fire:.5,fighting:2,poison:.5,dragon:2,dark:2,steel:.5,light:.5,scent:0},light:{light:.5,ghost:0,fire:.5,fairy:.5,poison:.5,bug:.5,dragon:.5,electric:.5,dark:2,rock:2,steel:2,ground:2,normal:2},scent:{}};

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function pill(t,lg=false){const c=TC[t]||{bg:'#999',c:'#fff'};return `<span class="${lg?'tpill-lg':'tpill'}" style="background:${c.bg};color:${c.c}">${(TL[t]||t).toUpperCase()}</span>`;}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g,' ');}
function titleCase(s){return s.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
function moveSlug(s){return String(s||'').trim().toLowerCase().replace(/\s+/g,'-');}

// ── Lista fixa de TMs do sistema ──
// A partir de agora só existem estas 100 TMs no jogo (TM01–TM100). Qualquer
// outro move aprendido via "machine" na PokéAPI, ou qualquer entrada de
// moves_tm de um fakemon que não esteja nesta lista, é ignorado nas fichas.
const TM_MOVE_NAMES=[
"WORK UP","DRAGON CLAW","PSYSHOCK","CALM MIND","TWILIGHT SKIES","TOXIC","HAIL","BULK UP","VENOSHOCK","HIDDEN POWER",
"SUNNY DAY","TAUNT","ICE BEAM","BLIZZARD","HYPER BEAM","LIGHT SCREEN","PROTECT","RAIN DANCE","ROOST","SAFEGUARD",
"FRUSTRATION","SOLAR BEAM","SMACK DOWN","THUNDERBOLT","THUNDER","EARTHQUAKE","RETURN","DRAGON CHEER","PSYCHIC","SHADOW BALL",
"BRICK BREAK","DOUBLE TEAM","REFLECT","SLUDGE WAVE","FLAMETHROWER","SLUDGE BOMB","SANDSTORM","FIRE BLAST","ROCK TOMB","AERIAL ACE",
"TORMENT","FACADE","FLAME CHARGE","REST","ATTRACT","STROBE","LOW SWEEP","ROUND","ECHOED VOICE","OVERHEAT",
"STEEL WING","FOCUS BLAST","ENERGY BALL","FALSE SWIPE","SCALD","FLING","CHARGE BEAM","SKY DROP","BRUTAL SWING","BULLET SEED",
"WILL-O-WISP","ACROBATICS","EMBARGO","EXPLOSION","SHADOW CLAW","PAYBACK","SMART STRIKE","GIGA IMPACT","ROCK POLISH","AURORA VEIL",
"STONE EDGE","VOLT SWITCH","THUNDER WAVE","GYRO BALL","SWORDS DANCE","FLY","PSYCH UP","BULLDOZE","FROST BREATH","ROCK SLIDE",
"X-SCISSOR","DRAGON TAIL","INFESTATION","POISON JAB","DREAM EATER","GRASS KNOT","SWAGGER","SLEEP TALK","U-TURN","SUBSTITUTE",
"FLASH CANNON","TRICK ROOM","WILD CHARGE","SURF","SNARL","NATURE POWER","DARK PULSE","WATERFALL","DAZZLING GLEAM","CONFIDE"
];
const TM_SLUG_TO_NUM={};
TM_MOVE_NAMES.forEach((n,i)=>{ TM_SLUG_TO_NUM[moveSlug(n)]=i+1; });
function tmLabel(name){ const n=TM_SLUG_TO_NUM[moveSlug(name)]; return n?('TM'+String(n).padStart(2,'0')):null; }
// Filtra uma lista de {name,...} pra só as que estão na lista de TMs do
// sistema, e ordena por número de TM.
function restrictToTmList(list){
  return (list||[])
    .filter(m=>TM_SLUG_TO_NUM[moveSlug(m.name)])
    .sort((a,b)=>TM_SLUG_TO_NUM[moveSlug(a.name)]-TM_SLUG_TO_NUM[moveSlug(b.name)]);
}
function calcDmg(types){
  const m={};for(const t of Object.keys(TYPE_CHART))m[t]=1;
  for(const def of types)for(const[atk,v]of Object.entries(TYPE_CHART))if(TYPE_CHART[atk][def]!==undefined)m[atk]*=TYPE_CHART[atk][def];
  const g={0:[],0.25:[],0.5:[],2:[],4:[]};
  for(const[t,v]of Object.entries(m)){const k=v===0?0:v<=.26?.25:v<=.51?.5:v<=1?null:v<=2?2:4;if(k!==null)g[k].push(t);}
  return g;
}

/* ═══════════════════════════════════════
   FORM SWITCH — botões inline (abaixo dos ícones de tipagem) que trocam
   toda a ficha (sprite, nome, tipos, habilidades, stats, damage taken e
   movimentos) pra forma selecionada, sem sair da página. Substitui a
   antiga aba "Formas".
═══════════════════════════════════════ */
window._pkFormsRegistry=window._pkFormsRegistry||{};
function applyPokemonForm(pkKey,idx){
  const reg=window._pkFormsRegistry[pkKey];
  if(reg&&reg.apply) reg.apply(idx);
}

// Lê o moveset de uma forma alternativa — mesma convenção de 4 campos já
// usada no registro principal (moves_level/moves_tm/moves_egg/moves_tutor),
// cada um com itens {move,level?} ou {name,lvl?} (aceita ambos os formatos).
function formAltMoves(f){
  const norm=(arr,withLvl)=>(arr||[]).map(m=>{
    if(!m) return null;
    if(typeof m==='string') return withLvl?{name:m,lvl:0}:{name:m};
    const nm=m.name||m.move;
    if(!nm) return null;
    return withLvl?{name:nm,lvl:m.lvl??m.level??0}:{name:nm};
  }).filter(Boolean);
  const level=norm(f.moves_level,true).sort((a,b)=>a.lvl-b.lvl);
  return {
    level,
    tm:restrictToTmList(norm(f.moves_tm,false)),
    egg:norm(f.moves_egg,false),
    tutor:norm(f.moves_tutor,false)
  };
}

// Monta o bloco "Damage Taken" (usado tanto no primeiro render quanto ao
// trocar de forma) — mesmo layout já usado nas fichas oficiais/RPG.
function buildDmgTakenHtml(types){
  const dmg=calcDmg(types);
  const allMults=[{k:0,lbl:'×0'},{k:0.25,lbl:'×¼'},{k:0.5,lbl:'×½'},{k:1,lbl:'×1'},{k:2,lbl:'×2'},{k:4,lbl:'×4'}];
  const allTypes=Object.keys(TYPE_CHART);
  dmg[1]=allTypes.filter(t=>!(dmg[0].includes(t)||dmg[0.25].includes(t)||dmg[0.5].includes(t)||dmg[2].includes(t)||dmg[4].includes(t)));
  const rows=allMults.filter(r=>dmg[r.k]&&dmg[r.k].length);
  if(!rows.length) return `<div style="font-size:12px;color:var(--muted)">No modifiers</div>`;
  return `<div style="padding:10px 14px;display:flex;flex-direction:column;gap:6px">
    ${rows.map(r=>{

// Monta a lista de habilidades (mesmo estilo usado nas fichas), buscando a

async function buildAbilitiesHtmlSimple(entries){
  if(!entries||!entries.length) return `<div style="font-size:11px;color:var(--muted)">—</div>`;

// Monta o conteúdo (texto + biomas) da seção "Biology" — usado tanto no

function buildBioBodyHtml(bioText,biomas,label,types,genus,TT){

// Encurta o nome de uma forma pro rótulo do botão (remove o nome base
// repetido, ex: "Oricorio (Baila Style)" com base "Oricorio" → "Baila Style").
function formShortLabel(nome,baseName){
  if(!nome) return '';
  let s=String(nome);
  if(baseName){
    const esc=String(baseName).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    s=s.replace(new RegExp('^'+esc+'\\s*','i'),'');
  }
  s=s.replace(/^[\(\-–]\s*/,'').replace(/\)\s*$/,'').trim();
  if(!s) s=nome;
  return s.length>11?s.slice(0,10)+'…':s;
}

// Monta a fileira de botões de forma, exibida logo abaixo dos ícones de

  return `border-color:${TT.mid}${isActive?'':'80'};background:${TT.light}${isActive?`;box-shadow:0 0 0 2px ${TT.mid}66`:''}`;
}

function formSwitchButtonsHtml(forms,activeIdx,pkKey,baseName,TT){
  if(!forms||forms.length<2) return '';
  return `<div class="form-switch-row">
    ${forms.map((f,i)=>{

      ${f.sprite?`<img src="${f.sprite}" alt="${f.nome||''}" onerror="this.style.visibility='hidden'">`:''}

═══════════════════════════════════════ */
function getParam(){const m=window.location.pathname.match(/\/nationaldex\/(.+)$/);return m?decodeURIComponent(m[1]):null;}

function slugify(str){
  return String(str||'')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // remove acentos
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/^-+|-+$/g,'');
}

function goList(){
  resetTypeTheme();
  history.pushState({},'',(window.location.pathname.replace(/\/nationaldex(\/.*)?$/,'')||'')+'/nationaldex');
  document.getElementById('view-list').style.display='block';
  document.getElementById('view-detail').style.display='none';
  document.getElementById('nav-back-btn')?.classList.remove('visible');
  document.body.style.background='var(--bg-list)';
  document.title='NationalDex — Kingdom Platinum';
}

function goDetail(slug,urlSlugOverride){
  const base=window.location.pathname.replace(/\/nationaldex(\/.*)?$/,'')||'';
  // urlSlugOverride: texto amigável a exibir na URL (ex: nome do fakemon).
  // Se ausente, usa o próprio slug (caso de Pokémon oficiais, cujo "slug" já é o nome).
  const urlSlug=urlSlugOverride||slug;
  history.pushState({pokemon:slug},'',`${base}/nationaldex/${encodeURIComponent(urlSlug)}`);
  showDetail(slug);
}

function showDetail(slug){
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-detail').style.display='block';
  document.getElementById('nav-back-btn')?.classList.add('visible');
  loadPokemon(slug);
}

window.addEventListener('popstate',e=>{
  const slug=getParam();
  if(slug) showDetail(slug);
  else{
    document.getElementById('view-list').style.display='block';
    document.getElementById('view-detail').style.display='none';
    document.getElementById('nav-back-btn')?.classList.remove('visible');
    resetTypeTheme();
    document.title='NationalDex — Kingdom Platinum';
  }
});

// PostgREST devolve no máximo 1000 linhas por request — pagina com o
// header Range até vir tudo (mesma lógica usada no admin).
async function sbFetchAllPages(url,headers,pageSize=1000){
  let all=[],from=0;
  while(true){
    const r=await fetch(url,{headers:{...headers,Range:`${from}-${from+pageSize-1}`},cache:'no-store'});
    if(!r.ok&&r.status!==206) throw new Error(await r.text());
    const page=await r.json();
    all=all.concat(page);
    if(page.length<pageSize) break;
    from+=pageSize;
  }
  return all;
}
async function sbSelect(table,eq=null){
  let url=`${SUPA_URL}/rest/v1/${table}?select=*`;
  if(eq) url+=`&${eq.col}=eq.${eq.val}`;
  return await sbFetchAllPages(url,SH_ADM);
}

// Retorna o prefixo de região de um id customizado (A, G, H, P, N) ou null
function idPrefix(id){ const m=String(id).match(/^([AGPHN])\d+$/i); return m?m[1].toUpperCase():null; }

// Slug de região (minúsculo, como usado nos nomes vindos da PokeAPI) por prefixo de id.
const REGION_SLUG_BY_PREFIX={'A':'alola','G':'galar','H':'hisui','P':'paldea'};

// Labels de exibição pra raridade dos biomas (mesmos valores salvos pelo admin em RARIDADE_OPTS,
// só sem as faixas numéricas — aqui é exibição pública, não a tela de edição).
const RARIDADE_LABELS={comum:'Comum',incomum:'Incomum',raro:'Raro',rarissimo:'Raríssimo'};

// Monta a lista "Pode ser encontrado em: Bioma (Raridade), Bioma (Raridade)..." a partir
// da coluna biomas (compartilhada com o datadex_adm). Aceita tanto o formato novo
// (array de {nome,raridade,condicao}) quanto o legado (array de strings).
function biomasEncontradoHtml(biomas){
  if(!biomas||!biomas.length) return '';
  const itens=biomas.map(b=>{
    const nome=typeof b==='string'?b:b.nome;
    const raridade=typeof b==='string'?'comum':(b.raridade||'comum');
    const condicao=typeof b==='string'?null:b.condicao;
    const rarLabel=RARIDADE_LABELS[raridade]||cap(raridade);
    return `<strong>${nome}</strong> (${rarLabel})${condicao?` — <em>${condicao}</em>`:''}`;
  }).join(', ');
  return `<div style="padding:0 20px 16px;margin-top:-4px;font-size:12px;color:var(--text)">
    <strong>Pode ser encontrado em:</strong> ${itens}
  </div>`;
}

// Formata o número exibido nos nós da cadeia evolutiva: letra do prefixo + 4 dígitos
// (ex: id "A0019" → "A0019"; id numérico puro sem prefixo → só os 4 dígitos).
function evoDisplayNum(id){
  const pfx=idPrefix(id);
  return pfx?`${pfx}${String(id).slice(1).padStart(4,'0')}`:String(id).padStart(4,'0');
}

// Formata o nome exibido nos nós da cadeia evolutiva: pra formas regionais, remove
// o sufixo da região do nome (ex: "Rattata Alola" → "Rattata") e antepõe "(A) "
// (ex: "(A) Rattata"). Formas não-regionais (Nendo, oficiais) mantêm o nome puro.
// Se o nome já vier salvo pronto no formato "(A) Rattata" (importações mais
// recentes já salvam assim), devolve como está — evita prefixo duplicado.
function evoDisplayName(entry){
  const nm0=String(entry.name||'').trim();
  if(/^\([AGPH]\)\s/i.test(nm0)) return nm0;
  const pfx=idPrefix(entry.id);
  const regSlug=REGION_SLUG_BY_PREFIX[pfx];
  let nm=titleCase(entry.name);
  if(regSlug){
    nm=nm.replace(new RegExp('\\s*'+regSlug+'\\s*$','i'),'').trim();
    return `(${pfx}) ${nm}`;
  }
  return nm;
}

// Remove o sufixo entre parênteses do nome (ex: "Oricorio (Baila Style)" → "Oricorio"),
// usado em pontos onde o Pokémon tem mais de uma forma alternativa e queremos
// exibir só o nome base.
function stripFormSuffix(name){
  return String(name||'').replace(/\s*\([^)]*\)\s*$/,'').trim();
}


// Gera o slug usado na URL para um Pokémon RPG. Se houver outro Pokémon RPG
// com o mesmo nome (slugificado), desambigua anexando o id (ex: desert-tinyvine-n0719).
function rpgUrlSlug(p){
  return p.url_slug||slugify(p.name)||slugify(String(p.id));
}

function batchTypes(ids){
  const batches=[];for(let i=0;i<ids.length;i+=15)batches.push(ids.slice(i,i+15));
  batches.forEach((b,bi)=>setTimeout(()=>b.forEach(async id=>{
    if(typeCache[id])return;
    try{
      const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
      const d=await r.json();
      typeCache[id]=d.types.map(t=>t.type.name);
      const el=document.getElementById(`pt-${id}`);
      if(el)el.innerHTML=typeCache[id].map(t=>pill(t)).join('');
    }catch{}
  }),bi*350));
}

async function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const tp=document.getElementById('type-filter').value;

  // Aba Nendo: só fakemon Nendo (prefixo N)
  if(curGen==='nendo'){
    if(!_rpgPokemon.length) await loadRpgData();
    let rpgFiltered=_rpgPokemon.filter(p=>{
      if(idPrefix(p.id)!=='N') return false;
      const nm=!q||(p.name||'').toLowerCase().includes(q);
      const tpOk=!tp||p.tipo1===tp||p.tipo2===tp;
      return nm&&tpOk;
    });
    filtered=rpgFiltered.map(p=>({...p, _isRpg:true})).sort((a,b)=>parseInt(String(a.id).slice(1))-parseInt(String(b.id).slice(1)));
    document.getElementById('cpill').textContent=`${filtered.length} Pokémon`;
    renderList();
    return;
  }

  // Mapa de gen → prefixo regional incluído na aba
  const GEN_REGIONAL={7:'A', 8:'G', 9:'P'};
  // Hisui não tem gen própria — aparece na aba Sinnoh (4)
  const GEN_REGIONAL_EXTRA={4:'H'};
  const regionalPrefix=GEN_REGIONAL[curGen]||GEN_REGIONAL_EXTRA[curGen]||null;

  // Carrega regionais do Supabase se esta aba tiver prefixo regional
  let regionais=[];
  if(regionalPrefix){
    if(!_rpgPokemon.length) await loadRpgData();
    regionais=_rpgPokemon
      .filter(p=>{
        if(idPrefix(p.id)!==regionalPrefix) return false;
        const nm=!q||(p.name||'').toLowerCase().includes(q);
        const tpOk=!tp||p.tipo1===tp||p.tipo2===tp;
        return nm&&tpOk;
      })
      .map(p=>({...p, _isRpg:true}))
      .sort((a,b)=>parseInt(String(a.id).slice(1))-parseInt(String(b.id).slice(1)));
  }

  // Primeiro filtra por região e nome (sem depender de cache de tipos)
  const byRegion=all.filter(p=>{
    const nm=!q||(p.name||'').toLowerCase().includes(q)||String(p.id).includes(q);
    const rng=GR[curGen];
    const gm=!!rng&&p.id>=rng[0]&&p.id<=rng[1];
    return nm&&gm;
  });

  if(!tp){
    // Sem filtro de tipo: exibe tudo da região + regionais do Supabase
    filtered=[...byRegion, ...regionais];
  } else {
    // Com filtro de tipo: tipos já vêm do Supabase (tipo1/tipo2), sem PokeAPI
    filtered=[...byRegion.filter(p=>p.tipo1===tp||p.tipo2===tp), ...regionais];
  }

  document.getElementById('cpill').textContent=`${filtered.length} Pokémon`;
  renderList();
}

// Carrega tipos de uma lista de IDs e reaplica filtros ao concluir
function batchTypesAndRefilter(ids){
  const batches=[];for(let i=0;i<ids.length;i+=15)batches.push(ids.slice(i,i+15));
  let pending=batches.length;
  batches.forEach((b,bi)=>setTimeout(()=>{
    Promise.all(b.map(async id=>{
      if(typeCache[id])return;
      try{const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);const d=await r.json();typeCache[id]=d.types.map(t=>t.type.name);}catch{}
    })).then(()=>{
      pending--;
      if(pending===0) applyFilters(); // reaplica quando todos os lotes terminarem
    });
  },bi*350));
}

document.getElementById('search').addEventListener('input',applyFilters);
document.getElementById('type-filter').addEventListener('change',applyFilters);
document.querySelectorAll('.rtab').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const g=btn.dataset.gen;
  curGen=g==='nendo'?'nendo':parseInt(g);
  applyFilters();
}));
function setView(v){listView=v;document.getElementById('btn-grid').classList.toggle('active',v==='grid');document.getElementById('btn-list-btn').classList.toggle('active',v==='list');renderList();}

/* ═══════════════════════════════════════
   DETALHE — carregamento
═══════════════════════════════════════ */
const detailCache={};
let shinyOn=false;

async function loadPokemon(slug){
  window.scrollTo(0,0);
  shinyOn=false;
  document.title='Carregando… — NationalDex';
  const navToken=++_detailNavToken;
  const dc=document.getElementById('detail-content');
  dc.innerHTML=`<div class="spinner-wrap"><div class="spinner dark"></div><div class="spinner-text dark">Consultando registros…</div></div>`;

  // Caso 1: navegação interna (clique no card) já manda o id prefixado
  if(slug.startsWith('__rpg__')){
    const pkId=decodeURIComponent(slug.replace('__rpg__',''));
    await loadRpgData();
    if(navToken!==_detailNavToken)return; // já navegou pra outro Pokémon
    const rpgPk=_rpgPokemon.find(p=>String(p.id)===pkId);
    if(rpgPk){renderRpgDetail(rpgPk,dc,navToken);}
    else{showNotFound(dc);}
    return;
  }

  // Caso 2: deep-link / reload — resolve apenas pelo slug canônico (rpgUrlSlug).
  // URLs com espaços ou caracteres especiais (%20, parênteses etc.) não são suportadas.
  await loadRpgData();
  if(navToken!==_detailNavToken)return; // já navegou pra outro Pokémon
  const slugNorm=slugify(slug);
  // Resolve pelo slug canônico (rpgUrlSlug) contra TODOS os registros do
  // Supabase — oficiais (id numérico), formas regionais e fakemon Nendo.
  // A PokéAPI só é usada mais abaixo como fallback pra quem ainda não foi
  // importado pro Supabase.
  const rpgMatch=_rpgPokemon.find(p=>rpgUrlSlug(p)===slugNorm);
  if(rpgMatch){renderRpgDetail(rpgMatch,dc,navToken);return;}

  try{
    if(!detailCache[slug]){
      const[pRes,sRes]=await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${slug}`),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${slug}`)
      ]);
      if(!pRes.ok)throw new Error('not found');
      detailCache[slug]={p:await pRes.json(),s:await sRes.json()};
    }
    if(navToken!==_detailNavToken)return; // já navegou pra outro Pokémon
    const{p,s}=detailCache[slug];
    renderDetail(p,s,dc,navToken);
  }catch{
    if(navToken===_detailNavToken) showNotFound(dc);
  }
}

function showNotFound(dc){
  dc.innerHTML=`<div style="text-align:center;padding:60px">
    <div style="font-size:40px;margin-bottom:12px">⚠️</div>
    <div style="font-family:var(--font-title);font-size:13px;color:var(--muted)">Pokémon não encontrado</div>
    <button onclick="goList()" style="margin-top:16px;font-size:12px;color:var(--brand-mid);background:none;border:none;cursor:pointer;font-family:var(--font-body)">← Voltar à Pokédex</button>
  </div>`;
}

// Renderiza página de detalhe para Pokémon RPG customizado — mesmo layout dos oficiais
async function renderRpgDetail(p, container, navToken){
  const tipos=[p.tipo1,p.tipo2].filter(Boolean);
  const primaryType=tipos[0]||'normal';
  applyTypeTheme(primaryType);
  const TT=TYPE_THEME[primaryType]||TYPE_THEME.normal;
  // 1. Label: nome legível, com sufixo de região trocado por prefixo "(A) " etc.
  const label=evoDisplayName(p);
  const pref=idPrefix(p.id);
  const regionName={'A':'Alola','G':'Galar','H':'Hisui','P':'Paldea','N':'Nendo'}[pref]||'';
  const baseNum=pref?String(p.id).slice(1).padStart(4,'0'):String(p.id).padStart(4,'0');
  const numDisplay=pref?`#${String(p.id)}`:'#'+String(p.id).padStart(4,'0');
  const originLabel=pref==='N'?'Pokémon Nendo — Kingdom Platinum':pref?`Forma Regional de ${regionName}`:'Pokémon Oficial';
  document.title=`${label} — NationalDex`;

  // ── Dados via PokéAPI para formas regionais (Alola/Galar/Paldea/Hisui) ──
  // Tudo (stats, tipos, habilidades, gênero, egg groups, gênero/classificação,
  // biografia e cadeia evolutiva) é puxado diretamente da PokéAPI, usando o slug
  // "<nome-base>-<regiao>" (ex: "(A) Vulpix" → "vulpix-alola").
  const REGION_SLUG_F={'A':'alola','G':'galar','P':'paldea','H':'hisui'};
  // Ordem das regiões pra encadear a navegação entre elas (segue a ordem de
  // geração usada nas próprias abas do site: Hisui=gen4, Alola=gen7,
  // Galar=gen8, Paldea=gen9).
  const REGION_ORDER=['H','A','G','P'];
  let apiPoke=null, apiSpecies=null, apiEvoChain=null;
  if(REGION_SLUG_F[pref]){
    const baseSlug=slugify(label.replace(/^\([AGPH]\)\s*/i,''));
    const regSlug=REGION_SLUG_F[pref];
    const formSlug=baseSlug.endsWith(`-${regSlug}`)?baseSlug:`${baseSlug}-${regSlug}`;
    try{
      const[fr,sr]=await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${formSlug}`),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${baseSlug}`)
      ]);
      if(fr.ok) apiPoke=await fr.json();
      if(sr.ok) apiSpecies=await sr.json();
      if(apiSpecies?.evolution_chain?.url){
        const er=await fetch(apiSpecies.evolution_chain.url);
        if(er.ok) apiEvoChain=await er.json();
      }
    }catch{}
  }
  // Pokémon oficial "base" (sem prefixo de região, id numérico puro): tipos,
  // stats, habilidades e gênero já vêm certos do banco local, então não
  // buscamos apiPoke/apiSpecies pra esses (evita sobrescrever qualquer ajuste
  // manual feito no admin). Só complementamos ao vivo os 4 campos que hoje
  // não são importados pra Pokémon base: altura, peso, grupo de ovo e
  // classificação (genus) — usados só como fallback quando o banco não tiver.
  let baseFallbackPoke=null, baseFallbackSpecies=null;
  if(!pref && /^\d+$/.test(String(p.id)) && (!p.height||!p.weight||!p.egg_group)){
    try{
      const[fr,sr]=await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${p.id}`),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${p.id}`)
      ]);
      if(fr.ok) baseFallbackPoke=await fr.json();
      if(sr.ok) baseFallbackSpecies=await sr.json();
    }catch{}
  }
  const heightWeightSrc=apiPoke||baseFallbackPoke;
  const classificationSrc=apiSpecies||baseFallbackSpecies;
  // Tipos — sobrescreve com os da PokéAPI quando disponível
  if(apiPoke?.types?.length){
    tipos.length=0;
    apiPoke.types.sort((a,b)=>a.slot-b.slot).forEach(t=>tipos.push(t.type.name));
  }

  // ── Stats ──
  const statKeys=['hp','attack','defense','special-attack','special-defense','speed'];
  const statNames={hp:'HP',attack:'ATK',defense:'DEF','special-attack':'SP.ATK','special-defense':'SP.DEF',speed:'SPD'};
  const statFields=apiPoke?.stats?.length
    ? Object.fromEntries(apiPoke.stats.map(s=>[s.stat.name,s.base_stat]))
    : {hp:p.hp,attack:p.atk,defense:p.def,'special-attack':p.spa,'special-defense':p.spd,speed:p.spe};
  const bst=statKeys.reduce((a,k)=>a+(parseInt(statFields[k])||0),0);
  const statsHtml=`<div class="base-stats-grid">
    ${statKeys.map(k=>`<div style="text-align:center">
      <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">${statNames[k]}</div>
      <div style="font-size:12px;font-weight:700;color:${STAT_COLORS[k]||'var(--brand)'}">${statFields[k]||'—'}</div>
    </div>`).join('')}
    <div style="text-align:center">
      <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">BST</div>
      <div style="font-size:12px;font-weight:700;color:${TT.dark}">${bst||'—'}</div>
    </div>
  </div>`;

  // ── Abilities ──
  const habEntries=apiPoke?.abilities?.length
    ? apiPoke.abilities.sort((a,b)=>a.slot-b.slot).map(a=>({name:a.ability.name,ha:a.is_hidden}))
    : [
        p.habilidade1?{name:p.habilidade1,ha:false}:null,
        p.habilidade2?{name:p.habilidade2,ha:false}:null,
        p.habilidade_oculta?{name:p.habilidade_oculta,ha:true}:null
      ].filter(Boolean);
  // Descrição das habilidades: vem exclusivamente da tabela "abilities" do
  // Supabase (mesma fonte usada pelo admin) — sem consulta à PokéAPI, para
  // que a tradução PT sempre prevaleça, inclusive quando a habilidade
  // também existe oficialmente (ex: "Blaze" num fakemon).
  const regularEntries=habEntries.filter(h=>!h.ha);
  const abHtml=await Promise.all(habEntries.map(async(h)=>{
    let desc='';
    try{desc=(await getAbility(h.name))||'';}catch{}
    const idxNum=h.ha?null:regularEntries.indexOf(h)+1;
    return `<div style="line-height:1.6">
      ${h.ha?`<span class="ha-badge">HA</span>`:`<span class="ability-idx">${idxNum}.</span>`}
      <span class="ability-name-lbl ${h.ha?'ha':''}">${h.name.toUpperCase().replace(/-/g,' ')}</span>${desc?`: <span style="color:var(--text);font-weight:400;font-size:11px">${desc}</span>`:''}
    </div>`;
  }));

  // ── Gender ──
  let genderHtml='—';
  if(apiSpecies){
    const gr=apiSpecies.gender_rate;
    if(gr===-1){
      genderHtml='Sem gênero (⚲)';
    } else {
      const fPct=(gr/8*100).toFixed(0);
      const mPct=(100-(gr/8*100)).toFixed(0);
      genderHtml=`<span style="color:#5588cc;font-weight:700">${mPct}% Male</span>, <span style="color:#cc5588;font-weight:700">${fPct}% Female</span>`;
    }
  } else {
    const genderRaw=(p.genero||'').trim();
    if(!genderRaw||genderRaw==='genderless'||/sem gên/i.test(genderRaw)){
      genderHtml='Sem gênero (⚲)';
    } else if(genderRaw.includes(',')) {
      // Novo formato: "ValorMale,ValorFemale"
      const parts=genderRaw.split(',');
      const m=parseFloat(parts[0])||0;
      const f=parseFloat(parts[1])||0;
      if(m===0&&f===0){
        genderHtml='Sem gênero (⚲)';
      } else {
        genderHtml=`<span style="color:#5588cc;font-weight:700">${m}% Male</span>, <span style="color:#cc5588;font-weight:700">${f}% Female</span>`;
      }
    } else {
      // Legado: texto livre com %
      const mMatch=genderRaw.match(/(\d+(?:\.\d+)?)\s*%\s*(?:macho|male)/i);
      const fMatch=genderRaw.match(/(\d+(?:\.\d+)?)\s*%\s*(?:f[êe]mea|female)/i);
      if(mMatch||fMatch){
        const m=mMatch?parseFloat(mMatch[1]):(fMatch?100-parseFloat(fMatch[1]):50);
        const f=fMatch?parseFloat(fMatch[1]):100-m;
        genderHtml=`<span style="color:#5588cc;font-weight:700">${m}% Male</span>, <span style="color:#cc5588;font-weight:700">${f}% Female</span>`;
      } else {
        genderHtml=genderRaw;
      }
    }
  }

  // ── Egg groups ──
  const eggs=classificationSrc?.egg_groups?.length
    ? classificationSrc.egg_groups.map(e=>cap(e.name)).join(', ')
    : (p.egg_group
        ? String(p.egg_group).split(',').map(s=>s.trim()).filter(Boolean).map(cap).join(', ')
        : ([p.egg_group1,p.egg_group2].filter(Boolean).map(cap).join(', ')||'—'));

  // ── Genus / Classification ──
  const genusFromApi=classificationSrc?.genera?.find(g=>g.language.name==='en')?.genus||'';
  const genusRaw=p.classification||genusFromApi||'';
  const genus=genusRaw?(genusRaw.toLowerCase().endsWith('pokémon')||genusRaw.toLowerCase().endsWith('pokemon')?genusRaw:genusRaw+' Pokémon'):'Pokémon';

  // ── Shiny ──
  const shinySprite=p.sprite_shiny||(!pref?`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/${p.id}.png`:'');
  const hasShiny=!!shinySprite;
  const shinyHtml=hasShiny?`<div class="shiny-row">
    <img class="shiny-thumb" id="rpg-shiny-thumb" src="${shinySprite}" onclick="toggleRpgShiny()" title="✦ Ver Shiny" alt="shiny">
    <span class="shiny-lbl">✦ SHINY</span>
  </div>`:'';

  // ── Nav arrows (prev/next) ──
  // Nendo: navega dentro da lista de fakemon Nendo. Oficiais (id numérico puro):
  // navega pelo id-1/id+1, ambos direto do Supabase (_pkDbMap), sem PokeAPI.
  // As duas listas são encadeadas: do último oficial avança pro primeiro
  // Nendo, e do primeiro Nendo volta pro último oficial.
  function navLabel(id){
    const pf=idPrefix(id);
    return pf?String(id).slice(1).padStart(4,'0'):'#'+String(id).padStart(4,'0');
  }
  function navBtn(target,dir){
    const arrow=dir==='prev'?`<span class="adir">‹</span>`:`<span class="adir">›</span>`;
    const cls=dir==='prev'?'nav-arrow':'nav-arrow right';
    return `<button class="${cls}" onclick="goDetail('__rpg__${encodeURIComponent(target.id)}','${rpgUrlSlug(target)}')">${arrow}<span class="aname"><strong>${navLabel(target.id)}</strong> ${target.name}</span></button>`;
  }
  let prevHtml='<span></span>', nextHtml='<span></span>';
  const officialIds=Object.keys(_pkDbMap).map(Number).sort((a,b)=>a-b);
  const nendoList=_rpgPokemon.filter(x=>idPrefix(x.id)==='N').sort((a,b)=>parseInt(String(a.id).slice(1))-parseInt(String(b.id).slice(1)));
  if(pref==='N'){
    const curIdx=nendoList.findIndex(x=>String(x.id)===String(p.id));
    let prevPk=curIdx>0?nendoList[curIdx-1]:null;
    const nextPk=curIdx<nendoList.length-1?nendoList[curIdx+1]:null;
    // Primeiro Nendo → volta pro último oficial
    if(!prevPk&&officialIds.length) prevPk=_pkDbMap[String(officialIds[officialIds.length-1])];
    if(prevPk) prevHtml=navBtn(prevPk,'prev');
    if(nextPk) nextHtml=navBtn(nextPk,'next');
  } else if(!pref){
    const idNum=parseInt(p.id,10);
    const idxInOfficial=officialIds.indexOf(idNum);
    const prevPk=idxInOfficial>0?_pkDbMap[String(officialIds[idxInOfficial-1])]:null;
    let nextPk=(idxInOfficial>=0&&idxInOfficial<officialIds.length-1)?_pkDbMap[String(officialIds[idxInOfficial+1])]:null;
    // Último oficial → avança pro primeiro Nendo
    if(!nextPk&&nendoList.length) nextPk=nendoList[0];
    if(prevPk) prevHtml=navBtn(prevPk,'prev');
    if(nextPk) nextHtml=navBtn(nextPk,'next');
  } else if(REGION_ORDER.includes(pref)){
    // Formas regionais: navega dentro da própria região (ordem por dex number).
    // No primeiro da região, "anterior" pula pro ÚLTIMO POKÉMON NATIVO da
    // região anterior na ordem (ex: saindo do primeiro Alolan, cai no #809,
    // último da Gen 7 — não no último com forma Alolan).
    // No último da região, "próximo" pula pro PRIMEIRO POKÉMON NATIVO da
    // próxima região (ex: saindo do último Alolan, cai no Grookey #810,
    // primeiro nativo de Galar — não no primeiro com forma Galarian).
    const REGION_GEN={'H':4,'A':7,'G':8,'P':9};
    const regionList=(pf=>_rpgPokemon.filter(x=>idPrefix(x.id)===pf).sort((a,b)=>parseInt(String(a.id).slice(1))-parseInt(String(b.id).slice(1))))(pref);
    const curIdx=regionList.findIndex(x=>String(x.id)===String(p.id));
    let prevPk=curIdx>0?regionList[curIdx-1]:null;
    let nextPk=curIdx<regionList.length-1?regionList[curIdx+1]:null;
    const regionIdx=REGION_ORDER.indexOf(pref);
    if(!prevPk){
      for(let ri=regionIdx-1;ri>=0;ri--){
        const range=GR[REGION_GEN[REGION_ORDER[ri]]];
        const cand=range&&_pkDbMap[String(range[1])];
        if(cand){ prevPk=cand; break; }
      }
    }
    if(!nextPk){
      for(let ri=regionIdx+1;ri<REGION_ORDER.length;ri++){
        const range=GR[REGION_GEN[REGION_ORDER[ri]]];
        const cand=range&&_pkDbMap[String(range[0])];
        if(cand){ nextPk=cand; break; }
      }
    }
    if(prevPk) prevHtml=navBtn(prevPk,'prev');
    if(nextPk) nextHtml=navBtn(nextPk,'next');
  }

  // ── Damage taken ──
  const dmg=calcDmg(tipos);
  const allTypes=Object.keys(TC);
  const allMults=[{k:0,lbl:'×0'},{k:.25,lbl:'×¼'},{k:.5,lbl:'×½'},{k:1,lbl:'×1'},{k:2,lbl:'×2'},{k:4,lbl:'×4'}];
  dmg[1]=allTypes.filter(t=>!allMults.filter(r=>r.k!==1).some(r=>dmg[r.k]?.includes(t)));
  const dmgHtml=`<div style="padding:10px 14px;display:flex;flex-direction:column;gap:6px">
    ${allMults.filter(r=>dmg[r.k]&&dmg[r.k].length).map(r=>{
      const isImmune=r.k===0;const isResist=r.k>0&&r.k<1;const isWeak=r.k>=2;
      const multColor=isImmune?'#e05050':isResist?'#2a7a2a':isWeak?'#c03030':'#888';
      const multBg=isImmune?'#ffeaea':isResist?'#eaffea':isWeak?'#fff0f0':'#f5f5f5';
      return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0">
        <span style="font-family:var(--font-title);font-size:12px;font-weight:700;min-width:30px;text-align:center;padding:3px 6px;border-radius:5px;background:${multBg};color:${multColor};border:1px solid ${multColor}40">${r.lbl}</span>
        <div style="display:flex;flex-wrap:wrap;gap:3px">${dmg[r.k].map(t=>pill(t)).join('')}</div>
      </div>`;
    }).join('')}
  </div>`;

  // ── Biology ──
  // Bio e biomas vêm sempre do mesmo registro (p, direto do admin/Supabase).
  // A PokéAPI só é usada como fallback pro texto quando o admin ainda não
  // preencheu um bio próprio pra essa forma regional.
  let bioText=p.bio||'';
  if(!bioText&&apiSpecies?.flavor_text_entries?.length){
    const flavor=apiSpecies.flavor_text_entries.find(f=>f.language.name==='pt-BR')
      ||apiSpecies.flavor_text_entries.find(f=>f.language.name==='pt')
      ||apiSpecies.flavor_text_entries.find(f=>f.language.name==='en');
    if(flavor) bioText=flavor.flavor_text.replace(/\f/g,' ').replace(/\n/g,' ');
  }
  const temBiomas=p.biomas&&p.biomas.length;
  const bioBodyInner=buildBioBodyHtml(bioText,p.biomas,label,tipos,genus,TT);
  const bioHtml=`<div class="section" style="border-color:${TT.mid}40${(bioText||temBiomas)?'':';display:none'}" id="rpg-bio-section">
    <div class="sec-header" style="background:${TT.dark}" id="rpg-bio-header"><div class="sec-title">Biology</div></div>
    <div class="sec-body" id="rpg-bio-body">${bioBodyInner}</div>
  </div>`;

  // ── Evo chain ──
  // Prioridade: p.evolucoes (cadeia curada no admin, já com os IDs regionais
  // corretos, ex: A0019→A0020) — é a fonte de verdade quando preenchida.
  // Só cai pra cadeia ao vivo da PokéAPI (buildRegionalEvo/buildEvo) quando
  // o Pokémon ainda não teve a evolução revisada manualmente.
  let evoChainHtml='';
  if(p.evolucoes&&Array.isArray(p.evolucoes)&&p.evolucoes.length){
    // Espera array de objetos: [{id, name, method, from}]
    // "from" (1-based) indica de qual estágio anterior este evolui — permite ramificações
    // (ex: um Pokémon com 2 evoluções diferentes a partir do mesmo estágio base).
    // Sem "from", assume cadeia linear (evolui do estágio imediatamente anterior) — comportamento legado.
    const evos=p.evolucoes;
    const nEv=evos.length;

    function rpgEvoNode(ev,isFirst){
      const rawId=String(ev.id||'').trim();
      // 1. Match direto pelo id como foi salvo (ex: já veio "A0019")
      let evPk=_rpgPokemon.find(x=>String(x.id).toLowerCase()===rawId.toLowerCase());
      // 2. Se o id salvo é só o número da Pokédex nacional (sem prefixo de região,
      //    ex: "19" pro Rattata) e este Pokémon é uma forma regional, monta o id
      //    regional equivalente (ex: pref "A" + "19" → "A0019") e busca por ele.
      if(!evPk && pref && /^\d+$/.test(rawId)){
        const composedId=`${pref}${rawId.padStart(4,'0')}`;
        evPk=_rpgPokemon.find(x=>String(x.id).toLowerCase()===composedId.toLowerCase());
      }
      // 3. Por nome — tenta com e sem o sufixo regional (ex: "rattata" vs "rattata alola")
      if(!evPk){
        const wantSlug=slugify(ev.name||'');
        const regSlug=REGION_SLUG_F[pref];
        evPk=_rpgPokemon.find(x=>{
          const xs=slugify(x.name);
          return xs===wantSlug||(regSlug&&xs===`${wantSlug}-${regSlug}`);
        });
      }
      const sprite=evPk?.sprite||'';
      const evName=evPk?evoDisplayName(evPk):(ev.name?cap(ev.name):'?');
      // Número exibido: sempre a partir do id canônico do registro encontrado
      // (já vem prefixado corretamente); só usa o id cru salvo em evolucoes
      // como último recurso, sem cortar dígito de números sem prefixo.
      const evId=evPk?.id||rawId||'?';
      const evNumLabel=evoDisplayNum(evId);
      const isMe=String(evId)===String(p.id);
      const method=ev.method||ev.trigger||'';
      const arrow=!isFirst?`<div class="evo-arrow"><span class="evo-arrow-icon">›</span>${method?`<span class="evo-method">${method}</span>`:''}</div>`:'';
      return `${arrow}<button class="evo-node" onclick="${isMe?'void(0)':`goDetail('__rpg__${encodeURIComponent(evId)}','${evPk?rpgUrlSlug(evPk):slugify(evName)}')`}" style="${isMe?'cursor:default':''}">
        ${sprite?`<img src="${sprite}" onerror="this.style.opacity='.2'" alt="${evName}">`:`<div style="width:68px;height:68px;display:flex;align-items:center;justify-content:center;font-size:28px">❓</div>`}
        <span class="evo-node-name">${evName}</span>
        <span class="evo-node-num">${evNumLabel}</span>
      </button>`;
    }

    // Resolve o pai de cada estágio: usa "from" (1-based) quando definido,
    // senão assume o estágio anterior (cadeia linear, comportamento legado).
    const parentOf=evos.map((ev,i)=>{
      if(i===0) return null;
      const f=parseInt(ev.from,10);
      return (f&&f>=1&&f<=nEv)?f-1:i-1;
    });
    const childrenOf={};
    parentOf.forEach((par,i)=>{ if(par!==null) (childrenOf[par]=childrenOf[par]||[]).push(i); });
    const hasBranch=Object.values(childrenOf).some(arr=>arr.length>1);

    if(!hasBranch){
      evoChainHtml=evos.map((ev,i)=>rpgEvoNode(ev,i===0)).join('');
    } else {
      const baseIdx=parentOf.findIndex(par=>par===null);
      let html=`<div class="evo-branch-wrap"><div class="evo-branch-col">${rpgEvoNode(evos[baseIdx],true)}</div><div class="evo-branch-col">`;
      const branchStarts=childrenOf[baseIdx]||[];
      for(const startIdx of branchStarts){
        html+=`<div class="evo-branch-row">${rpgEvoNode(evos[startIdx],false)}`;
        let cur=startIdx;
        // Continua a sub-cadeia enquanto houver exatamente 1 filho (ramo linear após a ramificação)
        while((childrenOf[cur]||[]).length===1){
          cur=childrenOf[cur][0];
          html+=rpgEvoNode(evos[cur],false);
        }
        html+=`</div>`;
      }
      html+=`</div></div>`;
      evoChainHtml=html;
    }
  } else if(apiEvoChain?.chain && REGION_SLUG_F[pref]){
    // Forma regional ainda sem evolução curada no admin: tenta casar cada
    // estágio da cadeia oficial com a variante regional equivalente (ex:
    // Rattata → Rattata-Alola). Estágios sem contraparte regional (ex:
    // Pichu, que não tem forma de Alola) caem de volta pra forma normal.
    try{ evoChainHtml=buildRegionalEvo(apiEvoChain.chain, pref, REGION_SLUG_F[pref], p.id); }
    catch{ try{ evoChainHtml=buildEvo(apiEvoChain.chain); }catch{} }
  } else if(apiEvoChain?.chain){
    try{ evoChainHtml=buildEvo(apiEvoChain.chain); }catch{}
  }

  // ── Moves ──
  const STYLE_COLORS={cool:'#e03030',beauty:'#2080e0',beautiful:'#2080e0',cute:'#e030a0',smart:'#30a030',clever:'#30a030',tough:'#e0a020'};
  const CAT_COLORS_M={physical:'#e07030',special:'#6070e0',status:'#90a090'};
  // Descrições PT dos moves: tabela "moves" do banco novo (mesma usada
  // pelo admin), via o cache/loader global loadMoves() já definido acima.

  const moveDataCacheRpg={};
  async function fetchRpgMoveData(name){
    const k=name.toLowerCase().replace(/ /g,'-');
    if(moveDataCacheRpg[k])return moveDataCacheRpg[k];
    // Dados do move vêm exclusivamente da tabela "moves" do Supabase (mesma
    // fonte usada pelo admin) — sem consulta à PokéAPI, mesmo quando o move
    // também existe oficialmente.
    const mv=await loadMoves();
    const db=mv[k]||null;
    const data=db
      ?{power:db.power??null,accuracy:db.accuracy??null,type:db.type||null,type2:db.type2||null,category:db.damage_class||null,style:db.contest_style||null,desc:db.descricao||''}
      :{power:null,accuracy:null,type:null,type2:null,category:null,style:null,desc:''};
    moveDataCacheRpg[k]=data;
    return data;
  }

  async function rpgMovesTable(moves,showLvl=false,tmMode=false){
    if(!moves||!moves.length)return`<div class="moves-empty">Nenhum move registrado</div>`;
    const earlyColor=(TC[tipos[0]]||{bg:'var(--brand-mid)'}).bg;

    if(isMobile){
      return`<div style="display:flex;flex-direction:column">

          const catColor=d?.category?CAT_COLORS_M[d.category]||'#888':'#888';
          const catLabel=d?.category?cap(d.category):'—';
          const styleColor=d?.style?STYLE_COLORS[d.style]||'#888':'transparent';

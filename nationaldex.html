                <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
                  ${typePill}
                  <span style="background:${catColor};color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px">${catLabel}</span>
                  ${d?.style?`<span style="background:${styleColor};color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px">${styleLabel}</span>`:''}
                  ${d?.power?`<span style="font-size:10px;font-weight:700;color:var(--muted)">PWR <span style="color:var(--text);font-family:var(--font-title)">${d.power}</span></span>`:''}${d?.accuracy!=null?`<span style="font-size:10px;font-weight:700;color:var(--muted)">ACC <span style="color:var(--text);font-family:var(--font-title)">${d.accuracy}%</span></span>`:''}
                </div>
              </div>
              <span style="font-size:16px;color:var(--muted);line-height:1;flex-shrink:0">›</span>
            </div>
            <div class="move-desc-row" style="display:none;padding:10px 14px 12px;background:var(--surface2);font-size:12px;color:var(--muted);line-height:1.6;text-align:justify">${d?.desc||'Sem descrição disponível.'}</div>
          </div>`;
        }).join('')}
      </div>`;
    }
    return`<div><table class="moves-table" style="text-align:center;width:100%">
      <colgroup>
        <col style="width:17%">
        <col style="width:16%">
        <col style="width:16%">
        <col style="width:12%">
        <col style="width:12%">
        <col style="width:17%">
      </colgroup>
      <thead><tr>
        <th style="text-align:center">Nome</th>
        <th style="text-align:center">Tipo</th>
        <th style="text-align:center">Categoria</th>
        <th style="text-align:center">Poder</th>
        <th style="text-align:center">Precisão</th>
        <th style="text-align:center">Estilo</th>
        <th class="desc-col" style="text-align:center">Descrição</th>
      </tr></thead>
      <tbody>${moves.map((m,i)=>{
        const mn=m.name||m;const d=moveDetails[i];
        const typePill=d?.type?`<span style="display:inline-flex;gap:3px;flex-wrap:wrap;justify-content:center">${pill(d.type)}${d.type2?pill(d.type2):''}</span>`:'—';
        const catColor=d?.category?CAT_COLORS_M[d.category]||'#888':'#888';
        const catLabel=d?.category?cap(d.category):'—';
        const styleColor=d?.style?STYLE_COLORS[d.style]||'#888':'transparent';
        const styleLabel=d?.style?cap(d.style):'—';
        const isEarly=showLvl&&(m.lvl===0||m.lvl<=5);
        const nameStyle=isEarly?`font-weight:800;color:${earlyColor}`:'';
        const nameStyleFinal=`text-align:center;white-space:nowrap;font-weight:700;color:var(--text)`;
        return`<tr class="move-row" onclick="toggleMoveDesc(this)" style="cursor:pointer">
          <td class="move-name" style="${nameStyleFinal}">${tmMode&&tmLabel(mn)?`<span style="color:var(--muted);font-weight:800;margin-right:5px">${tmLabel(mn)}</span>`:''}${titleCase(mn)}</td>
          <td style="text-align:center">${typePill}</td>
          <td style="text-align:center"><span style="background:${catColor};color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px">${catLabel}</span></td>
          <td style="text-align:center;font-family:var(--font-title);font-size:12px;font-weight:700">${d?.power??'—'}</td>
          <td style="text-align:center;font-family:var(--font-title);font-size:12px;font-weight:700">${d?.accuracy!=null?d.accuracy+'%':'—'}</td>
          <td style="text-align:center"><span style="background:${styleColor};color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;${!d?.style?'background:var(--surface2);color:var(--muted)':''}">${styleLabel}</span></td>
          <td class="desc-col" style="text-align:left;font-size:11px;color:var(--muted);line-height:1.4">${d?.desc||'—'}</td>
        </tr>${d?.desc?`<tr class="move-desc-row"><td colspan="6" style="padding:8px 16px;font-size:11px;color:var(--muted);line-height:1.5;background:var(--surface2);border-top:none;text-align:justify">${d.desc}</td></tr>`:''}`;
      }).join('')}</tbody></table></div>`;
  }

  // Parse moves from pokemon.json fields
  // Expects p.moves_level = [{name, lvl}], p.moves_egg = [name], p.moves_tutor = [name]
  // OR p.moves = [{name, method, lvl}] with method in 'level-up','egg','tutor'
  let levelMoves=[], tmMoves=[], eggMoves=[], tutorMoves=[];

  // ── Formas regionais (Alola/Galar/Paldea/Hisui) — moveset vem do apiPoke
  // já buscado na PokéAPI acima (mesma chamada usada para stats/tipos/abilidades)
  let regionalMovesLoaded=false;
  if(apiPoke?.moves?.length){
    apiPoke.moves.forEach(mv=>{
      const vgd=mv.version_group_details;
      const lvlUp=vgd.filter(v=>v.move_learn_method.name==='level-up');
      const machine=vgd.some(v=>v.move_learn_method.name==='machine');
      const egg=vgd.some(v=>v.move_learn_method.name==='egg');
      const tutor=vgd.some(v=>v.move_learn_method.name==='tutor');
      if(lvlUp.length){
        const lvl=Math.max(...lvlUp.map(v=>v.level_learned_at));
        levelMoves.push({name:mv.move.name,lvl});
      }
      if(machine) tmMoves.push({name:mv.move.name});
      if(egg) eggMoves.push({name:mv.move.name});
      if(tutor) tutorMoves.push({name:mv.move.name});
    });
    regionalMovesLoaded=true;
  }

  if(!regionalMovesLoaded){
    if(p.moves_level) levelMoves=p.moves_level.map(m=>typeof m==='string'?{name:m,lvl:0}:{name:m.name||m.move||m,lvl:m.lvl||m.level||0});
    if(p.moves_tm) tmMoves=p.moves_tm.map(m=>typeof m==='string'?{name:m}:{name:m.name||m.move||m});
    if(p.moves_egg) eggMoves=p.moves_egg.map(m=>typeof m==='string'?{name:m}:{name:m.name||m.move||m});
    if(p.moves_tutor) tutorMoves=p.moves_tutor.map(m=>typeof m==='string'?{name:m}:{name:m.name||m.move||m});
    // fallback: unified moves array
    if(!levelMoves.length&&!tmMoves.length&&!eggMoves.length&&!tutorMoves.length&&p.moves&&Array.isArray(p.moves)){
      p.moves.forEach(m=>{
        const nm=typeof m==='string'?{name:m,method:'level-up',lvl:0}:m;
        const method=(nm.method||nm.learn_method||'level-up').toLowerCase();
        if(method==='machine') tmMoves.push({name:nm.name});
        else if(method==='egg') eggMoves.push({name:nm.name});
        else if(method==='tutor') tutorMoves.push({name:nm.name});
        else levelMoves.push({name:nm.name,lvl:nm.lvl||nm.level||0});
      });
    }
  }
  levelMoves.sort((a,b)=>a.lvl-b.lvl);
  tmMoves=restrictToTmList(tmMoves);
  // Se o usuário já navegou pra outro Pokémon enquanto os fetches acima
  // (apiPoke/apiSpecies/evolução) rodavam, aborta antes de escrever no DOM.
  if(navToken!==undefined&&navToken!==_detailNavToken)return;

  // Sprite: prioriza o cadastrado no Supabase; oficiais sem sprite próprio
  // caem pro artwork oficial da PokéAPI só como último recurso visual.
  const heroSprite=p.sprite||(!pref?`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png`:'');

  // ── Formas (botões inline abaixo da tipagem) ──
  // forms[0] = forma principal (dados já computados acima); demais vêm de
  // p.formas_alt, cada uma com seu próprio moveset (campo "moves").
  const rpgFormsPkKey=String(p.id);
  const rpgForms=[{
    nome:label, tipo1:tipos[0], tipo2:tipos[1],
    abilityEntries:habEntries,
    sprite:heroSprite, sprite_shiny:shinySprite,
    hp:statFields.hp, attack:statFields.attack, defense:statFields.defense,
    'special-attack':statFields['special-attack'], 'special-defense':statFields['special-defense'], speed:statFields.speed,
    moves:{level:levelMoves, tm:tmMoves, egg:eggMoves, tutor:tutorMoves},
    bio:bioText, biomas:p.biomas||null
  }];
  if(p.formas_alt&&p.formas_alt.length){
    p.formas_alt.forEach(f=>{
      const fMoves=formAltMoves(f);
      rpgForms.push({
        nome:f.nome, tipo1:f.tipo1, tipo2:f.tipo2,
        abilityEntries:f.habilidade?[{name:f.habilidade,ha:false}]:[],
        sprite:f.sprite, sprite_shiny:f.sprite_shiny,
        hp:f.hp, attack:f.atk, defense:f.def,
        'special-attack':f.spa, 'special-defense':f.spd, speed:f.spe,
        moves:fMoves, bio:f.bio||'', biomas:f.biomas||null
      });
    });
  }

  // ── Render HTML ──
  container.innerHTML=`
  <div class="breadcrumb">
    <button onclick="goList()">NationalDex</button>
    <span>›</span>
    <span>${numDisplay} ${(p.formas_alt&&p.formas_alt.length)?stripFormSuffix(label):label}</span>
  </div>

  <div class="main-card" style="border-color:${TT.mid}40" id="rpg-main-card">
    <div class="hero">
      <div class="hero-left" style="background:${TT.light};border-color:${TT.mid}40">
        <div class="hero-dex-num">${numDisplay}</div>
        <div class="form-switch-wrap" id="rpg-form-switch">${formSwitchButtonsHtml(rpgForms,0,rpgFormsPkKey,label,TT)}</div>
        <img class="hero-art" id="rpg-main-art"
          src="${heroSprite}"
          onerror="this.style.opacity='.2'" alt="${label}"
          style="${!heroSprite?'opacity:.15':''}">
        <div class="hero-type-icons" id="rpg-type-icons">
          ${tipos.map(t=>`<img class="type-icon" src="https://raw.githubusercontent.com/partywhale/pokemon-type-icons/main/icons/${t}.svg" alt="${t}" title="${TL[t]||t}">`).join('')}
        </div>
        ${shinyHtml}
        <div class="nav-arrows">${prevHtml}${nextHtml}</div>
      </div>

      <div class="hero-right">
        <div class="hero-header" style="background:${TT.dark}" id="rpg-hero-header">
          <div class="hero-name" id="rpg-hero-name">${label}</div>
        </div>
        <div class="info-flat">
          <div class="info-flat-row"><span class="info-flat-lbl" style="color:${TT.mid}">CLASSIFICATION:</span> ${genus}</div>
          <div class="info-flat-row info-flat-split">
            <div><span class="info-flat-lbl" style="color:${TT.mid}">HEIGHT:</span> ${heightWeightSrc?.height?(heightWeightSrc.height/10)+' m':(p.height?p.height+' m':'—')}</div>
            <div><span class="info-flat-lbl" style="color:${TT.mid}">WEIGHT:</span> ${heightWeightSrc?.weight?(heightWeightSrc.weight/10)+' kg':(p.weight?p.weight+' kg':'—')}</div>
          </div>
          <div class="info-flat-row"><span class="info-flat-lbl" style="color:${TT.mid}">GENDER RATIO:</span> ${genderHtml}</div>
          <div class="info-flat-row"><span class="info-flat-lbl" style="color:${TT.mid}">EGG GROUP(S):</span> ${eggs}</div>
          <div class="info-flat-row info-flat-abilities">
            <div class="info-flat-lbl" style="color:${TT.mid};margin-bottom:6px">ABILITIES:</div>
            <div style="display:flex;flex-direction:column;gap:5px" id="rpg-abilities-list">${abHtml.join('')}</div>
          </div>
          <div class="info-flat-row info-flat-stats">
            <span class="info-flat-lbl" style="color:${TT.mid}">BASE STATS:</span>
            <div id="rpg-stats-grid">${statsHtml}</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="section" style="border-color:${TT.mid}40" id="rpg-dmg-section">
    <div class="sec-header" style="background:${TT.dark}"><div class="sec-title">Damage Taken</div></div>
    <div class="sec-body" id="rpg-dmg-body">${dmgHtml}</div>
  </div>

  ${bioHtml}

  ${evoChainHtml?`<div class="section" style="border-color:${TT.mid}40" id="rpg-evo-section">
    <div class="sec-header" style="background:${TT.dark}" id="rpg-evo-header"><div class="sec-title">Evolutionary Chain</div></div>
    <div class="sec-body"><div class="evo-chain">${evoChainHtml}</div></div>
  </div>`:''}

  ${renderAlfaFormsHtml(p)}

  <div class="ficha-moves-wrap">
    <div class="moves-tabs">
      <button class="moves-tab active" onclick="switchMovesTab(this,'rpg-mv-level')">Moves por Nível</button>
      <button class="moves-tab" onclick="switchMovesTab(this,'rpg-mv-tm')">TM</button>
      <button class="moves-tab" onclick="switchMovesTab(this,'rpg-mv-egg')">Egg Moves</button>
      <button class="moves-tab" onclick="switchMovesTab(this,'rpg-mv-tutor')">Tutor Moves</button>
    </div>
    <div class="moves-panel active" id="rpg-mv-level"><div class="moves-empty">Carregando…</div></div>
    <div class="moves-panel" id="rpg-mv-tm"><div class="moves-empty">Carregando…</div></div>
    <div class="moves-panel" id="rpg-mv-egg"><div class="moves-empty">Carregando…</div></div>
    <div class="moves-panel" id="rpg-mv-tutor"><div class="moves-empty">Carregando…</div></div>
  </div>`;

  // Load moves async
  rpgMovesTable(levelMoves,true).then(html=>{if(navToken!==_detailNavToken)return;const el=document.getElementById('rpg-mv-level');if(el)el.innerHTML=html;});
  rpgMovesTable(tmMoves,false,true).then(html=>{if(navToken!==_detailNavToken)return;const el=document.getElementById('rpg-mv-tm');if(el)el.innerHTML=html;});
  rpgMovesTable(eggMoves,false).then(html=>{if(navToken!==_detailNavToken)return;const el=document.getElementById('rpg-mv-egg');if(el)el.innerHTML=html;});
  rpgMovesTable(tutorMoves,false).then(html=>{if(navToken!==_detailNavToken)return;const el=document.getElementById('rpg-mv-tutor');if(el)el.innerHTML=html;});

  // Store sprite refs for shiny toggle
  window._rpgNormalSprite=heroSprite;
  window._rpgShinySprite=shinySprite||'';
  window._rpgShinyOn=false;

  // ── Troca de forma (botões abaixo da tipagem) ──
  async function applyRpgForm(idx){
    const f=rpgForms[idx];
    if(!f) return;
    const fTypes=[f.tipo1,f.tipo2].filter(Boolean);
    const fPrimary=fTypes[0]||'normal';
    const fTT=TYPE_THEME[fPrimary]||TYPE_THEME.normal;
    applyTypeTheme(fPrimary);

    const mainCardEl=document.getElementById('rpg-main-card');
    if(mainCardEl) mainCardEl.style.borderColor=fTT.mid+'40';
    container.querySelectorAll('.info-flat-lbl').forEach(lbl=>{lbl.style.color=fTT.mid;});
    const evoSectionEl=document.getElementById('rpg-evo-section');
    if(evoSectionEl) evoSectionEl.style.borderColor=fTT.mid+'40';
    const evoHeaderEl=document.getElementById('rpg-evo-header');

    window._rpgShinySprite=f.sprite_shiny||'';

    const nameEl=document.getElementById('rpg-hero-name');
    if(nameEl) nameEl.textContent=f.nome;
    const headerEl=document.getElementById('rpg-hero-header');
    if(headerEl) headerEl.style.background=fTT.dark;

    const abEl=document.getElementById('rpg-abilities-list');
    if(abEl){
      abEl.innerHTML='<div style="font-size:11px;color:var(--muted)">Carregando…</div>';
      buildAbilitiesHtmlSimple(f.abilityEntries).then(html=>{const el=document.getElementById('rpg-abilities-list');if(el)el.innerHTML=html;});
    }

    const statsEl=document.getElementById('rpg-stats-grid');
    if(statsEl) statsEl.innerHTML=buildStatsGridHtml(f,fTT);

    const dmgEl=document.getElementById('rpg-dmg-body');

    const dmgSectionEl=document.getElementById('rpg-dmg-section');
    if(dmgSectionEl) dmgSectionEl.style.borderColor=fTT.mid+'40';
    const dmgHeaderEl=document.querySelector('#rpg-dmg-section .sec-header');
    if(dmgHeaderEl) dmgHeaderEl.style.background=fTT.dark;

    const bioSectionEl=document.getElementById('rpg-bio-section');
    const bioBodyEl=document.getElementById('rpg-bio-body');
    const bioHeaderEl=document.getElementById('rpg-bio-header');
    const hasBio=!!(f.bio||(f.biomas&&f.biomas.length));
    if(bioSectionEl){ bioSectionEl.style.display=hasBio?'':'none'; bioSectionEl.style.borderColor=fTT.mid+'40'; }
    if(bioBodyEl) bioBodyEl.innerHTML=hasBio?buildBioBodyHtml(f.bio,f.biomas,f.nome,fTypes,genus,fTT):'';
    if(bioHeaderEl) bioHeaderEl.style.background=fTT.dark;

    ['rpg-mv-level','rpg-mv-tm','rpg-mv-egg','rpg-mv-tutor'].forEach(elId=>{
      const el=document.getElementById(elId);

    });

    rpgMovesTable(f.moves.tm,false,true).then(html=>{const el=document.getElementById('rpg-mv-tm');if(el)el.innerHTML=html;});
    rpgMovesTable(f.moves.egg,false).then(html=>{const el=document.getElementById('rpg-mv-egg');if(el)el.innerHTML=html;});
    rpgMovesTable(f.moves.tutor,false).then(html=>{const el=document.getElementById('rpg-mv-tutor');if(el)el.innerHTML=html;});

    rpgForms.forEach((rf,i)=>{
      const b=document.getElementById(`fswbtn-${rpgFormsPkKey}-${i}`);
      if(!b) return;
      const isActive=i===idx;
      b.classList.toggle('active',isActive);
      b.setAttribute('style',formSwitchBtnStyle(fTT,isActive));
    });
  }
  window._pkFormsRegistry[rpgFormsPkKey]={forms:rpgForms, apply:applyRpgForm};
}

function toggleRpgShiny(){
  window._rpgShinyOn=!window._rpgShinyOn;

  const thumb=document.getElementById('rpg-shiny-thumb');

}

async function renderDetail(p,s,container,navToken){
  const id=p.id;
  const types=p.types.map(t=>t.type.name);
  document.title=`${cap(p.name)} — NationalDex`;
  const primaryType=types[0]||'normal';
  const TT=TYPE_THEME[primaryType]||TYPE_THEME.normal;
  applyTypeTheme(primaryType);

  const dbRec=_pkDbMap[String(id)];
  const genusFromDb=dbRec?.classification;
  const genus=genusFromDb||s.genera?.find(g=>g.language.name==='en')?.genus||'Pokémon';
  // Bio: vem exclusivamente do registro do admin (Supabase) — já está tudo
  // cadastrado lá, sem consulta/fallback à PokéAPI.
  const flavorText=dbRec?.bio||'';
  // Biomas vêm sempre do mesmo registro do admin usado pra bio acima (dbRec) —
  // não existe equivalente de biomas na PokéAPI.
  const dbBiomasOfficial=dbRec?.biomas;
  const gr=s.gender_rate;
  const mPct=(100-(gr/8*100)).toFixed(0);const fPct=(gr/8*100).toFixed(0);
  const genderHtml=gr===-1?'Sem gênero (⚲)':`<span style="color:#5588cc;font-weight:700">${mPct}% Male</span>, <span style="color:#cc5588;font-weight:700">${fPct}% Female</span>`;
  const eggs=s.egg_groups.map(e=>cap(e.name)).join(', ')||'—';
  const bst=p.stats.reduce((a,b)=>a+b.base_stat,0);

  // Abilities
  const regularAbs=p.abilities.filter(a=>!a.is_hidden);
  const hiddenAbs=p.abilities.filter(a=>a.is_hidden);
  const sortedAbs=[...regularAbs,...hiddenAbs];
  const abHtml=await Promise.all(sortedAbs.map(async(a)=>{
    let desc='';
    try{const ar=await fetch(a.ability.url);const ad=await ar.json();const pt=await getAbility(a.ability.name);const en=ad.effect_entries.find(e=>e.language.name==='en');desc=pt||(en?en.short_effect:'');}catch{}
    const ha=a.is_hidden;
    const idxNum=ha?null:regularAbs.indexOf(a)+1;
    return `<div style="line-height:1.6">
      ${ha
        ? `<span class="ha-badge">HA</span>`
        : `<span class="ability-idx">${idxNum}.</span>`}
      <span class="ability-name-lbl ${ha?'ha':''}">${a.ability.name.toUpperCase().replace(/-/g,' ')}</span>${desc?`: <span style="color:var(--text);font-weight:400;font-size:11px">${desc}</span>`:''}
    </div>`;
  }));

  // Damage
  const dmg=calcDmg(types);
  const allMults=[{k:0,lbl:'×0'},{k:0.25,lbl:'×¼'},{k:0.5,lbl:'×½'},{k:1,lbl:'×1'},{k:2,lbl:'×2'},{k:4,lbl:'×4'}];
  // Build full ×1 list
  const allTypes=Object.keys(TYPE_CHART);
  dmg[1]=allTypes.filter(t=>{const v=dmg[0].includes(t)||dmg[0.25].includes(t)||dmg[0.5].includes(t)||dmg[2].includes(t)||dmg[4].includes(t);return !v;});
  const dmgHtml=`<div style="padding:10px 14px;display:flex;flex-direction:column;gap:6px">
    ${allMults.filter(r=>dmg[r.k]&&dmg[r.k].length).map(r=>{
      const isImmune=r.k===0;const isResist=r.k>0&&r.k<1;const isWeak=r.k>=2;
      const multColor=isImmune?'#e05050':isResist?'#2a7a2a':isWeak?'#c03030':'#888';
      const multBg=isImmune?'#ffeaea':isResist?'#eaffea':isWeak?'#fff0f0':'#f5f5f5';
      return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0">
        <span style="font-family:var(--font-title);font-size:12px;font-weight:700;min-width:30px;text-align:center;padding:3px 6px;border-radius:5px;background:${multBg};color:${multColor};border:1px solid ${multColor}40">${r.lbl}</span>
        <div style="display:flex;flex-wrap:wrap;gap:3px">${dmg[r.k].map(t=>pill(t)).join('')}</div>
      </div>`;
    }).join('')}
  </div>`;

  // Evo
  let evoHtml='';
  let _evoSpeciesNames=[];
  try{
    const cr=await fetch(s.evolution_chain.url);
    const cd=await cr.json();
    evoHtml=buildEvo(cd.chain);
    function collectSpecies(node){
      _evoSpeciesNames.push(node.species.name);
      for(const c of node.evolves_to) collectSpecies(c);
    }
    collectSpecies(cd.chain);
  }catch{}
  const _speciesName=p.name;

  // Prev / Next
  let prevHtml='',nextHtml='';
  if(id>1){try{const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${id-1}`);const d=await r.json();const dispName=_pkDbMap[String(id-1)]?.name||cap(d.name);prevHtml=`<button class="nav-arrow" onclick="goDetail('${d.name}')"><span class="adir">‹</span><span class="aname"><strong>#${String(id-1).padStart(3,'0')}</strong> ${dispName}</span></button>`;}catch{}}else{prevHtml=`<span></span>`;}
  if(id<1025){try{const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${id+1}`);const d=await r.json();const dispName=_pkDbMap[String(id+1)]?.name||cap(d.name);nextHtml=`<button class="nav-arrow right" onclick="goDetail('${d.name}')"><span class="adir">›</span><span class="aname"><strong>#${String(id+1).padStart(3,'0')}</strong> ${dispName}</span></button>`;}catch{}}

  // Moves
  let levelMoves=[],tmMoves=[],eggMoves=[],tutorMoves=[];
  p.moves.forEach(m=>{
    m.version_group_details.forEach(vg=>{
      if(vg.move_learn_method.name==='level-up'&&!levelMoves.find(x=>x.name===m.move.name))levelMoves.push({name:m.move.name,lvl:vg.level_learned_at});
      else if(vg.move_learn_method.name==='machine'&&!tmMoves.find(x=>x.name===m.move.name))tmMoves.push({name:m.move.name});
      else if(vg.move_learn_method.name==='egg'&&!eggMoves.find(x=>x.name===m.move.name))eggMoves.push({name:m.move.name});
      else if(vg.move_learn_method.name==='tutor'&&!tutorMoves.find(x=>x.name===m.move.name))tutorMoves.push({name:m.move.name});
    });
  });
  levelMoves.sort((a,b)=>a.lvl-b.lvl);
  tmMoves=restrictToTmList(tmMoves);
  const moveDataCache={};
  async function fetchMoveData(name){
    if(moveDataCache[name])return moveDataCache[name];
    // Dados do move vêm exclusivamente da tabela "moves" do Supabase — sem
    // consulta à PokéAPI, mesmo para Pokémon oficiais.
    const mv=await loadMoves();
    const db=mv[name]||null;
    const data=db
      ?{power:db.power??null,accuracy:db.accuracy??null,type:db.type||null,type2:db.type2||null,category:db.damage_class||null,style:db.contest_style||null,desc:db.descricao||''}
      :{power:null,accuracy:null,type:null,type2:null,category:null,style:null,desc:''};
    moveDataCache[name]=data;
    return data;
  }

  async function movesTable(moves,showLvl=false,tmMode=false){

              ${d?.desc||'Sem descrição disponível.'}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }

    // Desktop: tabela normal
    return`<div><table class="moves-table" style="text-align:center;width:100%">
      <colgroup>
        <col style="width:17%">
        <col style="width:16%">
        <col style="width:16%">

      <thead><tr>

      <tbody>${moves.map((m,i)=>{
        const d=moveDetails[i];
        const typePill=d?.type?`<span style="display:inline-flex;gap:3px;flex-wrap:wrap;justify-content:center">${pill(d.type)}${d.type2?pill(d.type2):''}</span>`:'—';
        const catColor=d?.category?CAT_COLORS[d.category]||'#888':'#888';

      }).join('')}</tbody></table></div>`;
  }

  // Se o usuário já navegou pra outro Pokémon enquanto os fetches acima
  // rodavam, aborta antes de escrever no DOM.
  if(navToken!==undefined&&navToken!==_detailNavToken)return;

  // ── Formas (botões inline abaixo da tipagem) ──

  const officialFormsPkKey=String(id);
  const officialSpriteMain=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
  const officialShinyMain=dbRec?.sprite_shiny||`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/${id}.png`;

    moves:{level:levelMoves, tm:tmMoves, egg:eggMoves, tutor:tutorMoves},
    bio:flavorText, biomas:dbBiomasOfficial||null
  }];
  if(dbRec?.formas_alt&&dbRec.formas_alt.length){
    dbRec.formas_alt.forEach(f=>{
      const fMoves=formAltMoves(f);
      officialForms.push({
        nome:f.nome, tipo1:f.tipo1, tipo2:f.tipo2,
        abilityEntries:f.habilidade?[{name:f.habilidade,ha:false}]:[],
        sprite:f.sprite, sprite_shiny:f.sprite_shiny,
        hp:f.hp, attack:f.atk, defense:f.def,
        'special-attack':f.spa, 'special-defense':f.spd, speed:f.spe,
        moves:fMoves, bio:f.bio||'', biomas:f.biomas||null
      });

  }

  container.innerHTML=`
  <div class="breadcrumb">
    <button onclick="goList()">NationalDex</button>
    <span>›</span>
    <span>#${String(id).padStart(4,'0')} ${cap(p.name)}</span>

  <div class="main-card" style="border-color:${TT.mid}40" id="official-main-card">

        <div class="hero-type-icons" id="type-icons-main">

function evoMethod(det){
  if(!det)return'';
  const d=det;
  if(d.min_level)return`Lv. ${d.min_level}`;
  if(d.item)return cap(d.item.name);
  if(d.trigger?.name==='trade')return'Trade';
  if(d.min_happiness)return`Friendship`;
  if(d.known_move)return`Know ${cap(d.known_move.name)}`;
  if(d.min_beauty)return`Beauty`;
  if(d.time_of_day)return cap(d.time_of_day);
  if(d.trigger?.name)return cap(d.trigger.name);
  return'';
}

function evoNode(name,id,det,isFirst){
  const method=evoMethod(det);
  const arrow=!isFirst?`<div class="evo-arrow"><span class="evo-arrow-icon">›</span>${method?`<span class="evo-method">${method}</span>`:''}</div>`:'';
  return `${arrow}<button class="evo-node" onclick="goDetail('${name}')">
    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png"
         onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png'" alt="${name}">
    <span class="evo-node-name">${cap(name)}</span>
    <span class="evo-node-num">#${String(id).padStart(3,'0')}</span>
  </button>`;
}

function buildEvo(chain){
  // Flatten full tree respecting branches
  function flatten(node,depth,parentDet,result){
    const name=node.species.name;
    const id=node.species.url.split('/').filter(Boolean).pop();
    const det=node.evolution_details?.[0]||null;
    result.push({name,id,det,depth,parentDet,branches:node.evolves_to.length});
    for(const child of node.evolves_to) flatten(child,depth+1,det,result);
    return result;
  }
  const nodes=flatten(chain,0,null,[]);

  // Build HTML — group by depth columns
  const maxDepth=Math.max(...nodes.map(n=>n.depth));
  let html='';
  // Simple linear chain (no branches)
  const hasBranch=nodes.some(n=>n.branches>1)||nodes.filter(n=>n.depth===1).length>1;
  if(!hasBranch){
    html=nodes.map((n,i)=>evoNode(n.name,n.id,n.det,i===0)).join('');
  } else {
    // Branched: render base, then each branch on its own row
    const base=nodes.find(n=>n.depth===0);
    const mid=nodes.filter(n=>n.depth===1);
    const finals=nodes.filter(n=>n.depth===2);
    html=`<div class="evo-branch-wrap">`;
    // Base
    html+=`<div class="evo-branch-col">${evoNode(base.name,base.id,null,true)}</div>`;
    // Mid + finals
    if(mid.length){
      html+=`<div class="evo-branch-col">`;
      for(const m of mid){
        const mFinals=finals.filter(f=>nodes.find(n=>n.name===f.name&&n.depth===2));
        html+=`<div class="evo-branch-row">${evoNode(m.name,m.id,m.det,false)}`;
        const myFinals=nodes.filter(n=>n.depth===2);// simplified
        if(myFinals.length&&mid.length===1){
          for(const f of myFinals) html+=evoNode(f.name,f.id,f.det,false);
        }
        html+=`</div>`;
      }
      html+=`</div>`;
    } else {
      // Only final evolutions branching from base
      for(const f of finals) html+=evoNode(f.name,f.id,f.det,false);
    }
    html+=`</div>`;
  }

  // Mega evolutions — fetch from pokemon forms
  return html;
}

// Nó da cadeia evolutiva regional: usa a variante regional (de _rpgPokemon)
// quando existe; senão cai pra forma normal do estágio (comportamento
// correto — nem toda pré-evolução tem variante regional).
function regionalEvoNode(node, regEntry, det, isFirst, currentId){
  const method=evoMethod(det);
  const arrow=!isFirst?`<div class="evo-arrow"><span class="evo-arrow-icon">›</span>${method?`<span class="evo-method">${method}</span>`:''}</div>`:'';
  if(regEntry){
    const isMe=String(regEntry.id)===String(currentId);
    const name=evoDisplayName(regEntry);
    const sprite=regEntry.sprite||'';
    return `${arrow}<button class="evo-node" onclick="${isMe?'void(0)':`goDetail('__rpg__${encodeURIComponent(regEntry.id)}','${rpgUrlSlug(regEntry)}')`}" style="${isMe?'cursor:default':''}">
      ${sprite?`<img src="${sprite}" onerror="this.style.opacity='.2'" alt="${name}">`:`<div style="width:68px;height:68px;display:flex;align-items:center;justify-content:center;font-size:28px">❓</div>`}
      <span class="evo-node-name">${name}</span>
      <span class="evo-node-num">${evoDisplayNum(regEntry.id)}</span>
    </button>`;
  }
  const name=node.species.name;
  const id=node.species.url.split('/').filter(Boolean).pop();
  return `${arrow}<button class="evo-node" onclick="goDetail('${name}')">
    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png"
         onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png'" alt="${name}">
    <span class="evo-node-name">${cap(name)}</span>
    <span class="evo-node-num">#${String(id).padStart(3,'0')}</span>
  </button>`;
}

// Constrói a cadeia evolutiva pra formas regionais, casando cada estágio
// da evolution-chain oficial (que só conhece a forma normal) com a
// variante regional equivalente já cadastrada em _rpgPokemon (ex:
// "rattata" no estágio 0 → registro A0019 "rattata-alola").
function buildRegionalEvo(chain, pref, regSlug, currentId){
  function flatten(node,depth,result){
    const det=node.evolution_details?.[0]||null;
    result.push({node,det,depth,branches:node.evolves_to.length});
    for(const child of node.evolves_to) flatten(child,depth+1,result);
    return result;
  }
  const nodes=flatten(chain,0,[]);
  function findRegional(node){
    const wantSlug=`${node.species.name}-${regSlug}`;
    return _rpgPokemon.find(x=>idPrefix(x.id)===pref && (rpgUrlSlug(x)===wantSlug || slugify(x.name)===wantSlug));
  }
  const hasBranch=nodes.some(n=>n.branches>1)||nodes.filter(n=>n.depth===1).length>1;
  if(!hasBranch){
    return nodes.map((n,i)=>regionalEvoNode(n.node,findRegional(n.node),n.det,i===0,currentId)).join('');
  }
  const base=nodes.find(n=>n.depth===0);
  const mid=nodes.filter(n=>n.depth===1);
  const finals=nodes.filter(n=>n.depth===2);
  let html=`<div class="evo-branch-wrap">`;
  html+=`<div class="evo-branch-col">${regionalEvoNode(base.node,findRegional(base.node),null,true,currentId)}</div>`;
  if(mid.length){
    html+=`<div class="evo-branch-col">`;
    for(const m of mid){
      html+=`<div class="evo-branch-row">${regionalEvoNode(m.node,findRegional(m.node),m.det,false,currentId)}`;
      if(finals.length&&mid.length===1){
        for(const f of finals) html+=regionalEvoNode(f.node,findRegional(f.node),f.det,false,currentId);
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  } else {
    for(const f of finals) html+=regionalEvoNode(f.node,findRegional(f.node),f.det,false,currentId);
  }
  html+=`</div>`;
  return html;
}

/* ── Formas Alternativas (ex: Oricorio Estilo Pom-Pom) e Formas Alfa
   (Mega/Gigantamax custom de fakemon) ──
   Variações permanentes (Formas) ou transformações de batalha (Formas Alfa)
   do Pokémon, cadastradas no admin (campos formas_alt / formas_alfa na
   tabela pokemons). Compartilham a mesma estrutura visual — só muda o
   tema de cor e o rótulo da seção. */
/* ── Formas (ex: Oricorio) ──
   Quando o Pokémon tem formas alternativas cadastradas (p.formas_alt), a
   forma "principal" (o próprio registro p) não é tratada como padrão/canônica
   — ela entra na lista de Formas com o mesmo peso visual que as demais.
   A divisão "forma principal vs. forma alternativa" existe só por
   necessidade técnica (precisa de um registro raiz no banco pra pendurar
   as outras) — na tela, todas aparecem como opções equivalentes. */
const FORM_STAT_N={hp:'HP',atk:'ATK',def:'DEF',spa:'SP.ATK',spd:'SP.DEF',spe:'SPD'};
const FORM_STAT_C={hp:'#e05050',atk:'#e07030',def:'#e0b030',spa:'#7070e0',spd:'#4aaa6a',spe:'#e04aaa'};

// Tabela compacta de "Damage Taken" (fraquezas/resistências/imunidades) pra
// mostrar dentro do card expandido de cada forma — mesma lógica do calcDmg
// usado na seção principal, só que num layout mais enxuto.
function formDmgTakenHtml(types){
  if(!types||!types.length) return '';
  const dmg=calcDmg(types);
  const mults=[{k:0,lbl:'×0'},{k:.25,lbl:'×¼'},{k:.5,lbl:'×½'},{k:2,lbl:'×2'},{k:4,lbl:'×4'}];
  const rows=mults.filter(r=>dmg[r.k]&&dmg[r.k].length);
  if(!rows.length) return '';
  return `<div>
    <div style="font-family:var(--font-title);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Damage Taken</div>
    <div style="display:flex;flex-direction:column;gap:4px">
      ${rows.map(r=>{
        const isImmune=r.k===0;const isResist=r.k>0&&r.k<1;const isWeak=r.k>=2;
        const multColor=isImmune?'#e05050':isResist?'#2a7a2a':isWeak?'#c03030':'#888';
        const multBg=isImmune?'#ffeaea':isResist?'#eaffea':isWeak?'#fff0f0':'#f5f5f5';
        return `<div style="display:flex;align-items:center;gap:8px">
          <span style="font-family:var(--font-title);font-size:10px;font-weight:700;min-width:26px;text-align:center;padding:2px 5px;border-radius:5px;background:${multBg};color:${multColor};border:1px solid ${multColor}40">${r.lbl}</span>
          <div style="display:flex;flex-wrap:wrap;gap:3px">${dmg[r.k].map(t=>pill(t)).join('')}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// Monta a seção completa de formas (compartilhada entre "Formas" e "Formas Alfa").
// opts.forms = [{nome,tipo1,tipo2,habilidadeLabel,hp,atk,def,spa,spd,spe,sprite,sprite_shiny}]
// Cada forma usa as cores da sua própria tipagem principal (f.tipo1) — o
// tema passado em opts (headerBg) serve só pro cabeçalho da seção, que
// acompanha a cor do resto da ficha (TT.dark do Pokémon "raiz").
function renderFormsSection(opts){
  const {sectionTitle,headerBg,idPrefix,pkId,forms}=opts;
  if(!forms||!forms.length) return '';

  const nodes=forms.map((f,i)=>{
    const fTheme=TYPE_THEME[f.tipo1]||TYPE_THEME.normal;
    const mid=fTheme.mid, dark=fTheme.dark, light=fTheme.light, statBg=fTheme.light, borderA=fTheme.mid;
    const fTypes=[f.tipo1,f.tipo2].filter(Boolean);
    const typeIconsHtml=fTypes.map(t=>`<img style="width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.18))" src="https://raw.githubusercontent.com/partywhale/pokemon-type-icons/main/icons/${t}.svg" alt="${t}">`).join('');
    const statKeys=['hp','atk','def','spa','spd','spe'];
    const bst=statKeys.reduce((a,k)=>a+(f[k]||0),0);
    const statsHtml=statKeys.filter(k=>f[k]).map(k=>`<span style="display:inline-flex;flex-direction:column;align-items:center;background:${statBg};border:1px solid ${mid}40;border-radius:6px;padding:4px 8px;min-width:44px">
      <span style="font-family:var(--font-title);font-size:8px;color:${mid};text-transform:uppercase;letter-spacing:.3px">${FORM_STAT_N[k]}</span>
      <span style="font-family:var(--font-title);font-size:14px;font-weight:700;color:${FORM_STAT_C[k]}">${f[k]}</span>
    </span>`).join('');

    const key=`${idPrefix}-${pkId}-${i}`;
    window._formSpriteReg[key]={normal:f.sprite||'',shiny:f.sprite_shiny||'',on:false};

    const nodeHtml=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px;border-radius:8px;cursor:default">
      ${f.sprite?`<img style="width:68px;height:68px;object-fit:contain;filter:drop-shadow(0 3px 8px rgba(0,0,0,.1))" src="${f.sprite}" alt="${f.nome}">`:''}
      <span style="font-family:var(--font-title);font-size:10px;font-weight:600;color:${mid};text-transform:uppercase;letter-spacing:.3px;text-align:center">${f.nome}</span>
    </div>`;

    const shinyToggleHtml=f.sprite_shiny?`<img class="shiny-thumb" id="fthumb-${key}" src="${f.sprite_shiny}" onclick="event.stopPropagation();toggleFormShiny('${key}')" title="✦ Ver Shiny" alt="shiny" style="position:absolute;bottom:-6px;right:-6px;width:26px;height:26px;z-index:2">`:'';

    const infoHtml=`
    <div id="${idPrefix}-info-${pkId}-${i}" style="display:none;margin-top:16px;padding:16px;background:${light};border:1.5px solid ${borderA};border-radius:10px;animation:fadeUp .3s both">
      <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;min-width:120px">
          <div style="position:relative;display:inline-flex">
            ${f.sprite?`<img id="fspr-${key}" style="width:110px;height:110px;object-fit:contain;filter:drop-shadow(0 6px 18px ${mid}33)" src="${f.sprite}" alt="${f.nome}">`:''}
            ${shinyToggleHtml}
          </div>
          <div style="display:flex;gap:6px">${typeIconsHtml}</div>
        </div>
        <div style="flex:1;min-width:180px">
          <div style="font-family:var(--font-title);font-size:14px;font-weight:700;color:${dark};margin-bottom:10px;letter-spacing:.5px">${f.nome}</div>
          ${f.habilidadeLabel?`<div style="margin-bottom:10px">
            <div style="font-family:var(--font-title);font-size:9px;color:${mid};text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Habilidade</div>
            <span style="font-family:var(--font-body);font-size:11px;font-weight:700;color:${dark}">${f.habilidadeLabel}</span>
          </div>`:''}
          ${statsHtml?`<div>
            <div style="font-family:var(--font-title);font-size:9px;color:${mid};text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Base Stats</div>
            <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">
              ${statsHtml}
              <span style="display:inline-flex;flex-direction:column;align-items:center;background:${dark};border-radius:6px;padding:4px 8px;min-width:44px">
                <span style="font-family:var(--font-title);font-size:8px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.3px">BST</span>
                <span style="font-family:var(--font-title);font-size:14px;font-weight:700;color:#fff">${bst}</span>
              </span>
            </div>
          </div>`:''}
        </div>
        <div style="min-width:160px;flex-shrink:0">
          ${formDmgTakenHtml(fTypes)}
        </div>
      </div>
    </div>`;

    return {nodeHtml,infoHtml,mid};
  });

  const nodesHtml=nodes.map((n,i)=>`
    <div onclick="toggleFormInfo('${idPrefix}','${pkId}',${i})" style="cursor:pointer;border-radius:10px;transition:background .2s" onmouseenter="this.style.background='${n.mid}10'" onmouseleave="this.style.background='transparent'">
      ${n.nodeHtml}
      <div style="font-family:var(--font-title);font-size:8px;color:${n.mid};text-align:center;letter-spacing:.4px;margin-top:-4px">▼ ver detalhes</div>
    </div>`).join('');
  const infosHtml=nodes.map(n=>n.infoHtml).join('');

  return `<div class="section" style="border-color:${headerBg}40">
    <div class="sec-header" style="background:${headerBg}"><div class="sec-title">${sectionTitle}</div></div>
    <div class="sec-body">
      <div style="display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;margin-bottom:8px">
        ${nodesHtml}
      </div>
      ${infosHtml}
    </div>
  </div>`;
}

function toggleFormInfo(idPrefix,pkId,i){
  const el=document.getElementById(`${idPrefix}-info-${pkId}-${i}`);
  if(!el)return;
  const isHidden=el.style.display==='none';
  document.querySelectorAll(`[id^="${idPrefix}-info-${pkId}-"]`).forEach(e=>e.style.display='none');
  el.style.display=isHidden?'block':'none';
}
// Compat com chamadas antigas de toggleAltFormInfo (onclick já renderizado em cache/bfcache)
function toggleAltFormInfo(pkId,i){ toggleFormInfo('alt',pkId,i); }

function renderAltFormsHtml(p){
  if(!p.formas_alt||!p.formas_alt.length) return '';
  // Normaliza a forma principal pro mesmo formato das formas alternativas,
  // pra poder renderizar tudo com exatamente o mesmo código/estilo.
  const mainAbilities=[p.habilidade1,p.habilidade2,p.habilidade_oculta].filter(Boolean);
  const mainForm={
    nome:p.name||p.nome, tipo1:p.tipo1, tipo2:p.tipo2,
    habilidadeLabel:mainAbilities.map(a=>a.toUpperCase().replace(/-/g,' ')).join(', '),
    hp:p.hp,atk:p.atk,def:p.def,spa:p.spa,spd:p.spd,spe:p.spe,
    sprite:p.sprite, sprite_shiny:p.sprite_shiny
  };
  const altForms=p.formas_alt.map(f=>({
    nome:f.nome, tipo1:f.tipo1, tipo2:f.tipo2,
    habilidadeLabel:f.habilidade?f.habilidade.toUpperCase().replace(/-/g,' '):'',
    hp:f.hp,atk:f.atk,def:f.def,spa:f.spa,spd:f.spd,spe:f.spe,
    sprite:f.sprite, sprite_shiny:f.sprite_shiny
  }));
  // Cabeçalho da seção acompanha a cor do tipo principal do Pokémon (mesma
  // cor usada em Damage Taken/Biology/Evolutionary Chain), em vez de um
  // teal fixo — cada forma individual mantém sua própria cor de tipagem.
  const rootTheme=TYPE_THEME[p.tipo1]||TYPE_THEME.normal;
  return renderFormsSection({
    sectionTitle:'Formas', headerBg:rootTheme.dark,
    idPrefix:'alt', pkId:p.id, forms:[mainForm,...altForms]
  });
}

// ── Formas Alfa (ex: Mega/Gigantamax custom de fakemon, campo formas_alfa) ──
// Mesma estrutura de renderAltFormsHtml, mas com tema roxo (igual ao das
// Forças Alfas oficiais buscadas via PokeAPI em appendMegas) e sem incluir
// a forma "principal" — Formas Alfa são sempre transformações adicionais.
function renderAlfaFormsHtml(p){
  if(!p.formas_alfa||!p.formas_alfa.length) return '';
  const alfaForms=p.formas_alfa.map(f=>({
    nome:f.nome, tipo1:f.tipo1, tipo2:f.tipo2,
    habilidadeLabel:f.habilidade?f.habilidade.toUpperCase().replace(/-/g,' '):'',
    hp:f.hp,atk:f.atk,def:f.def,spa:f.spa,spd:f.spd,spe:f.spe,
    sprite:f.sprite, sprite_shiny:f.sprite_shiny
  }));
  return renderFormsSection({
    sectionTitle:'Formas Alfa', headerBg:'#5020a0',
    idPrefix:'alfa', pkId:p.id, forms:alfaForms
  });
}

async function appendMegas(speciesName, container){
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${speciesName}`);
    const s=await r.json();
    const megaVarieties=s.varieties.filter(v=>v.pokemon.name.includes('-mega')||v.pokemon.name.includes('-primal'));
    if(!megaVarieties.length)return;

    const megaData=await Promise.all(megaVarieties.map(async v=>{
      try{
        const pr=await fetch(v.pokemon.url);
        const pd=await pr.json();
        const formId=pd.id;
        const rawName=v.pokemon.name;
        const isMega=rawName.includes('-mega');
        const isPrimal=rawName.includes('-primal');
        let displayName;
        if(isMega){
          const base=rawName.replace(/-mega(-[xy])?$/,'');
          const suffix=rawName.match(/-mega(-[xy])?$/)?.[1]?.replace('-',' ')||'';
          displayName='Mega '+cap(base)+(suffix?' '+suffix.toUpperCase():'');
        } else if(isPrimal){
          const base=rawName.replace(/-primal$/,'');
          displayName='Primal '+cap(base);
        } else {
          displayName=cap(rawName);
        }

        // Fetch stats for inline display
        const megaTypes=pd.types.map(t=>t.type.name);
        const megaBst=pd.stats.reduce((a,b)=>a+b.base_stat,0);
        const STAT_N={hp:'HP',attack:'ATK',defense:'DEF','special-attack':'SP.ATK','special-defense':'SP.DEF',speed:'SPD'};
        const STAT_C={hp:'#e05050',attack:'#e07030',defense:'#e0b030','special-attack':'#7070e0','special-defense':'#4aaa6a',speed:'#e04aaa'};

        // Mega abilities
        let megaAbHtml='';
        for(const a of pd.abilities){
          let desc='';
          try{const ar=await fetch(a.ability.url);const ad=await ar.json();const en=ad.effect_entries.find(e=>e.language.name==='en');desc=en?en.short_effect:'';}catch{}
          megaAbHtml+=`<div style="padding:4px 0;border-bottom:1px solid var(--border)">
            <span style="font-family:var(--font-body);font-size:11px;font-weight:700;color:#7030d0">${a.ability.name.toUpperCase().replace(/-/g,' ')}</span>
            ${desc?`<div style="font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4">${desc}</div>`:''}
          </div>`;
        }

        const statsHtml=pd.stats.map(st=>`<span style="display:inline-flex;flex-direction:column;align-items:center;background:#f5eaff;border:1px solid #c090e080;border-radius:6px;padding:4px 8px;min-width:44px">
          <span style="font-family:var(--font-title);font-size:8px;color:#7030d0;text-transform:uppercase;letter-spacing:.3px">${STAT_N[st.stat.name]||st.stat.name}</span>
          <span style="font-family:var(--font-title);font-size:14px;font-weight:700;color:${STAT_C[st.stat.name]||'#888'}">${st.base_stat}</span>
        </span>`).join('');

        const typeIconsHtml=megaTypes.map(t=>`<img style="width:28px;height:28px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.18))" src="https://raw.githubusercontent.com/partywhale/pokemon-type-icons/main/icons/${t}.svg" alt="${t}">`).join('');

        const nodeHtml=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px;border-radius:8px;cursor:default">
          <div style="position:relative;display:inline-block">
            <img style="width:68px;height:68px;object-fit:contain;filter:drop-shadow(0 3px 8px rgba(0,0,0,.1))"
              src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${formId}.png"
              onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${formId}.png'" alt="${rawName}">
          </div>
          <span style="font-family:var(--font-title);font-size:10px;font-weight:600;color:#5020a0;text-transform:uppercase;letter-spacing:.3px;text-align:center">${displayName}</span>
        </div>`;

        const infoHtml=`
        <div id="mega-info-${rawName}" style="display:none;margin-top:16px;padding:16px;background:#f8f0ff;border:1.5px solid #c090e0;border-radius:10px;animation:fadeUp .3s both">
          <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;min-width:120px">
              <div style="position:relative;display:inline-block">
                <img style="width:110px;height:110px;object-fit:contain;filter:drop-shadow(0 6px 18px rgba(100,0,200,.2))"
                  src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${formId}.png"
                  onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${formId}.png'" alt="${rawName}">
              </div>
              <div style="display:flex;gap:6px">${typeIconsHtml}</div>
            </div>
            <div style="flex:1;min-width:200px">
              <div style="font-family:var(--font-title);font-size:14px;font-weight:700;color:#5020a0;margin-bottom:10px;letter-spacing:.5px">${displayName}</div>
              <div style="margin-bottom:10px">
                <div style="font-family:var(--font-title);font-size:9px;color:#7030d0;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Habilidades</div>
                ${megaAbHtml||'<div style="font-size:11px;color:var(--muted)">—</div>'}
              </div>
              <div>
                <div style="font-family:var(--font-title);font-size:9px;color:#7030d0;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Base Stats</div>
                <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">
                  ${statsHtml}
                  <span style="display:inline-flex;flex-direction:column;align-items:center;background:#5020a0;border-radius:6px;padding:4px 8px;min-width:44px">
                    <span style="font-family:var(--font-title);font-size:8px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.3px">BST</span>
                    <span style="font-family:var(--font-title);font-size:14px;font-weight:700;color:#fff">${megaBst}</span>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>`;

        return {nodeHtml, infoHtml, rawName};
      }catch{return null;}
    }));

    const validMegas=megaData.filter(Boolean);
    if(!validMegas.length)return;
    const wrap=document.getElementById('evo-chain-wrap');
    if(wrap){
      const nodesHtml=validMegas.map((m,i)=>`
        <div onclick="toggleMegaInfo('${m.rawName}')" style="cursor:pointer;border-radius:10px;transition:background .2s" onmouseenter="this.style.background='rgba(100,0,200,.06)'" onmouseleave="this.style.background='transparent'">
          ${m.nodeHtml}
          <div style="font-family:var(--font-title);font-size:8px;color:#00d4c8;text-align:center;letter-spacing:.4px;margin-top:-4px">▼ ver detalhes</div>
        </div>`).join('');
      const infosHtml=validMegas.map(m=>m.infoHtml).join('');
      wrap.insertAdjacentHTML('beforeend',`
        <div style="width:100%;border-top:1px solid var(--border);margin-top:12px;padding-top:12px">
          <div style="display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;margin-bottom:8px">
            <span class="alpha-forces-lbl">⬡ FORÇAS ALFAS</span>
            ${nodesHtml}
          </div>
          ${infosHtml}
        </div>`);
    }
  }catch{}
}

function toggleMegaInfo(rawName){
  const el=document.getElementById(`mega-info-${rawName}`);
  if(!el)return;
  const isHidden=el.style.display==='none';
  // close all others
  document.querySelectorAll('[id^="mega-info-"]').forEach(e=>e.style.display='none');
  el.style.display=isHidden?'block':'none';
}

function toggleMobileMenu(){
  const btn=document.getElementById('nav-hamburger');
  const drop=document.getElementById('nav-dropdown');
  btn.classList.toggle('open');
  drop.classList.toggle('open');
}
document.addEventListener('click',function(e){
  const btn=document.getElementById('nav-hamburger');
  const drop=document.getElementById('nav-dropdown');
  if(btn&&drop&&!btn.contains(e.target)&&!drop.contains(e.target)){
    btn.classList.remove('open');
    drop.classList.remove('open');
  }
});

/* ── Invalida os caches em memória (PK, abilities, moves) e recarrega
   quando a página volta do bfcache (botão voltar/avançar do navegador)
   ou quando a aba fica visível de novo após um tempo — sem isso, edições
   feitas no admin não aparecem até um F5 na aba já aberta. ── */
let _lastRefetch=Date.now();
function invalidateAndReload(){
  PK.reset();
  _abilitiesCache=null;
  _movesCache=null;
  _lastRefetch=Date.now();
  loadRpgData().then(()=>{ applyFilters(); });
}
window.addEventListener('pageshow',(e)=>{
  if(e.persisted) invalidateAndReload(); // restaurado do bfcache
});
document.addEventListener('visibilitychange',()=>{
  // Se a aba ficou oculta por mais de 60s (trocou de aba pra editar no
  // admin, por exemplo), recarrega os dados ao voltar pra ela.
  if(document.visibilityState==='visible' && Date.now()-_lastRefetch>60000){
    invalidateAndReload();
  }
});

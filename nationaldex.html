<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Platinum — Pokédex Nacional</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07070f;
    --surface:   #10101e;
    --panel:     #161628;
    --border:    #2a2a45;
    --gold:      #c9a227;
    --gold-dim:  #7a611a;
    --gold-glow: #e8c547;
    --silver:    #9baab8;
    --text:      #dde4ef;
    --text-dim:  #7888a0;
    --accent:    #4a9eff;
    --radius:    8px;
    --ff-display: 'Cinzel', serif;
    --ff-body:    'Crimson Pro', serif;
    --ff-mono:    'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--ff-body);
    font-size: 16px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── STARS BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(201,162,39,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 70%, rgba(201,162,39,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 20% 90%, rgba(74,158,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 45%, rgba(255,255,255,.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 48px 24px 36px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(10,10,20,.95) 0%, rgba(7,7,15,.8) 100%);
  }

  .crest {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 64px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    margin-bottom: 16px;
    background: radial-gradient(circle, rgba(201,162,39,.15) 0%, transparent 70%);
    box-shadow: 0 0 24px rgba(201,162,39,.2);
    font-size: 28px;
  }

  header h1 {
    font-family: var(--ff-display);
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    letter-spacing: .25em;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201,162,39,.4);
    line-height: 1.1;
  }

  header .subtitle {
    font-family: var(--ff-display);
    font-size: .75rem;
    letter-spacing: .4em;
    color: var(--text-dim);
    margin-top: 6px;
    text-transform: uppercase;
  }

  .divider-ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin: 20px auto 0;
    color: var(--gold-dim);
    font-size: .7rem;
    letter-spacing: .3em;
  }
  .divider-ornament::before,
  .divider-ornament::after {
    content: '';
    flex: 1;
    max-width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim));
  }
  .divider-ornament::after { background: linear-gradient(270deg, transparent, var(--gold-dim)); }

  /* ── SEARCH BAR ── */
  .search-zone {
    position: relative;
    z-index: 10;
    padding: 28px 24px;
    background: rgba(7,7,15,.6);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 440px;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold-dim);
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 12px 14px 12px 42px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--ff-display);
    font-size: .8rem;
    letter-spacing: .1em;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #search::placeholder { color: var(--text-dim); }
  #search:focus {
    border-color: var(--gold-dim);
    box-shadow: 0 0 0 3px rgba(201,162,39,.1);
  }

  .gen-select {
    padding: 12px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--ff-display);
    font-size: .75rem;
    letter-spacing: .08em;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  .gen-select:focus { border-color: var(--gold-dim); }
  .gen-select option { background: var(--panel); }

  /* ── LAYOUT ── */
  .app-layout {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 200px);
  }

  /* ── POKÉMON LIST ── */
  .pokemon-list {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: calc(100vh - 200px);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .list-header {
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    font-family: var(--ff-display);
    font-size: .65rem;
    letter-spacing: .25em;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    z-index: 2;
  }

  .pokemon-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(42,42,69,.4);
    cursor: pointer;
    transition: background .15s, border-left .15s;
    border-left: 3px solid transparent;
  }
  .pokemon-item:hover { background: rgba(201,162,39,.05); }
  .pokemon-item.active {
    background: rgba(201,162,39,.08);
    border-left-color: var(--gold);
  }

  .item-num {
    font-family: var(--ff-mono);
    font-size: .65rem;
    color: var(--text-dim);
    min-width: 36px;
  }

  .item-sprite {
    width: 44px;
    height: 44px;
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.5));
  }

  .item-name {
    font-family: var(--ff-display);
    font-size: .78rem;
    letter-spacing: .1em;
    color: var(--text);
    flex: 1;
  }

  .item-types {
    display: flex;
    gap: 4px;
  }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    overflow-y: auto;
    max-height: calc(100vh - 200px);
    padding: 0;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 400px;
    gap: 16px;
    color: var(--text-dim);
  }
  .empty-state .big-icon { font-size: 64px; opacity: .3; }
  .empty-state p {
    font-family: var(--ff-display);
    font-size: .75rem;
    letter-spacing: .2em;
    text-transform: uppercase;
  }

  /* ── DETAIL CONTENT ── */
  .detail-hero {
    position: relative;
    padding: 32px 40px 24px;
    background: linear-gradient(135deg, var(--surface) 0%, var(--panel) 100%);
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 32px;
    align-items: start;
  }

  .hero-sprites {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .main-sprite {
    width: 200px;
    height: 200px;
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,.6));
    transition: transform .3s ease;
  }
  .main-sprite:hover { transform: scale(1.05); }

  .shiny-sprite {
    width: 80px;
    height: 80px;
    object-fit: contain;
    image-rendering: pixelated;
    opacity: .8;
    transition: opacity .2s;
    cursor: pointer;
  }
  .shiny-sprite:hover { opacity: 1; }

  .shiny-label {
    font-family: var(--ff-display);
    font-size: .55rem;
    letter-spacing: .2em;
    color: var(--gold-dim);
    text-transform: uppercase;
  }

  .hero-info { padding-top: 8px; }

  .dex-number {
    font-family: var(--ff-mono);
    font-size: .8rem;
    color: var(--gold-dim);
    letter-spacing: .1em;
    margin-bottom: 6px;
  }

  .pokemon-name {
    font-family: var(--ff-display);
    font-size: clamp(1.8rem, 3vw, 2.6rem);
    font-weight: 700;
    letter-spacing: .15em;
    color: var(--gold);
    text-shadow: 0 0 32px rgba(201,162,39,.3);
    line-height: 1;
    margin-bottom: 12px;
  }

  .type-badges {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .classification {
    font-family: var(--ff-body);
    font-style: italic;
    font-size: 1rem;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .stat-cell {
    background: var(--bg);
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    font-family: var(--ff-display);
    font-size: .58rem;
    letter-spacing: .2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .stat-value {
    font-family: var(--ff-mono);
    font-size: .95rem;
    color: var(--text);
    font-weight: 600;
  }

  /* ── SECTION BLOCKS ── */
  .detail-body { padding: 28px 40px; display: flex; flex-direction: column; gap: 28px; }

  .section-title {
    font-family: var(--ff-display);
    font-size: .7rem;
    letter-spacing: .3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--gold-dim), transparent);
  }

  /* ── ABILITIES ── */
  .ability-list { display: flex; flex-direction: column; gap: 10px; }

  .ability-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .ability-name {
    font-family: var(--ff-display);
    font-size: .78rem;
    letter-spacing: .1em;
    color: var(--gold-glow);
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .ability-name.hidden { color: var(--silver); }

  .ha-badge {
    background: #222;
    border: 1px solid var(--silver);
    border-radius: 3px;
    padding: 2px 6px;
    font-family: var(--ff-mono);
    font-size: .6rem;
    color: var(--silver);
    letter-spacing: .05em;
    white-space: nowrap;
    margin-top: 2px;
  }

  .ability-desc {
    font-family: var(--ff-body);
    font-size: .9rem;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* ── BASE STATS ── */
  .base-stats { display: flex; flex-direction: column; gap: 8px; }

  .stat-row {
    display: grid;
    grid-template-columns: 110px 44px 1fr 44px;
    gap: 10px;
    align-items: center;
  }

  .stat-name {
    font-family: var(--ff-display);
    font-size: .62rem;
    letter-spacing: .12em;
    color: var(--text-dim);
    text-align: right;
  }

  .stat-num {
    font-family: var(--ff-mono);
    font-size: .8rem;
    color: var(--text);
    text-align: right;
  }

  .stat-bar-track {
    height: 6px;
    background: var(--panel);
    border-radius: 3px;
    overflow: hidden;
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .8s ease;
  }

  .stat-total {
    font-family: var(--ff-mono);
    font-size: .75rem;
    color: var(--gold-dim);
    text-align: right;
  }

  /* ── DAMAGE TABLE ── */
  .damage-section { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

  .damage-header {
    background: #1a2e1a;
    padding: 10px 16px;
    font-family: var(--ff-display);
    font-size: .65rem;
    letter-spacing: .25em;
    color: #7aaa7a;
    text-transform: uppercase;
  }

  .damage-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

  .damage-row { display: flex; align-items: center; gap: 10px; }

  .damage-mult {
    font-family: var(--ff-mono);
    font-size: .75rem;
    color: var(--text-dim);
    min-width: 36px;
    text-align: right;
  }

  .damage-types { display: flex; flex-wrap: wrap; gap: 5px; }

  /* ── EVO CHAIN ── */
  .evo-chain {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
    justify-content: center;
  }

  .evo-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 12px;
    border-radius: var(--radius);
    transition: background .2s;
    text-decoration: none;
  }
  .evo-node:hover { background: rgba(201,162,39,.08); }

  .evo-node img {
    width: 72px;
    height: 72px;
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.5));
  }

  .evo-name {
    font-family: var(--ff-display);
    font-size: .65rem;
    letter-spacing: .1em;
    color: var(--text);
    text-transform: uppercase;
  }

  .evo-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 0 8px;
    color: var(--gold-dim);
  }
  .evo-arrow svg { width: 20px; height: 20px; }
  .evo-method {
    font-family: var(--ff-display);
    font-size: .52rem;
    letter-spacing: .08em;
    color: var(--text-dim);
    text-align: center;
    max-width: 60px;
    line-height: 1.3;
  }

  /* ── TYPE BADGE ── */
  .type-badge {
    font-family: var(--ff-display);
    font-size: .6rem;
    letter-spacing: .1em;
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,.12);
    font-weight: 600;
  }

  /* ── LOADING & ERROR ── */
  .loading-overlay {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    flex-direction: column;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--ff-display);
    font-size: .7rem;
    letter-spacing: .2em;
    color: var(--text-dim);
  }

  /* ── MISC ── */
  .gender-info {
    display: flex;
    gap: 14px;
    font-size: .9rem;
    margin-bottom: 12px;
    color: var(--text-dim);
  }

  .gender-info span { display: flex; align-items: center; gap: 5px; }

  .egg-groups {
    font-family: var(--ff-body);
    font-size: .9rem;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .extra-info-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .info-pill {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .info-pill-label {
    font-family: var(--ff-display);
    font-size: .55rem;
    letter-spacing: .2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .info-pill-value {
    font-family: var(--ff-mono);
    font-size: .85rem;
    color: var(--text);
  }

  /* ── RPG STATS ── */
  .rpg-stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .rpg-cell {
    background: var(--bg);
    padding: 12px 16px;
  }

  .rpg-label {
    font-family: var(--ff-display);
    font-size: .58rem;
    letter-spacing: .2em;
    color: var(--text-dim);
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .rpg-value {
    font-family: var(--ff-mono);
    font-size: 1.1rem;
    color: var(--gold);
    font-weight: 600;
  }

  /* ── FLAVOR TEXT ── */
  .flavor-box {
    background: var(--panel);
    border-left: 3px solid var(--gold-dim);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 16px 20px;
    font-family: var(--ff-body);
    font-style: italic;
    font-size: 1.05rem;
    color: var(--text-dim);
    line-height: 1.7;
  }

  @media (max-width: 768px) {
    .app-layout { grid-template-columns: 1fr; }
    .pokemon-list { max-height: 280px; border-right: none; border-bottom: 1px solid var(--border); }
    .detail-panel { max-height: none; }
    .detail-hero { grid-template-columns: 1fr; text-align: center; padding: 24px 20px; }
    .hero-sprites { flex-direction: row; justify-content: center; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .detail-body { padding: 20px; }
    .stat-row { grid-template-columns: 90px 36px 1fr 36px; }
  }
</style>
</head>
<body>

<header>
  <div class="crest">⚜</div>
  <h1>KINGDOM PLATINUM</h1>
  <div class="subtitle">Pokédex Nacional — Edição do Reino</div>
  <div class="divider-ornament">✦ REGISTRO COMPLETO DAS CRIATURAS ✦</div>
</header>

<div class="search-zone">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Buscar por nome ou número..." autocomplete="off">
  </div>
  <select class="gen-select" id="gen-filter">
    <option value="0">Todas as Gerações</option>
    <option value="1">Geração I (1–151)</option>
    <option value="2">Geração II (152–251)</option>
    <option value="3">Geração III (252–386)</option>
    <option value="4">Geração IV (387–493)</option>
    <option value="5">Geração V (494–649)</option>
    <option value="6">Geração VI (650–721)</option>
    <option value="7">Geração VII (722–809)</option>
    <option value="8">Geração VIII (810–905)</option>
    <option value="9">Geração IX (906–1025)</option>
  </select>
</div>

<div class="app-layout">
  <aside class="pokemon-list" id="pokemon-list">
    <div class="list-header">
      <span>POKÉMON</span>
      <span id="count-label">Carregando…</span>
    </div>
    <div id="list-body">
      <div class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">CARREGANDO REGISTROS…</div>
      </div>
    </div>
  </aside>

  <main class="detail-panel" id="detail-panel">
    <div class="empty-state">
      <div class="big-icon">⚜</div>
      <p>Selecione um Pokémon para consultar</p>
    </div>
  </main>
</div>

<script>
const TYPE_COLORS = {
  normal:   { bg:'#8a8a7a', text:'#fff' },
  fire:     { bg:'#c64228', text:'#fff' },
  water:    { bg:'#3a6dcc', text:'#fff' },
  electric: { bg:'#b89200', text:'#000' },
  grass:    { bg:'#4a8a30', text:'#fff' },
  ice:      { bg:'#4a9aaa', text:'#fff' },
  fighting: { bg:'#8a2a28', text:'#fff' },
  poison:   { bg:'#7a3a9a', text:'#fff' },
  ground:   { bg:'#9a7a30', text:'#fff' },
  flying:   { bg:'#5a5aaa', text:'#fff' },
  psychic:  { bg:'#c0326a', text:'#fff' },
  bug:      { bg:'#6a8a20', text:'#fff' },
  rock:     { bg:'#8a7a3a', text:'#fff' },
  ghost:    { bg:'#4a4a8a', text:'#fff' },
  dragon:   { bg:'#4a20c8', text:'#fff' },
  dark:     { bg:'#3a2a2a', text:'#fff' },
  steel:    { bg:'#7a8a9a', text:'#fff' },
  fairy:    { bg:'#c870a0', text:'#fff' },
};

const TYPE_NAMES_PT = {
  normal:'Normal', fire:'Fogo', water:'Água', electric:'Elétrico',
  grass:'Grama', ice:'Gelo', fighting:'Lutador', poison:'Veneno',
  ground:'Terra', flying:'Voador', psychic:'Psíquico', bug:'Inseto',
  rock:'Pedra', ghost:'Fantasma', dragon:'Dragão', dark:'Sombrio',
  steel:'Aço', fairy:'Fada',
};

const STAT_NAMES = {
  hp:'PV', attack:'Ataque', defense:'Defesa',
  'special-attack':'At. Esp.', 'special-defense':'Def. Esp.', speed:'Velocidade',
};

const STAT_COLORS = { hp:'#e05050', attack:'#e07030', defense:'#e0b030',
  'special-attack':'#7070e0', 'special-defense':'#4aaa6a', speed:'#e04aaa' };

const GEN_RANGES = [
  [0,0],[1,151],[152,251],[252,386],[387,493],[494,649],[650,721],[722,809],[810,905],[906,1025]
];

// Damage chart
const TYPE_CHART = {
  normal:   {rock:.5,ghost:0,steel:.5},
  fire:     {fire:.5,water:.5,grass:2,ice:2,bug:2,rock:.5,dragon:.5,steel:2},
  water:    {fire:2,water:.5,grass:.5,ground:2,rock:2,dragon:.5},
  electric: {water:2,electric:.5,grass:.5,ground:0,flying:2,dragon:.5},
  grass:    {fire:.5,water:2,grass:.5,poison:.5,ground:2,flying:.5,bug:.5,rock:2,dragon:.5,steel:.5},
  ice:      {fire:.5,water:.5,grass:2,ice:.5,ground:2,flying:2,dragon:2,steel:.5},
  fighting: {normal:2,ice:2,poison:.5,flying:.5,psychic:.5,bug:.5,rock:2,ghost:0,dark:2,steel:2,fairy:.5},
  poison:   {grass:2,poison:.5,ground:.5,rock:.5,ghost:.5,steel:0,fairy:2},
  ground:   {fire:2,electric:2,grass:.5,poison:2,flying:0,bug:.5,rock:2,steel:2},
  flying:   {electric:.5,grass:2,fighting:2,bug:2,rock:.5,steel:.5},
  psychic:  {fighting:2,poison:2,psychic:.5,dark:0,steel:.5},
  bug:      {fire:.5,grass:2,fighting:.5,poison:.5,flying:.5,psychic:2,ghost:.5,dark:2,steel:.5,fairy:.5},
  rock:     {fire:2,ice:2,fighting:.5,ground:.5,flying:2,bug:2,steel:.5},
  ghost:    {normal:0,fighting:0,poison:.5,bug:.5,ghost:2,dark:.5},
  dragon:   {dragon:2,steel:.5,fairy:0},
  dark:     {fighting:.5,psychic:2,ghost:2,dark:.5,fairy:.5},
  steel:    {fire:.5,water:.5,electric:.5,ice:2,rock:2,steel:.5,fairy:2},
  fairy:    {fire:.5,fighting:2,poison:.5,dragon:2,dark:2,steel:.5},
};

function calcDamage(types) {
  const mults = {};
  for (const atk of Object.keys(TYPE_CHART)) mults[atk] = 1;
  for (const defType of types) {
    for (const [atk, m] of Object.entries(TYPE_CHART)) {
      if (TYPE_CHART[atk][defType] !== undefined) mults[atk] *= TYPE_CHART[atk][defType];
    }
  }
  const groups = { 0: [], 0.25: [], 0.5: [], 1: [], 2: [], 4: [] };
  for (const [t, m] of Object.entries(mults)) {
    const key = m === 0 ? 0 : m <= 0.26 ? 0.25 : m <= 0.51 ? 0.5 : m <= 1 ? 1 : m <= 2 ? 2 : 4;
    groups[key].push(t);
  }
  return groups;
}

function typeBadge(type, small = false) {
  const c = TYPE_COLORS[type] || { bg:'#555', text:'#fff' };
  const name = TYPE_NAMES_PT[type] || type;
  return `<span class="type-badge" style="background:${c.bg};color:${c.text}">${name.toUpperCase()}</span>`;
}

function statBar(name, val) {
  const pct = Math.min(100, (val / 255) * 100);
  const color = STAT_COLORS[name] || '#aaa';
  return `
    <div class="stat-row">
      <span class="stat-name">${STAT_NAMES[name] || name}</span>
      <span class="stat-num">${val}</span>
      <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
}



// State
let allPokemon = [];
let filtered = [];
let cache = {};

async function fetchList() {
  const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
  const data = await res.json();
  allPokemon = data.results.map((p, i) => ({ ...p, id: i + 1 }));
  filtered = [...allPokemon];
  renderList();
}

function renderList() {
  const lb = document.getElementById('list-body');
  document.getElementById('count-label').textContent = `${filtered.length} registros`;
  if (filtered.length === 0) {
    lb.innerHTML = `<div class="loading-overlay"><p class="loading-text">NENHUM RESULTADO</p></div>`;
    return;
  }
  lb.innerHTML = filtered.map(p => `
    <div class="pokemon-item" data-id="${p.id}" onclick="loadPokemon(${p.id})">
      <span class="item-num">#${String(p.id).padStart(4,'0')}</span>
      <img class="item-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png"
           onerror="this.src=''" loading="lazy" alt="${p.name}">
      <span class="item-name">${p.name.toUpperCase().replace(/-/g,' ')}</span>
    </div>`).join('');
}

async function loadPokemon(id) {
  // Mark active
  document.querySelectorAll('.pokemon-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.pokemon-item[data-id="${id}"]`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block:'nearest', behavior:'smooth' }); }

  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `<div class="loading-overlay"><div class="spinner"></div><div class="loading-text">CONSULTANDO REGISTROS…</div></div>`;

  try {
    if (!cache[id]) {
      const [pRes, sRes] = await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${id}`),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)
      ]);
      const pData = await pRes.json();
      const sData = await sRes.json();
      cache[id] = { pData, sData };
    }
    const { pData, sData } = cache[id];
    renderDetail(pData, sData);
  } catch (e) {
    panel.innerHTML = `<div class="empty-state"><div class="big-icon">⚠</div><p>Erro ao carregar dados</p></div>`;
  }
}

async function renderDetail(p, s) {
  const panel = document.getElementById('detail-panel');
  const types = p.types.map(t => t.type.name);
  const bst = p.stats.reduce((a, b) => a + b.base_stat, 0);

  // Gender
  const genderRate = s.gender_rate;
  let genderHtml = '';
  if (genderRate === -1) genderHtml = '<span>⚲ Sem gênero</span>';
  else {
    const f = (genderRate / 8 * 100).toFixed(0);
    const m = (100 - f).toFixed(0);
    genderHtml = `<span style="color:#7ab0ff">♂ ${m}%</span><span style="color:#ff7aaa">♀ ${f}%</span>`;
  }

  // Egg groups
  const eggs = s.egg_groups.map(e => e.name.charAt(0).toUpperCase() + e.name.slice(1)).join(', ');

  // Flavor text (PT or EN)
  let flavor = s.flavor_text_entries.find(f => f.language.name === 'pt-BR')
    || s.flavor_text_entries.find(f => f.language.name === 'pt')
    || s.flavor_text_entries.find(f => f.language.name === 'en');
  const flavorText = flavor ? flavor.flavor_text.replace(/\f/g,' ').replace(/\n/g,' ') : '';

  // Abilities
  const abilitiesHtml = await Promise.all(p.abilities.map(async a => {
    let desc = '';
    try {
      const ar = await fetch(a.ability.url);
      const ad = await ar.json();
      const entry = ad.effect_entries.find(e => e.language.name === 'en');
      desc = entry ? entry.short_effect : '';
    } catch {}
    const hidden = a.is_hidden;
    return `
      <div class="ability-card">
        ${hidden ? '<span class="ha-badge">HA</span>' : '<span style="min-width:32px"></span>'}
        <div>
          <div class="ability-name ${hidden?'hidden':''}">${a.ability.name.toUpperCase().replace(/-/g,' ')}</div>
          <div class="ability-desc">${desc || '—'}</div>
        </div>
      </div>`;
  }));

  // Damage table
  const dmg = calcDamage(types);
  const dmgHtml = [0, 0.25, 0.5, 2, 4].filter(k => dmg[k]?.length).map(k => `
    <div class="damage-row">
      <span class="damage-mult">×${k}</span>
      <div class="damage-types">${dmg[k].map(t => typeBadge(t)).join('')}</div>
    </div>`).join('');

  // Evolution chain
  let evoHtml = '';
  try {
    const chainUrl = s.evolution_chain.url;
    const chainRes = await fetch(chainUrl);
    const chainData = await chainRes.json();
    evoHtml = await buildEvoChain(chainData.chain);
  } catch {}



  panel.innerHTML = `
    <div class="detail-hero">
      <div class="hero-sprites">
        <img class="main-sprite" id="main-sprite"
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png"
          onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"
          alt="${p.name}">
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <img class="shiny-sprite" title="Versão Shiny"
            src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${p.id}.png"
            onclick="toggleShiny(${p.id})" alt="shiny">
          <span class="shiny-label">✦ SHINY</span>
        </div>
      </div>
      <div class="hero-info">
        <div class="dex-number">#${String(p.id).padStart(4,'0')}</div>
        <div class="pokemon-name">${p.name.toUpperCase().replace(/-/g,' ')}</div>
        <div class="type-badges">${types.map(t => typeBadge(t)).join('')}</div>
        <div class="classification">${s.genera?.find(g=>g.language.name==='en')?.genus || 'Pokémon'}</div>
        <div class="extra-info-row">
          <div class="info-pill">
            <span class="info-pill-label">Altura</span>
            <span class="info-pill-value">${(p.height * 10)} cm</span>
          </div>
          <div class="info-pill">
            <span class="info-pill-label">Peso</span>
            <span class="info-pill-value">${(p.weight / 10)} kg</span>
          </div>
          <div class="info-pill">
            <span class="info-pill-label">Grupos de Ovo</span>
            <span class="info-pill-value">${eggs}</span>
          </div>
        </div>
        <div class="gender-info">${genderHtml}</div>

        <div class="rpg-stats-grid">
          ${p.stats.map(s => `
          <div class="rpg-cell">
            <div class="rpg-label">${STAT_NAMES[s.stat.name] || s.stat.name}</div>
            <div class="rpg-value" style="color:${STAT_COLORS[s.stat.name] || 'var(--gold)'}">${s.base_stat}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="detail-body">
      ${flavorText ? `
      <div>
        <div class="section-title">Lore do Reino</div>
        <div class="flavor-box">"${flavorText}"</div>
      </div>` : ''}

      <div>
        <div class="section-title">Habilidades</div>
        <div class="ability-list">${abilitiesHtml.join('')}</div>
      </div>

      <div>
        <div class="section-title">Atributos Base <span style="font-size:.65rem;color:var(--text-dim);font-family:var(--ff-mono)">BST ${bst}</span></div>
        <div class="base-stats">
          ${p.stats.map(s => statBar(s.stat.name, s.base_stat)).join('')}
        </div>
      </div>

      <div>
        <div class="section-title">Resistências e Fraquezas</div>
        <div class="damage-section">
          <div class="damage-header">Dano Recebido</div>
          <div class="damage-body">${dmgHtml}</div>
        </div>
      </div>

      ${evoHtml ? `
      <div>
        <div class="section-title">Cadeia Evolutiva</div>
        <div class="evo-chain">${evoHtml}</div>
      </div>` : ''}
    </div>`;
}

let shinyToggle = {};
function toggleShiny(id) {
  const img = document.getElementById('main-sprite');
  if (!img) return;
  shinyToggle[id] = !shinyToggle[id];
  if (shinyToggle[id]) {
    img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/${id}.png`;
  } else {
    img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
  }
}

async function buildEvoChain(chain, nodes = []) {
  const name = chain.species.name;
  const id = chain.species.url.split('/').filter(Boolean).pop();
  const details = chain.evolution_details?.[0];

  nodes.push({ name, id, details });

  if (chain.evolves_to.length === 0) {
    return nodes.map((n, i) => {
      let arrow = '';
      if (i > 0 && nodes[i-1]) {
        const d = n.details;
        let method = '';
        if (d) {
          if (d.min_level) method = `Nv. ${d.min_level}`;
          else if (d.item) method = d.item.name.replace(/-/g,' ');
          else if (d.trigger?.name === 'use-item') method = 'Item';
          else if (d.trigger?.name === 'trade') method = 'Troca';
          else if (d.happiness) method = `Ami. ${d.min_happiness}`;
          else method = d.trigger?.name || '';
        }
        arrow = `<div class="evo-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          <span class="evo-method">${method.toUpperCase()}</span>
        </div>`;
      }
      return `${arrow}<div class="evo-node" onclick="loadPokemon(${n.id})">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${n.id}.png" alt="${n.name}">
        <span class="evo-name">${n.name.replace(/-/g,' ')}</span>
      </div>`;
    }).join('');
  }

  // branching: pick first
  return buildEvoChain(chain.evolves_to[0], nodes);
}

// Search + filter
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const gen = parseInt(document.getElementById('gen-filter').value);
  const [gMin, gMax] = gen === 0 ? [1, 9999] : GEN_RANGES[gen];

  filtered = allPokemon.filter(p => {
    const nameMatch = !q || p.name.includes(q) || String(p.id).includes(q);
    const genMatch = p.id >= gMin && p.id <= gMax;
    return nameMatch && genMatch;
  });
  renderList();
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('gen-filter').addEventListener('change', applyFilters);

fetchList();
</script>

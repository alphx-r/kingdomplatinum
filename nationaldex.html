<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NationalDex — PKMN Kingdom Platinum</title>
<link rel="icon" href="https://64.media.tumblr.com/c429cb57b048b0ba1d90c6451d7c3aa1/8607b48e6654212e-0d/s540x810/c1f9956cc78935a32f53346f3a7a942caa5d1d67.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#1a3a5c;--brand-mid:#2563a8;--brand-light:#e8f0fb;
  --accent:#e8a020;--bg:#f4f6fa;--surface:#fff;--surface2:#f0f3f8;
  --border:#dde3ee;--text:#1a1f2e;--muted:#6b7a99;
  --r:10px;--font-title:'Cinzel',serif;--font-body:'Nunito',sans-serif;
}
html,body{min-height:100%;background:var(--bg);font-family:var(--font-body);color:var(--text)}

/* NAV */
.nav{display:flex;align-items:center;gap:10px;padding:0 20px;height:56px;background:var(--brand);position:sticky;top:0;z-index:900;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.nav img{height:30px;object-fit:contain}
.nav-title{font-family:var(--font-title);font-size:12px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:1.5px;text-transform:uppercase}
.nav-back{margin-left:auto;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:#fff;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.nav-back:hover{background:rgba(255,255,255,.15)}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loading.gone{display:none}
.spinner{width:38px;height:38px;border:3px solid rgba(0,0,0,.1);border-top-color:var(--brand-mid);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-msg{font-size:13px;color:var(--muted);font-weight:600}

/* VIEWS */
.view{display:none}.view.active{display:block}

/* LIST */
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
.dex-hd{text-align:center;margin-bottom:22px}
.dex-hd h1{font-family:var(--font-title);font-size:24px;font-weight:700;color:var(--brand);letter-spacing:2px}
.dex-hd p{font-size:13px;color:var(--muted);margin-top:5px}
.count-badge{display:inline-flex;gap:4px;background:var(--brand-light);color:var(--brand-mid);border:1.5px solid var(--border);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;margin-top:8px}

/* REGION TABS */
.rtabs{display:flex;gap:5px;flex-wrap:wrap;padding:10px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:16px;position:sticky;top:56px;z-index:100}
.rtab{padding:5px 12px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface2);font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.rtab:hover{border-color:var(--brand-mid);color:var(--brand-mid)}
.rtab.on{background:var(--brand-mid);border-color:var(--brand-mid);color:#fff}
.rtab.special{border-color:var(--accent);color:var(--accent)}
.rtab.special.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* SEARCH */
.search-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:16px;position:relative}
.search-box input{width:100%;padding:9px 14px 9px 36px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-family:var(--font-body);font-size:13px;color:var(--text);outline:none}
.search-box input:focus{border-color:var(--brand-mid);background:#fff}
.search-icon{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

/* SECTIONS */
.section{margin-bottom:26px;animation:fadeUp .3s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid var(--border)}
.section-title{font-family:var(--font-title);font-size:13px;font-weight:700;color:var(--brand);letter-spacing:.8px}
.section-count{font-size:11px;color:var(--muted);font-weight:600}

/* CARD GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:9px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 8px 9px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;animation:fadeUp .3s both}
.card:hover{border-color:var(--brand-mid);transform:translateY(-3px);box-shadow:0 6px 18px rgba(37,99,168,.14)}
.card-num{font-size:9px;font-weight:700;color:var(--muted);font-family:var(--font-title);letter-spacing:.5px}
.card img{width:78px;height:78px;object-fit:contain}
.card-name{font-family:var(--font-title);font-size:10px;font-weight:600;color:var(--text);text-align:center;line-height:1.3;min-height:22px;display:flex;align-items:center;justify-content:center}
.card-types{display:flex;gap:3px;flex-wrap:wrap;justify-content:center}
.card-rar{position:absolute;top:5px;right:5px}

/* TYPE PILLS */
.tp{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px}
.t-fire{background:#ff9b4a;color:#7a2a00}.t-water{background:#6ab8ff;color:#003a6a}.t-grass{background:#78d878;color:#1a5a1a}
.t-normal{background:#c8c8a0;color:#4a4a2a}.t-electric{background:#ffe030;color:#5a4a00}.t-psychic{background:#ff8fb0;color:#6a0030}
.t-steel{background:#aababb;color:#2a3a3a}.t-fairy{background:#ffaad8;color:#6a0050}.t-ghost{background:#9090c0;color:#1a1a4a}
.t-dragon{background:#7060f0;color:#fff}.t-ice{background:#96d8d8;color:#1a4a4a}.t-fighting{background:#c03030;color:#fff}
.t-rock{background:#b8a050;color:#3a2a00}.t-ground{background:#e0c060;color:#3a2a00}.t-poison{background:#a060c0;color:#fff}
.t-bug{background:#a0c020;color:#2a3a00}.t-dark{background:#705040;color:#fff}.t-flying{background:#88aaee;color:#1a1a5a}
.t-light{background:#e8c832;color:#5a3d00}.t-scent{background:#3cb87a;color:#fff}

/* RARITY */
.rb{display:inline-block;font-size:8px;font-weight:800;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.4px}
.rc{background:#e0f0e0;color:#1a6a1a}.ri{background:#dde8f8;color:#1a4a8a}.rr{background:#f0e8ff;color:#5a1a9a}.rrr{background:#fff0d8;color:#8a4a00}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty h3{font-family:var(--font-title);font-size:15px;color:var(--text);margin-bottom:6px}

/* DETAIL */
.det-wrap{max-width:900px;margin:0 auto;padding:20px 16px 60px}
.det-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:rgba(255,255,255,.8);background:rgba(255,255,255,.12);border:none;cursor:pointer;padding:7px 14px;border-radius:20px;margin-bottom:18px;font-family:var(--font-body)}
.det-back:hover{background:rgba(255,255,255,.22)}
.det-main{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden;display:grid;grid-template-columns:210px 1fr}
.det-sprite-col{background:var(--surface2);display:flex;flex-direction:column;align-items:center;padding:18px 14px 22px;gap:10px;border-right:1.5px solid var(--border)}
.det-num{font-family:var(--font-title);font-size:12px;color:var(--muted);letter-spacing:1px}
.det-sprite{width:170px;height:170px;object-fit:contain}
.det-type-icons{display:flex;gap:8px;justify-content:center}
.det-type-icon{width:22px;height:22px;object-fit:contain}
.det-info{display:flex;flex-direction:column}
.det-namebar{background:var(--brand);color:#fff;font-family:var(--font-title);font-size:18px;font-weight:700;letter-spacing:1.5px;padding:13px 60px;text-align:center;position:relative}
.det-nav{position:absolute;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 7px;background:none;border:none;border-radius:6px;font-family:var(--font-body);font-size:9px;font-weight:700;color:rgba(255,255,255,.75);cursor:pointer}
.det-nav:hover{background:rgba(255,255,255,.18);color:#fff}
.det-nav.prev{left:8px}.det-nav.next{right:8px}
.det-nav .arr{font-size:16px;line-height:1}
.det-nav .nn{font-family:var(--font-title);font-size:8px;color:rgba(255,255,255,.6)}
.det-nav .nm{font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48px;text-align:center}
.det-table{width:100%;border-collapse:collapse}
.det-table tr{border-bottom:1px solid var(--border)}
.det-table tr:last-child{border-bottom:none}
.det-table td{padding:7px 14px;font-size:13px;vertical-align:middle}
.det-table td:first-child{font-weight:700;color:var(--muted);width:38%;font-size:11px;letter-spacing:.4px;text-transform:uppercase}
.block{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.block-title{background:var(--brand);color:#fff;text-align:center;font-family:var(--font-title);font-size:10px;letter-spacing:1.5px;padding:7px;font-weight:600}
.stats-row{display:flex}
.stat{flex:1;text-align:center;padding:12px 3px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-lbl{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.stat-val{font-family:var(--font-title);font-size:15px;font-weight:700;color:var(--brand-mid)}
.stat-bar{height:4px;background:var(--border);border-radius:2px;margin-top:3px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;background:var(--brand-mid)}
.rpg-row{display:flex}
.rpg-cell{flex:1;text-align:center;padding:13px 3px;border-right:1px solid var(--border)}
.rpg-cell:last-child{border-right:none}
.rpg-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.rpg-val{font-family:var(--font-title);font-size:14px;font-weight:700;color:var(--brand-mid)}
.dmg-tbl{width:100%;border-collapse:collapse}
.dmg-tbl th{padding:5px 2px;text-align:center;font-size:8px;font-weight:800;text-transform:uppercase;border-right:1px solid var(--border)}
.dmg-tbl td{padding:5px 2px;text-align:center;font-size:11px;font-weight:700;border-right:1px solid var(--border)}
.dmg-tbl th:last-child,.dmg-tbl td:last-child{border-right:none}
.d0{color:#aaa}.dh{color:#1a7a1a;background:#e0f0e0}.d2{color:#c03030;background:#fde8e8}.d4{color:#7a0000;background:#f8b0b0}.d1{color:var(--muted)}
.evo-inner{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;padding:18px;gap:0;row-gap:6px}
.evo-stage{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 12px;cursor:pointer}
.evo-stage:hover img{transform:scale(1.08)}
.evo-stage img{width:76px;height:76px;object-fit:contain;transition:transform .2s}
.evo-stage-name{font-family:var(--font-title);font-size:10px;color:var(--text);text-align:center}
.evo-stage.cur img{filter:drop-shadow(0 0 6px rgba(37,99,168,.5))}
.evo-stage.cur .evo-stage-name{color:var(--brand-mid)}
.evo-arrow{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 6px}
.evo-arrow-icon{font-size:18px;color:var(--muted)}
.evo-arrow-lbl{font-size:9px;color:var(--muted);font-weight:700;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 6px;white-space:nowrap}
.bio-inner{display:flex;gap:14px;padding:14px 18px;align-items:flex-start}
.bio-sprite{width:76px;height:76px;object-fit:contain;flex-shrink:0}
.flavor{background:var(--surface2);border-left:3px solid var(--brand-mid);padding:9px 13px;border-radius:0 5px 5px 0;font-style:italic;font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:6px}
.mv-tabs{display:flex;border-bottom:1.5px solid var(--border)}
.mv-tab{flex:1;padding:8px;text-align:center;font-family:var(--font-body);font-size:11px;font-weight:700;color:var(--muted);background:var(--surface2);border:none;cursor:pointer;border-right:1px solid var(--border)}
.mv-tab:last-child{border-right:none}
.mv-tab.on{background:var(--surface);color:var(--brand-mid)}
.mv-panel{display:none}.mv-panel.on{display:block}
.mv-tbl{width:100%;border-collapse:collapse;font-size:12px}
.mv-tbl th{background:var(--surface2);font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:6px 10px;text-align:left;border-bottom:1.5px solid var(--border)}
.mv-tbl td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.mv-tbl tr:last-child td{border-bottom:none}
.mv-tbl tr:hover td{background:var(--surface2)}
.mv-tbl td.lvl{font-family:var(--font-title);font-weight:700;color:var(--brand-mid);text-align:center;width:50px}
.mv-tbl td.mn{font-weight:700}
.mv-empty{padding:18px;text-align:center;color:var(--muted);font-size:13px}
.iload{display:flex;align-items:center;gap:10px;padding:28px 18px;color:var(--muted);font-size:13px;font-weight:600}
.ispin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--brand-mid);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

@media(max-width:600px){
  .det-main{grid-template-columns:1fr}
  .det-sprite-col{border-right:none;border-bottom:1.5px solid var(--border)}
  .det-wrap,.wrap{padding:12px 10px 50px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px}
  .card img{width:66px;height:66px}
  .nav-title{display:none}
  .rtabs{top:56px}
  .bio-inner{flex-direction:column}
}
@media(max-width:380px){.grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

  return r;
}

var TYPE_NAV = {fire:'#8a3800',water:'#1a5a8a',grass:'#1a6a20',electric:'#8a6a00',psychic:'#7a1a5a',ghost:'#2a1a5a',dragon:'#3a1a9a',ice:'#1a5a6a',fighting:'#7a1a1a',dark:'#2a2018',steel:'#3a4a5a',poison:'#5a1a7a',ground:'#6a4a10',rock:'#4a3a10',bug:'#3a5a00',fairy:'#7a1a5a',flying:'#1a3a7a',normal:'#3a3a2a'};

// STATE
var allPokemon = [];
var activeRegion = 'all';
var navBrand = '#1a3a5c';

function slugify(s) { return (s||'').toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,''); }
function tp(t) { return '<span class="tp ' + (TCLS[t]||'t-normal') + '">' + (TLB[t]||t) + '</span>'; }
function rb(r) { return r ? '<span class="rb ' + (RCLS[r]||'rc') + '">' + (RLBL[r]||r) + '</span>' : ''; }
function setMsg(m) { var el = document.getElementById('load-msg'); if(el) el.textContent = m; }
function hideLoading() { var el = document.getElementById('loading'); if(el) el.classList.add('gone'); }
function showView(id) {
  var views = document.querySelectorAll('.view');
  for (var i = 0; i < views.length; i++) views[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}
function setNav(col) { document.getElementById('main-nav').style.background = col || navBrand; }

// REGION
function getRegionId(p) {
  var name = (p.nome || '').toLowerCase().trim();
  for (var i = 0; i < CUSTOM_PREFIX.length; i++) {
    if (name.indexOf(CUSTOM_PREFIX[i].prefix) === 0) return CUSTOM_PREFIX[i].id;
  }
  var num = p.numero;
  if (num) {
    for (var j = 0; j < OFFICIAL_REGIONS.length; j++) {
      if (num >= OFFICIAL_REGIONS[j].min && num <= OFFICIAL_REGIONS[j].max) return OFFICIAL_REGIONS[j].id;
    }
  }
  return 'outros';
}

// DEDUP — keep one entry per exact name; prefer entry with sprite, then with numero
function deduplicate(pokes) {
  var seen = {};
  pokes.forEach(function(p) {
    var key = (p.nome || '').toLowerCase().trim();
    if (!key || key === '???') return;
    if (!seen[key]) { seen[key] = p; return; }
    var ex = seen[key];
    if ((!ex.sprite && p.sprite) || (!ex.numero && p.numero)) seen[key] = p;
  });
  var out = [];
  for (var k in seen) out.push(seen[k]);
  return out;
}

// SUPABASE FETCH
function sbFetch(path) {
  return new Promise(function(resolve) {
    var timeout = setTimeout(function() { resolve(null); }, 8000);
    fetch(SUPA_URL + '/rest/v1/' + path, {
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json'
      }
    }).then(function(res) {
      clearTimeout(timeout);
      if (!res.ok) { resolve(null); return; }
      return res.json();
    }).then(function(data) {
      resolve(data || null);
    }).catch(function() {
      clearTimeout(timeout);
      resolve(null);
    });
  });
}

function fetchAllPages(query) {
  return new Promise(function(resolve) {
    var all = [];
    var offset = 0;
    var pageSize = 200;
    function nextPage() {
      var path = 'pokemons?' + query + '&limit=' + pageSize + '&offset=' + offset;
      sbFetch(path).then(function(page) {
        if (!page || !Array.isArray(page) || page.length === 0) { resolve(all); return; }
        all = all.concat(page);
        setMsg(all.length + ' Pokémon carregados…');
        if (page.length < pageSize) { resolve(all); return; }
        offset += pageSize;
        nextPage();
      });
    }
    nextPage();
  });
}

// REGION TABS
function buildTabs() {
  var counts = {all: allPokemon.length};
  allPokemon.forEach(function(p) {
    var rid = getRegionId(p);
    counts[rid] = (counts[rid] || 0) + 1;
  });

  var html = '<button class="rtab' + (activeRegion==='all'?' on':'') + '" onclick="setRegion(\'all\',this)">Todos (' + allPokemon.length + ')</button>';

  OFFICIAL_REGIONS.forEach(function(reg) {
    var c = counts[reg.id] || 0;
    if (!c) return;
    var on = activeRegion === reg.id ? ' on' : '';
    html += '<button class="rtab' + on + '" onclick="setRegion(\'' + reg.id + '\',this)">' + reg.label + ' (' + c + ')</button>';
  });

  CUSTOM_PREFIX.forEach(function(reg) {
    var c = counts[reg.id] || 0;
    if (!c) return;
    var on = activeRegion === reg.id ? ' on special' : ' special';
    html += '<button class="rtab' + on + '" onclick="setRegion(\'' + reg.id + '\',this)">' + reg.label + ' (' + c + ')</button>';
  });

  var otherC = counts['outros'] || 0;
  if (otherC) {
    var on = activeRegion === 'outros' ? ' on' : '';
    html += '<button class="rtab' + on + '" onclick="setRegion(\'outros\',this)">Outros (' + otherC + ')</button>';
  }

  document.getElementById('rtabs').innerHTML = html;
}

function setRegion(r, btn) {
  activeRegion = r;
  var tabs = document.querySelectorAll('.rtab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove('on');
    if (tabs[i].classList.contains('special')) tabs[i].className = 'rtab special';
    else tabs[i].className = 'rtab';
  }
  if (btn.classList.contains('special')) btn.className = 'rtab special on';
  else btn.className = 'rtab on';
  applyFilters();
}

// FILTERS + RENDER
function applyFilters() {
  var query = (document.getElementById('srch').value || '').toLowerCase().trim();
  var filtered = allPokemon.filter(function(p) {
    if (query && p.nome.toLowerCase().indexOf(query) === -1) return false;
    if (activeRegion === 'all') return true;
    return getRegionId(p) === activeRegion;
  });
  document.getElementById('cv').textContent = filtered.length;
  renderCards(filtered);
}

function renderCards(list) {
  var out = document.getElementById('output');
  if (!list.length) {
    out.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><h3>Nenhum Pokémon encontrado</h3><p>Tente outro filtro ou busca.</p></div>';
    return;
  }
  var byRar = {};
  RAR_ORDER.forEach(function(r) { byRar[r] = []; });
  byRar['outro'] = [];
  list.forEach(function(p) {
    if (byRar[p.raridade]) byRar[p.raridade].push(p);
    else byRar['outro'].push(p);
  });

  var html = '';
  RAR_ORDER.forEach(function(r, ri) {
    var group = byRar[r];
    if (!group.length) return;
    group.sort(function(a, b) { return a.nome.localeCompare(b.nome, 'pt-BR'); });
    html += '<div class="section" style="animation-delay:' + (ri * 0.04) + 's">';
    html += '<div class="section-hd"><span class="rb ' + (RCLS[r]||'rc') + '" style="font-size:11px;padding:3px 10px">' + RLFULL[r] + '</span><span class="section-count">' + group.length + ' Pokémon</span></div>';
    html += '<div class="grid">' + group.map(function(p, ci) { return cardHTML(p, ci); }).join('') + '</div>';
    html += '</div>';
  });
  if (byRar['outro'].length) {
    var g = byRar['outro'];
    g.sort(function(a,b){return a.nome.localeCompare(b.nome,'pt-BR');});
    html += '<div class="section"><div class="section-hd"><span class="section-title">Outros</span><span class="section-count">' + g.length + '</span></div>';
    html += '<div class="grid">' + g.map(function(p,ci){return cardHTML(p,ci);}).join('') + '</div></div>';
  }
  out.innerHTML = html;
}

function cardHTML(p, ci) {
  var num = p.numero ? '#' + String(p.numero).padStart(3,'0') : '';
  var types = (p.tipos || []).map(tp).join('');
  var spr = p.sprite || FALLBACK;
  var slug = slugify(p.nome);
  return '<div class="card" onclick="openDetail(\'' + slug + '\')" style="animation-delay:' + Math.min(ci * 0.015, 0.3) + 's">' +
    (num ? '<div class="card-num">' + num + '</div>' : '') +
    (rb(p.raridade) ? '<div class="card-rar">' + rb(p.raridade) + '</div>' : '') +
    '<img src="' + spr + '" alt="' + p.nome + '" loading="lazy" onerror="this.src=\'' + FALLBACK + '\'">' +
    '<div class="card-name">' + p.nome + '</div>' +
    '<div class="card-types">' + types + '</div>' +
    '</div>';
}

// ROUTING
function openDetail(slug) {
  history.pushState({slug: slug}, '', '?pokemon=' + slug);
  showView('view-detail');
  setNav(null);
  renderDetail(slug);
  window.scrollTo(0, 0);
}
function backToList() {
  history.pushState({}, '', location.pathname);
  showView('view-list');
  setNav(navBrand);
  window.scrollTo(0, 0);
}
window.addEventListener('popstate', function(e) {
  if (e.state && e.state.slug) { showView('view-detail'); renderDetail(e.state.slug); }
  else { showView('view-list'); setNav(navBrand); }
});

// DETAIL
function renderDetail(slug) {
  var root = document.getElementById('det-content');
  root.innerHTML = '<div class="iload"><div class="ispin"></div>Carregando…</div>';
  var p = null;
  for (var i = 0; i < allPokemon.length; i++) {
    if (slugify(allPokemon[i].nome) === slug) { p = allPokemon[i]; break; }
  }
  if (!p) { root.innerHTML = '<div class="empty"><div class="empty-icon">❓</div><h3>Pokémon não encontrado</h3></div>'; return; }

  document.title = p.nome + ' — NationalDex';
  var tipos = (p.tipos || []).map(function(t){ return t.toLowerCase(); });
  var primary = tipos[0] || 'normal';
  setNav(TYPE_NAV[primary] || navBrand);

  // Fetch PokéAPI
  var apiId = p.numero || slugify(p.nome).replace(/-+/g, '-');
  var pokeData = null, speciesData = null, evoData = null;

  Promise.all([
    fetch('https://pokeapi.co/api/v2/pokemon/' + apiId).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
  ]).then(function(results) {
    pokeData = results[0];
    var sp = pokeData && pokeData.species && pokeData.species.url;
    if (!sp) return Promise.resolve([null]);
    return fetch(sp).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }).then(function(sd){
      speciesData = sd;
      var ev = sd && sd.evolution_chain && sd.evolution_chain.url;
      if (!ev) return null;
      return fetch(ev).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; });
    });
  }).then(function(ed) {
    evoData = ed;
    buildDetailHTML(root, p, tipos, slug, pokeData, speciesData, evoData);
  }).catch(function() {
    buildDetailHTML(root, p, tipos, slug, null, null, null);
  });
}

function buildDetailHTML(root, p, tipos, slug, pokeData, speciesData, evoData) {
  var num = p.numero ? '#' + String(p.numero).padStart(3,'0') : '';
  var altura = pokeData ? Math.round(pokeData.height * 10) + ' cm' : '—';
  var peso   = pokeData ? Math.round(pokeData.weight / 10 * 10) / 10 + ' kg' : '—';
  var genus  = speciesData ? ((speciesData.genera||[]).find(function(g){return g.language.name==='en';})||{}).genus || '' : '';
  var flavorArr = speciesData ? (speciesData.flavor_text_entries||[]).filter(function(f){return f.language.name==='en';}) : [];
  var flavor = flavorArr.length ? flavorArr[flavorArr.length-1].flavor_text.replace(/\f/g,' ') : '';
  var genderRate = speciesData ? (speciesData.gender_rate != null ? speciesData.gender_rate : -1) : -1;
  var genderStr = '—';
  if (genderRate === -1) genderStr = 'Genderless';
  else if (genderRate === 0) genderStr = '100% Macho';
  else if (genderRate === 8) genderStr = '100% Fêmea';
  else { var f = Math.round(genderRate/8*100); genderStr = (100-f) + '% Macho / ' + f + '% Fêmea'; }
  var eggGroups = speciesData ? (speciesData.egg_groups||[]).map(function(g){return g.name.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});}).join(', ') : '';

  // Stats
  var statsMap = {};
  if (pokeData) (pokeData.stats||[]).forEach(function(s){statsMap[s.stat.name]=s.base_stat;});
  var statDef = [{k:'hp',l:'HP'},{k:'attack',l:'Atk'},{k:'defense',l:'Def'},{k:'special-attack',l:'SpA'},{k:'special-defense',l:'SpD'},{k:'speed',l:'Vel'}];
  var statsHTML = pokeData ? '<div class="block"><div class="block-title">BASE STATS</div><div class="stats-row">' +
    statDef.map(function(s){
      var v = statsMap[s.k] || 0;
      var pct = Math.round(v/255*100);
      return '<div class="stat"><div class="stat-lbl">' + s.l + '</div><div class="stat-val">' + v + '</div><div class="stat-bar"><div class="stat-fill" style="width:' + pct + '%"></div></div></div>';
    }).join('') + '</div></div>' : '';

  // RPG
  var rpgHTML = (p.dado || p.ca != null || p.pv != null) ? '<div class="block"><div class="block-title">RPG</div><div class="rpg-row">' +
    (p.dado ? '<div class="rpg-cell"><div class="rpg-lbl">Dado</div><div class="rpg-val">' + p.dado + '</div></div>' : '') +
    (p.ca != null ? '<div class="rpg-cell"><div class="rpg-lbl">CA</div><div class="rpg-val">' + p.ca + '</div></div>' : '') +
    (p.pv != null ? '<div class="rpg-cell"><div class="rpg-lbl">PV</div><div class="rpg-val">' + p.pv + '</div></div>' : '') +
    '</div></div>' : '';

  // Damage
  var dmg = calcDmg(tipos);
  var dcls = {0:'d0',0.25:'dh',0.5:'dh',1:'d1',2:'d2',4:'d4'};
  var dlbl = {0:'0',0.25:'¼',0.5:'½',1:'1',2:'2',4:'4'};
  var dmgHTML = '<div class="block"><div class="block-title">DAMAGE TAKEN</div><table class="dmg-tbl"><tr>' +
    ATK_TYPES.map(function(t){return '<th>' + (TLB[t]||t) + '</th>';}).join('') + '</tr><tr>' +
    ATK_TYPES.map(function(t){var v=dmg[t]||1;return '<td class="' + (dcls[v]||'d1') + '">' + (dlbl[v]||v) + '</td>';}).join('') +
    '</tr></table></div>';

  // Evo
  var evoHTML = '';
  if (evoData && evoData.chain) {
    var stages = [];
    function parseChain(node) {
      var name = node.species.name;
      var ed = node.evolution_details && node.evolution_details[0];
      var trig = '';
      if (ed) {
        if (ed.min_level) trig = 'Nv. ' + ed.min_level;
        else if (ed.item) trig = ed.item.name.replace(/-/g,' ');
        else if (ed.trigger) trig = ed.trigger.name.replace(/-/g,' ');
      }
      var localP = null;
      for (var i=0;i<allPokemon.length;i++){if(slugify(allPokemon[i].nome)===name){localP=allPokemon[i];break;}}
      var sprId = (localP && localP.numero) || (node.species.url.match(/\/(\d+)\/$/) || [])[1];
      var spr = (localP && localP.sprite) || ('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/' + sprId + '.png');
      stages.push({name:name, spr:spr, trig:trig, lslug: localP ? slugify(localP.nome) : name});
      node.evolves_to.forEach(parseChain);
    }
    parseChain(evoData.chain);
    if (stages.length > 1) {
      var sh = '';
      stages.forEach(function(st, i) {
        var isCur = st.lslug === slug || st.name === slug;
        sh += '<div class="evo-stage' + (isCur?' cur':'') + '" onclick="openDetail(\'' + st.lslug + '\')">';
        sh += '<img src="' + st.spr + '" alt="' + st.name + '" onerror="this.src=\'' + FALLBACK + '\'"/>';
        sh += '<div class="evo-stage-name">' + st.name.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();}) + '</div></div>';
        if (i < stages.length-1) {
          sh += '<div class="evo-arrow"><div class="evo-arrow-icon">›</div>' + (stages[i+1].trig ? '<div class="evo-arrow-lbl">' + stages[i+1].trig + '</div>' : '') + '</div>';
        }
      });
      evoHTML = '<div class="block"><div class="block-title">EVOLUTIONARY CHAIN</div><div class="evo-inner">' + sh + '</div></div>';
    }
  }

  // Biology
  var shinyUrl = pokeData && pokeData.sprites && pokeData.sprites.other && pokeData.sprites.other['official-artwork'] ? pokeData.sprites.other['official-artwork'].front_shiny : null;
  var bioHTML = (flavor || shinyUrl) ? '<div class="block"><div class="block-title">BIOLOGY</div><div class="bio-inner">' +
    (shinyUrl ? '<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0"><img class="bio-sprite" src="' + shinyUrl + '" alt="shiny" onerror="this.style.display=\'none\'"/><span style="font-size:9px;font-weight:700;color:#c090e0;text-transform:uppercase;letter-spacing:.4px">✨ Shiny</span></div>' : '') +
    '<div>' + (flavor ? '<div class="flavor">' + flavor + '</div>' : '') + '</div></div></div>' : '';

  // Moves
  var lvlMoves = [], eggMoves = [], tutMoves = [];
  if (pokeData && pokeData.moves) {
    pokeData.moves.forEach(function(m) {
      var name = m.move.name.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
      m.version_group_details.forEach(function(v) {
        if (v.move_learn_method.name === 'level-up') lvlMoves.push({name:name,lvl:v.level_learned_at});
        else if (v.move_learn_method.name === 'egg') eggMoves.push(name);
        else if (v.move_learn_method.name === 'tutor') tutMoves.push(name);
      });
    });
    lvlMoves.sort(function(a,b){return a.lvl-b.lvl;});
    // dedupe
    var seen = {};
    lvlMoves = lvlMoves.filter(function(m){if(seen[m.name])return false;seen[m.name]=1;return true;});
    seen={};eggMoves=eggMoves.filter(function(n){if(seen[n])return false;seen[n]=1;return true;});
    seen={};tutMoves=tutMoves.filter(function(n){if(seen[n])return false;seen[n]=1;return true;});
  }
  var mvId = 'mv_' + slug.replace(/-/g,'_');
  var lvlH = lvlMoves.length ? lvlMoves.map(function(m){return '<tr><td class="lvl">'+(m.lvl||'—')+'</td><td class="mn">'+m.name+'</td></tr>';}).join('') : '<tr><td colspan="2" class="mv-empty">—</td></tr>';
  var eggH = eggMoves.length ? eggMoves.map(function(n){return '<tr><td class="mn" colspan="2">'+n+'</td></tr>';}).join('') : '<tr><td colspan="2" class="mv-empty">—</td></tr>';
  var tutH = tutMoves.length ? tutMoves.map(function(n){return '<tr><td class="mn" colspan="2">'+n+'</td></tr>';}).join('') : '<tr><td colspan="2" class="mv-empty">—</td></tr>';
  var movesHTML = '<div class="block"><div class="mv-tabs">' +
    '<button class="mv-tab on" onclick="mvTab(this,\''+mvId+'_lvl\')">Por Nível</button>' +
    '<button class="mv-tab" onclick="mvTab(this,\''+mvId+'_egg\')">Egg Moves</button>' +
    '<button class="mv-tab" onclick="mvTab(this,\''+mvId+'_tut\')">Tutor</button>' +
    '</div>' +
    '<div class="mv-panel on" id="'+mvId+'_lvl"><table class="mv-tbl"><thead><tr><th style="width:52px">Nv.</th><th>Move</th></tr></thead><tbody>'+lvlH+'</tbody></table></div>' +
    '<div class="mv-panel" id="'+mvId+'_egg"><table class="mv-tbl"><thead><tr><th colspan="2">Egg Move</th></tr></thead><tbody>'+eggH+'</tbody></table></div>' +
    '<div class="mv-panel" id="'+mvId+'_tut"><table class="mv-tbl"><thead><tr><th colspan="2">Tutor</th></tr></thead><tbody>'+tutH+'</tbody></table></div>' +
    '</div>';

  // Nav prev/next
  var sorted = allPokemon.slice().sort(function(a,b){return a.nome.localeCompare(b.nome,'pt-BR');});
  var idx = -1;
  for (var i=0;i<sorted.length;i++){if(slugify(sorted[i].nome)===slug){idx=i;break;}}
  var prev = idx > 0 ? sorted[idx-1] : null;
  var next = idx >= 0 && idx < sorted.length-1 ? sorted[idx+1] : null;
  var navPrev = prev ? '<button class="det-nav prev" onclick="openDetail(\''+slugify(prev.nome)+'\')"><span class="arr">‹</span><span class="nn">'+(prev.numero?'#'+String(prev.numero).padStart(3,'0'):'')+'</span><span class="nm">'+prev.nome+'</span></button>' : '';
  var navNext = next ? '<button class="det-nav next" onclick="openDetail(\''+slugify(next.nome)+'\')"><span class="arr">›</span><span class="nn">'+(next.numero?'#'+String(next.numero).padStart(3,'0'):'')+'</span><span class="nm">'+next.nome+'</span></button>' : '';

  var spriteUrl = p.sprite || (pokeData && pokeData.sprites && pokeData.sprites.other && pokeData.sprites.other['official-artwork'] ? pokeData.sprites.other['official-artwork'].front_default : null) || FALLBACK;

  root.innerHTML =
    '<div class="det-main">' +
      '<div class="det-sprite-col">' +
        (num ? '<div class="det-num">' + num + '</div>' : '') +
        '<img class="det-sprite" src="' + spriteUrl + '" alt="' + p.nome + '" onerror="this.src=\'' + FALLBACK + '\'"/>' +
        '<div class="det-type-icons">' + tipos.map(function(t){return '<img class="det-type-icon" src="https://raw.githubusercontent.com/partywhale/pokemon-type-icons/main/icons/'+t+'.svg" alt="'+t+'" onerror="this.style.display=\'none\'"/>';}).join('') + '</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center">' + (p.tipos||[]).map(tp).join('') + '</div>' +
        (rb(p.raridade) ? '<div style="margin-top:2px">' + rb(p.raridade) + '</div>' : '') +
      '</div>' +
      '<div class="det-info">' +
        '<div class="det-namebar">' + navPrev + p.nome + navNext + '</div>' +
        '<table class="det-table">' +
          (genus ? '<tr><td>Classificação</td><td>' + genus + '</td></tr>' : '') +
          '<tr><td>Altura</td><td>' + altura + '</td></tr>' +
          '<tr><td>Peso</td><td>' + peso + '</td></tr>' +
          '<tr><td>Gênero</td><td>' + genderStr + '</td></tr>' +
          (eggGroups ? '<tr><td>Egg Groups</td><td>' + eggGroups + '</td></tr>' : '') +
          (p.habilidade  ? '<tr><td>Habilidade 1</td><td>' + p.habilidade  + '</td></tr>' : '') +
          (p.habilidade2 ? '<tr><td>Habilidade 2</td><td>' + p.habilidade2 + '</td></tr>' : '') +
          (p.estacao  ? '<tr><td>Estação</td><td>' + p.estacao + '</td></tr>' : '') +
          (p.bioma    ? '<tr><td>Bioma</td><td>' + (Array.isArray(p.bioma) ? p.bioma.join(', ') : p.bioma) + '</td></tr>' : '') +
          (p.condicao ? '<tr><td>Condição</td><td style="color:#7a4a00;font-weight:700">' + p.condicao + '</td></tr>' : '') +
        '</table>' +
      '</div>' +
    '</div>' +
    rpgHTML + statsHTML + dmgHTML + bioHTML + evoHTML + movesHTML;
}

function mvTab(btn, panelId) {
  var block = btn.parentElement.parentElement;
  block.querySelectorAll('.mv-tab').forEach(function(t){t.classList.remove('on');});
  block.querySelectorAll('.mv-panel').forEach(function(p){p.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById(panelId).classList.add('on');
}

// THEME
var ESTILO_DEFAULT = {brand:'#1a3a5c',brandMid:'#2563a8',accent:'#e8a020',bg:'#f4f6fa',surface:'#fff',text:'#1a1f2e',fontTitle:"'Cinzel',serif",fontBody:"'Nunito',sans-serif",radius:'10px',customCss:''};
var TEMAS_SAZONAIS = {primavera:{brand:'#1a4a2a',brandMid:'#2e9e50',bg:'#f0fbf2',surface:'#fff',text:'#0a1e0e'},verao:{brand:'#7a3a00',brandMid:'#e07a10',bg:'#fffbf0',surface:'#fff',text:'#2a1500'},outono:{brand:'#3a1800',brandMid:'#a05020',bg:'#fff8f0',surface:'#fff',text:'#1e0e00'},inverno:{brand:'#0a1e3a',brandMid:'#3a80c8',bg:'#f0f6ff',surface:'#fff',text:'#0a1428'}};
function applyVars(e) {
  var r = document.documentElement;
  if (e.brand)     { r.style.setProperty('--brand', e.brand); navBrand = e.brand; }
  if (e.brandMid)  r.style.setProperty('--brand-mid', e.brandMid);
  if (e.accent)    r.style.setProperty('--accent', e.accent);
  if (e.bg)        r.style.setProperty('--bg', e.bg);
  if (e.surface)   r.style.setProperty('--surface', e.surface);
  if (e.text)      r.style.setProperty('--text', e.text);
  if (e.fontTitle) r.style.setProperty('--font-title', e.fontTitle);
  if (e.fontBody)  r.style.setProperty('--font-body', e.fontBody);
  if (e.radius)    r.style.setProperty('--r', e.radius);
  var tag = document.getElementById('custom-css-tag');
  if (!tag) { tag = document.createElement('style'); tag.id='custom-css-tag'; document.head.appendChild(tag); }
  tag.textContent = e.customCss || '';
}

// INIT
function init() {
  // Guaranteed fallback — always show page after 12s
  var failsafe = setTimeout(function() {
    hideLoading();
    showView('view-list');
    if (!allPokemon.length) {
      document.getElementById('output').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Erro ao carregar</h3><p>Verifique sua conexão e recarregue.</p></div>';
    }
  }, 12000);

  // Load theme
  Promise.all([
    sbFetch('configuracoes?chave=eq.estilo&select=valor&limit=1'),
    sbFetch('config?chave=eq.estacao_ativa&select=valor&limit=1')
  ]).then(function(results) {
    var styleData = results[0];
    var estData   = results[1];
    var style   = styleData && styleData[0] ? styleData[0].valor : null;
    var estacao = estData   && estData[0]   ? estData[0].valor   : null;
    var base = style ? Object.assign({}, ESTILO_DEFAULT, style) : ESTILO_DEFAULT;
    var saz  = estacao && TEMAS_SAZONAIS[estacao];
    applyVars(saz ? Object.assign({}, base, saz) : base);
  }).catch(function(){});

  // Load Pokémon
  setMsg('Carregando Pokémon…');
  fetchAllPages('select=id,nome,sprite,tipos,habilidade,habilidade2,raridade,genero,bioma,estacao,condicao,dado,ca,pv')
  .then(function(raw) {
    raw.sort(function(a,b){ return a.nome.localeCompare(b.nome,'pt-BR'); });
    allPokemon = deduplicate(raw);
    document.getElementById('ct').textContent = allPokemon.length;
    buildTabs();
    applyFilters();

    clearTimeout(failsafe);
    hideLoading();

    var params = new URLSearchParams(location.search);
    var ps = params.get('pokemon');
    if (ps) { showView('view-detail'); renderDetail(ps); }
    else    { showView('view-list'); }
  }).catch(function(e) {
    console.error(e);
    clearTimeout(failsafe);
    hideLoading();
    showView('view-list');
    document.getElementById('output').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Erro ao carregar</h3><p>Tente recarregar a página.</p></div>';
  });
}

init();
</script>

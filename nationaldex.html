<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Platinum — Pokédex Nacional</title>
<link rel="icon" type="image/x-icon" href="https://64.media.tumblr.com/c429cb57b048b0ba1d90c6451d7c3aa1/8607b48e6654212e-0d/s540x810/c1f9956cc78935a32f53346f3a7a942caa5d1d67.png">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#1a3a5c;--brand-mid:#2563a8;--brand-light:#e8f0fb;
  --accent:#e8a020;--accent-light:#fdf3dc;
  --bg:#808080;--surface:#fff;--surface2:#f0f3f8;
  --border:#dde3ee;--border2:#c8d0e0;
  --text:#1a1f2e;--muted:#6b7a99;
  --red:#c03030;--green:#1a7a1a;
  --r:10px;--font-title:'Cinzel',serif;--font-body:'Nunito',sans-serif;
}
html,body{min-height:100%;background:var(--bg);font-family:var(--font-body);color:var(--text)}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;background:var(--brand);position:sticky;top:0;z-index:9000}
.nav-logo{font-family:var(--font-title);font-size:16px;font-weight:700;color:#fff;letter-spacing:1px}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:4px}
.nav-link{font-size:13px;font-weight:600;font-family:var(--font-body);padding:7px 18px;border-radius:20px;border:none;background:transparent;color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center}
.nav-link:hover{background:rgba(255,255,255,.12);color:#fff}
.nav-link.active{background:rgba(255,255,255,.18);color:#fff}
.nav-back{font-size:12px;font-weight:700;font-family:var(--font-body);padding:7px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,.5);background:transparent;color:#fff;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.nav-back:hover{background:var(--accent);border-color:var(--accent)}

/* PAGE */
.page-wrap{max-width:1200px;margin:0 auto;padding:28px 24px}

/* PAGE HEADER */
.dex-header{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:24px 28px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.dex-header-left{display:flex;align-items:center;gap:14px}
.dex-header-icon{width:48px;height:48px;background:var(--brand-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:1.5px solid var(--border2)}
.dex-header-title{font-family:var(--font-title);font-size:20px;color:var(--brand);font-weight:700}
.dex-header-sub{font-size:12px;color:var(--muted);margin-top:2px}
.dex-count-badge{background:var(--accent-light);border:1.5px solid #e8c080;border-radius:20px;padding:5px 16px;font-family:var(--font-title);font-size:12px;color:#7a5010;font-weight:700;white-space:nowrap}

/* CONTROLS */
.dex-controls{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:400px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#search{width:100%;padding:9px 12px 9px 38px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-family:var(--font-body);font-size:13px;color:var(--text);transition:border .2s;outline:none}
#search:focus{border-color:var(--brand-mid)}
#search::placeholder{color:var(--muted)}
.ctrl-select{padding:9px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);font-family:var(--font-body);font-size:13px;color:var(--text);outline:none;cursor:pointer;transition:border .2s}
.ctrl-select:focus{border-color:var(--brand-mid)}
.view-toggle{display:flex;gap:4px;background:var(--surface2);border-radius:8px;padding:3px;margin-left:auto}
.view-btn{padding:6px 12px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:14px;transition:all .2s}
.view-btn.active{background:var(--surface);color:var(--brand-mid);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* LAYOUT */
.dex-layout{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start}

/* GRID */
.pokemon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}

/* CARD */
.pk-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 10px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:all .25s;animation:fadeUp .3s both;position:relative;text-align:center}
.pk-card:hover{border-color:var(--brand-mid);transform:translateY(-2px);box-shadow:0 4px 16px rgba(37,99,168,.14)}
.pk-card.active{border-color:var(--brand-mid);background:var(--brand-light);box-shadow:0 4px 16px rgba(37,99,168,.18)}
.pk-num{font-size:10px;font-weight:700;color:var(--muted);font-family:var(--font-title);letter-spacing:.5px;align-self:flex-end}
.pk-art{width:96px;height:96px;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.12));transition:transform .25s}
.pk-card:hover .pk-art{transform:scale(1.08)}
.pk-name{font-family:var(--font-title);font-size:10.5px;font-weight:600;color:var(--text);letter-spacing:.3px;line-height:1.3}
.pk-types{display:flex;gap:3px;flex-wrap:wrap;justify-content:center}

/* LIST VIEW */
.pokemon-list-view{display:flex;flex-direction:column;gap:6px}
.pk-list-row{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;animation:fadeUp .25s both}
.pk-list-row:hover{border-color:var(--brand-mid);background:var(--brand-light)}
.pk-list-row.active{border-color:var(--brand-mid);background:var(--brand-light)}
.pk-list-num{font-family:var(--font-title);font-size:10px;color:var(--muted);min-width:36px}
.pk-list-sprite{width:48px;height:48px;object-fit:contain}
.pk-list-name{font-family:var(--font-title);font-size:12px;color:var(--text);flex:1}
.pk-list-types{display:flex;gap:4px}

/* TYPE PILLS */
.type-pill{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px}
.detail-type-pill{display:inline-block;font-size:10px;font-weight:800;padding:3px 12px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}

/* DETAIL PANEL */
.detail-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);position:sticky;top:74px;max-height:calc(100vh - 90px);overflow-y:auto}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:320px;gap:12px;color:var(--muted)}
.detail-empty-icon{font-size:48px;opacity:.25}
.detail-empty-text{font-family:var(--font-title);font-size:11px;letter-spacing:.3px;text-align:center;line-height:1.8}

/* DETAIL HERO */
.detail-hero{padding:20px 18px 16px;border-bottom:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.detail-dex-num{font-family:var(--font-title);font-size:11px;color:var(--muted);letter-spacing:.5px}
.detail-art{width:150px;height:150px;object-fit:contain;filter:drop-shadow(0 8px 20px rgba(37,99,168,.18));transition:transform .3s;cursor:default}
.detail-art:hover{transform:scale(1.05)}
.detail-name{font-family:var(--font-title);font-size:17px;font-weight:700;color:var(--brand);letter-spacing:.5px}
.detail-genus{font-size:11px;color:var(--muted);font-style:italic}
.detail-types{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}

/* SHINY */
.shiny-row{display:flex;align-items:flex-end;gap:14px}
.shiny-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.shiny-thumb{width:50px;height:50px;object-fit:contain;opacity:.7;cursor:pointer;transition:opacity .2s;border-radius:50%;border:1.5px solid var(--border);padding:3px;background:var(--surface2)}
.shiny-thumb:hover{opacity:1;border-color:var(--accent)}
.shiny-lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.4px;font-family:var(--font-title)}

/* DETAIL BODY */
.detail-body{padding:16px 18px;display:flex;flex-direction:column;gap:16px}
.sec-title{font-family:var(--font-title);font-size:10px;font-weight:700;color:var(--brand-mid);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.info-cell{background:var(--surface2);border-radius:7px;padding:8px 10px}
.info-cell-lbl{font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.info-cell-val{font-family:var(--font-title);font-size:12px;color:var(--text);margin-top:2px}
.flavor-box{background:var(--surface2);border-left:3px solid var(--brand-mid);border-radius:0 7px 7px 0;padding:10px 14px;font-size:12px;color:var(--muted);line-height:1.6;font-style:italic}

/* STATS */
.stat-row{display:grid;grid-template-columns:68px 32px 1fr;gap:8px;align-items:center}
.stat-name{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;text-align:right}
.stat-num{font-family:var(--font-title);font-size:11px;color:var(--text);text-align:right}
.stat-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width .7s ease}

/* ABILITIES */
.ability-card{background:var(--surface2);border-radius:7px;padding:9px 12px}
.ability-name{font-family:var(--font-title);font-size:11px;color:var(--brand);margin-bottom:3px}
.ability-name.hidden{color:var(--accent)}
.ability-desc{font-size:11px;color:var(--muted);line-height:1.5}
.ha-tag{font-size:9px;font-weight:700;background:var(--accent-light);border:1px solid #e8c080;color:#7a5010;border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle}

/* EVO */
.evo-chain{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:2px}
.evo-node{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:7px;border-radius:8px;transition:background .2s}
.evo-node:hover{background:var(--surface2)}
.evo-node img{width:52px;height:52px;object-fit:contain}
.evo-node-name{font-family:var(--font-title);font-size:9px;color:var(--text);text-transform:uppercase;letter-spacing:.3px;text-align:center}
.evo-arrow{display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--muted);font-size:14px;padding:0 2px}
.evo-method{font-size:8.5px;color:var(--muted);text-align:center;max-width:46px;line-height:1.3;font-family:var(--font-title);letter-spacing:.2px}

/* DAMAGE */
.dmg-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.dmg-mult{font-family:var(--font-title);font-size:9.5px;color:var(--muted);min-width:22px;text-align:right;flex-shrink:0}
.dmg-types{display:flex;flex-wrap:wrap;gap:3px}

/* LOADING */
.spinner-wrap{display:flex;justify-content:center;align-items:center;padding:40px;gap:12px;flex-direction:column}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--brand-mid);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{font-family:var(--font-title);font-size:11px;color:var(--muted);letter-spacing:.4px}

/* ANIM */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* SCROLLBAR */
.detail-panel::-webkit-scrollbar{width:5px}
.detail-panel::-webkit-scrollbar-track{background:transparent}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* RESPONSIVE */
@media(max-width:900px){
  .dex-layout{grid-template-columns:1fr}
  .detail-panel{position:static;max-height:none}
}
@media(max-width:600px){
  .pokemon-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .dex-header{flex-direction:column;align-items:flex-start}
  .page-wrap{padding:16px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">PKMN <span>Kingdom Platinum</span></div>
  <div class="nav-links">
    <a class="nav-link active" href="#">Pokédex</a>
  </div>
  <a class="nav-back" href="javascript:history.back()">← Voltar ao Site</a>
</nav>

<div class="page-wrap">
  <div class="dex-header">
    <div class="dex-header-left">
      <div class="dex-header-icon">📖</div>
      <div>
        <div class="dex-header-title">Pokédex Nacional</div>
        <div class="dex-header-sub">Registro completo das criaturas do Reino</div>
      </div>
    </div>
    <div class="dex-count-badge" id="count-badge">Carregando…</div>
  </div>

  <div class="dex-controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="Buscar por nome ou número…" autocomplete="off">
    </div>
    <select class="ctrl-select" id="gen-filter">
      <option value="0">Todas as Gerações</option>
      <option value="1">Geração I (1–151)</option>
      <option value="2">Geração II (152–251)</option>
      <option value="3">Geração III (252–386)</option>
      <option value="4">Geração IV (387–493)</option>
      <option value="5">Geração V (494–649)</option>
      <option value="6">Geração VI (650–721)</option>
      <option value="7">Geração VII (722–809)</option>
      <option value="8">Geração VIII (810–905)</option>
      <option value="9">Geração IX (906–1025)</option>
    </select>
    <select class="ctrl-select" id="type-filter">
      <option value="">Todos os Tipos</option>
      <option value="normal">Normal</option>
      <option value="fire">Fogo</option>
      <option value="water">Água</option>
      <option value="grass">Grama</option>
      <option value="electric">Elétrico</option>
      <option value="ice">Gelo</option>
      <option value="fighting">Lutador</option>
      <option value="poison">Veneno</option>
      <option value="ground">Terra</option>
      <option value="flying">Voador</option>
      <option value="psychic">Psíquico</option>
      <option value="bug">Inseto</option>
      <option value="rock">Pedra</option>
      <option value="ghost">Fantasma</option>
      <option value="dragon">Dragão</option>
      <option value="dark">Sombrio</option>
      <option value="steel">Aço</option>
      <option value="fairy">Fada</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-grid" title="Grade" onclick="setView('grid')">⊞</button>
      <button class="view-btn" id="btn-list" title="Lista" onclick="setView('list')">☰</button>
    </div>
  </div>

  <div class="dex-layout">
    <div id="pokemon-container">
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-text">Carregando registros…</div>
      </div>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="detail-empty">
        <div class="detail-empty-icon">📖</div>
        <div class="detail-empty-text">Selecione um Pokémon<br>para consultar</div>
      </div>
    </div>
  </div>
</div>

<script>
const TYPE_LABEL = {
  normal:'Normal',fire:'Fogo',water:'Água',electric:'Elétrico',
  grass:'Grama',ice:'Gelo',fighting:'Lutador',poison:'Veneno',
  ground:'Terra',flying:'Voador',psychic:'Psíquico',bug:'Inseto',
  rock:'Pedra',ghost:'Fantasma',dragon:'Dragão',dark:'Sombrio',
  steel:'Aço',fairy:'Fada'
};
const TYPE_COLORS = {
  normal:{bg:'#c8c8a0',c:'#4a4a2a'},fire:{bg:'#ff9b4a',c:'#7a2a00'},
  water:{bg:'#6ab8ff',c:'#003a6a'},electric:{bg:'#ffe030',c:'#5a4a00'},
  grass:{bg:'#78d878',c:'#1a5a1a'},ice:{bg:'#96d8d8',c:'#1a4a4a'},
  fighting:{bg:'#c03030',c:'#fff'},poison:{bg:'#a060c0',c:'#fff'},
  ground:{bg:'#e0c060',c:'#3a2a00'},flying:{bg:'#88aaee',c:'#1a1a5a'},
  psychic:{bg:'#ff8fb0',c:'#6a0030'},bug:{bg:'#a0c020',c:'#2a3a00'},
  rock:{bg:'#b8a050',c:'#3a2a00'},ghost:{bg:'#9090c0',c:'#1a1a4a'},
  dragon:{bg:'#7060f0',c:'#fff'},dark:{bg:'#705040',c:'#fff'},
  steel:{bg:'#aababb',c:'#2a3a3a'},fairy:{bg:'#ffaad8',c:'#6a0050'}
};
const STAT_NAMES = {hp:'PV',attack:'Ataque',defense:'Defesa','special-attack':'At.Esp','special-defense':'Def.Esp',speed:'Veloc.'};
const STAT_COLORS = {hp:'#e05050',attack:'#e07030',defense:'#e0b030','special-attack':'#7070e0','special-defense':'#4aaa6a',speed:'#e04aaa'};
const GEN_RANGES = [[0,0],[1,151],[152,251],[252,386],[387,493],[494,649],[650,721],[722,809],[810,905],[906,1025]];
const TYPE_CHART = {
  normal:{rock:.5,ghost:0,steel:.5},
  fire:{fire:.5,water:.5,grass:2,ice:2,bug:2,rock:.5,dragon:.5,steel:2},
  water:{fire:2,water:.5,grass:.5,ground:2,rock:2,dragon:.5},
  electric:{water:2,electric:.5,grass:.5,ground:0,flying:2,dragon:.5},
  grass:{fire:.5,water:2,grass:.5,poison:.5,ground:2,flying:.5,bug:.5,rock:2,dragon:.5,steel:.5},
  ice:{fire:.5,water:.5,grass:2,ice:.5,ground:2,flying:2,dragon:2,steel:.5},
  fighting:{normal:2,ice:2,poison:.5,flying:.5,psychic:.5,bug:.5,rock:2,ghost:0,dark:2,steel:2,fairy:.5},
  poison:{grass:2,poison:.5,ground:.5,rock:.5,ghost:.5,steel:0,fairy:2},
  ground:{fire:2,electric:2,grass:.5,poison:2,flying:0,bug:.5,rock:2,steel:2},
  flying:{electric:.5,grass:2,fighting:2,bug:2,rock:.5,steel:.5},
  psychic:{fighting:2,poison:2,psychic:.5,dark:0,steel:.5},
  bug:{fire:.5,grass:2,fighting:.5,poison:.5,flying:.5,psychic:2,ghost:.5,dark:2,steel:.5,fairy:.5},
  rock:{fire:2,ice:2,fighting:.5,ground:.5,flying:2,bug:2,steel:.5},
  ghost:{normal:0,fighting:0,poison:.5,bug:.5,ghost:2,dark:.5},
  dragon:{dragon:2,steel:.5,fairy:0},
  dark:{fighting:.5,psychic:2,ghost:2,dark:.5,fairy:.5},
  steel:{fire:.5,water:.5,electric:.5,ice:2,rock:2,steel:.5,fairy:2},
  fairy:{fire:.5,fighting:2,poison:.5,dragon:2,dark:2,steel:.5}
};

let allPokemon=[], filtered=[], typeCache={}, detailCache={}, currentView='grid', selectedId=null;

function typePill(type, big=false) {
  const c = TYPE_COLORS[type]||{bg:'#999',c:'#fff'};
  const lbl = TYPE_LABEL[type]||type;
  return `<span class="${big?'detail-type-pill':'type-pill'}" style="background:${c.bg};color:${c.c}">${lbl.toUpperCase()}</span>`;
}

function calcDamage(types) {
  const mults={};
  for(const atk of Object.keys(TYPE_CHART)) mults[atk]=1;
  for(const def of types) for(const [atk,m] of Object.entries(TYPE_CHART)) if(TYPE_CHART[atk][def]!==undefined) mults[atk]*=TYPE_CHART[atk][def];
  const groups={0:[],0.25:[],0.5:[],2:[],4:[]};
  for(const [t,m] of Object.entries(mults)){const k=m===0?0:m<=0.26?0.25:m<=0.51?0.5:m<=1?null:m<=2?2:4;if(k!==null)groups[k].push(t);}
  return groups;
}

function statBar(name,val){
  const pct=Math.min(100,(val/255)*100);
  const color=STAT_COLORS[name]||'#aaa';
  return `<div class="stat-row"><span class="stat-name">${STAT_NAMES[name]||name}</span><span class="stat-num">${val}</span><div class="stat-track"><div class="stat-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}

async function fetchList(){
  const res=await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
  const data=await res.json();
  allPokemon=data.results.map((p,i)=>({...p,id:i+1}));
  filtered=[...allPokemon];
  document.getElementById('count-badge').textContent=`${allPokemon.length} Pokémon`;
  renderContainer();
}

function renderContainer(){
  const container=document.getElementById('pokemon-container');
  if(filtered.length===0){container.innerHTML=`<div class="spinner-wrap"><div class="spinner-text">Nenhum resultado encontrado</div></div>`;return;}
  if(currentView==='grid'){
    container.innerHTML=`<div class="pokemon-grid">${filtered.map((p,i)=>cardHTML(p,i)).join('')}</div>`;
  } else {
    container.innerHTML=`<div class="pokemon-list-view">${filtered.map((p,i)=>listRowHTML(p,i)).join('')}</div>`;
  }
  lazyLoadTypes();
}

function cardHTML(p,delay=0){
  const types=typeCache[p.id];
  const typesHTML=types?types.map(t=>typePill(t)).join(''):`<span style="font-size:10px;color:var(--muted)">…</span>`;
  const active=selectedId===p.id?'active':'';
  return `<div class="pk-card ${active}" data-id="${p.id}" onclick="selectPokemon(${p.id})" style="animation-delay:${Math.min(delay,20)*.03}s">
    <div class="pk-num">#${String(p.id).padStart(4,'0')}</div>
    <img class="pk-art" loading="lazy"
      src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png"
      onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"
      alt="${p.name}">
    <div class="pk-name">${p.name.replace(/-/g,' ').toUpperCase()}</div>
    <div class="pk-types" id="pk-types-${p.id}">${typesHTML}</div>
  </div>`;
}

function listRowHTML(p,delay=0){
  const types=typeCache[p.id];
  const typesHTML=types?types.map(t=>typePill(t)).join(''):'';
  const active=selectedId===p.id?'active':'';
  return `<div class="pk-list-row ${active}" data-id="${p.id}" onclick="selectPokemon(${p.id})" style="animation-delay:${Math.min(delay,10)*.02}s">
    <div class="pk-list-num">#${String(p.id).padStart(4,'0')}</div>
    <img class="pk-list-sprite" loading="lazy"
      src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png"
      onerror="this.src=''" alt="${p.name}">
    <div class="pk-list-name">${p.name.replace(/-/g,' ').toUpperCase()}</div>
    <div class="pk-list-types" id="pk-types-${p.id}">${typesHTML}</div>
  </div>`;
}

function lazyLoadTypes(){
  const toLoad=[...new Set(filtered.filter(p=>!typeCache[p.id]).map(p=>p.id))];
  const batches=[];
  for(let i=0;i<toLoad.length;i+=20) batches.push(toLoad.slice(i,i+20));
  batches.forEach((batch,i)=>{
    setTimeout(()=>{
      batch.forEach(async id=>{
        if(typeCache[id]) return;
        try{
          const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
          const d=await r.json();
          typeCache[id]=d.types.map(t=>t.type.name);
          const el=document.getElementById(`pk-types-${id}`);
          if(el) el.innerHTML=typeCache[id].map(t=>typePill(t)).join('');
        }catch{}
      });
    },i*400);
  });
}

async function selectPokemon(id){
  selectedId=id;
  document.querySelectorAll('[data-id]').forEach(el=>el.classList.toggle('active',parseInt(el.dataset.id)===id));
  const panel=document.getElementById('detail-panel');
  panel.innerHTML=`<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-text">Consultando registros…</div></div>`;
  try{
    if(!detailCache[id]){
      const [pRes,sRes]=await Promise.all([fetch(`https://pokeapi.co/api/v2/pokemon/${id}`),fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)]);
      const pData=await pRes.json(); const sData=await sRes.json();
      detailCache[id]={pData,sData};
      typeCache[id]=pData.types.map(t=>t.type.name);
      const el=document.getElementById(`pk-types-${id}`);
      if(el) el.innerHTML=typeCache[id].map(t=>typePill(t)).join('');
    }
    renderDetail(detailCache[id].pData,detailCache[id].sData);
  }catch(e){
    panel.innerHTML=`<div class="detail-empty"><div class="detail-empty-icon">⚠️</div><div class="detail-empty-text">Erro ao carregar dados</div></div>`;
  }
}

async function renderDetail(p,s){
  const panel=document.getElementById('detail-panel');
  const types=p.types.map(t=>t.type.name);
  const bst=p.stats.reduce((a,b)=>a+b.base_stat,0);
  const gr=s.gender_rate;
  let genderHtml=gr===-1?'⚲ Sem gênero':`<span style="color:#5588cc">♂ ${(100-(gr/8*100)).toFixed(0)}%</span> · <span style="color:#e070a0">♀ ${(gr/8*100).toFixed(0)}%</span>`;
  const eggs=s.egg_groups.map(e=>e.name.charAt(0).toUpperCase()+e.name.slice(1)).join(', ');
  let flavor=s.flavor_text_entries.find(f=>f.language.name==='pt-BR')||s.flavor_text_entries.find(f=>f.language.name==='pt')||s.flavor_text_entries.find(f=>f.language.name==='en');
  const flavorText=flavor?flavor.flavor_text.replace(/\f/g,' ').replace(/\n/g,' '):'';
  const genus=s.genera?.find(g=>g.language.name==='en')?.genus||'Pokémon';

  const abilitiesHtml=await Promise.all(p.abilities.map(async a=>{
    let desc='';
    try{const ar=await fetch(a.ability.url);const ad=await ar.json();const entry=ad.effect_entries.find(e=>e.language.name==='en');desc=entry?entry.short_effect:'';}catch{}
    const ha=a.is_hidden;
    return `<div class="ability-card"><div class="ability-name ${ha?'hidden':''}">${a.ability.name.toUpperCase().replace(/-/g,' ')}${ha?'<span class="ha-tag">HA</span>':''}</div><div class="ability-desc">${desc||'—'}</div></div>`;
  }));

  const dmg=calcDamage(types);
  const dmgHtml=[0,0.25,0.5,2,4].filter(k=>dmg[k]?.length).map(k=>`<div class="dmg-row"><span class="dmg-mult">×${k}</span><div class="dmg-types">${dmg[k].map(t=>typePill(t)).join('')}</div></div>`).join('');

  let evoHtml='';
  try{const cr=await fetch(s.evolution_chain.url);const cd=await cr.json();evoHtml=await buildEvo(cd.chain);}catch{}

  const tc=TYPE_COLORS[types[0]]||{bg:'#e8f0fb'};

  panel.innerHTML=`
    <div class="detail-hero" style="background:linear-gradient(150deg,${tc.bg}30 0%,var(--surface2) 100%)">
      <div class="detail-dex-num">#${String(p.id).padStart(4,'0')}</div>
      <div class="shiny-row">
        <div class="shiny-col">
          <img class="shiny-thumb" id="shiny-thumb"
            src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${p.id}.png"
            onclick="toggleShiny(${p.id})" title="Clique para ver Shiny" alt="shiny">
          <div class="shiny-lbl">✦ SHINY</div>
        </div>
        <img class="detail-art" id="detail-art"
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png"
          onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"
          alt="${p.name}">
      </div>
      <div class="detail-name">${p.name.replace(/-/g,' ').toUpperCase()}</div>
      <div class="detail-genus">${genus}</div>
      <div class="detail-types">${types.map(t=>typePill(t,true)).join('')}</div>
    </div>
    <div class="detail-body">
      <div>
        <div class="sec-title">Informações</div>
        <div class="info-grid">
          <div class="info-cell"><div class="info-cell-lbl">Altura</div><div class="info-cell-val">${p.height*10} cm</div></div>
          <div class="info-cell"><div class="info-cell-lbl">Peso</div><div class="info-cell-val">${(p.weight/10)} kg</div></div>
          <div class="info-cell"><div class="info-cell-lbl">Gênero</div><div class="info-cell-val" style="font-size:11px;font-family:var(--font-body)">${genderHtml}</div></div>
          <div class="info-cell"><div class="info-cell-lbl">Grupos de Ovo</div><div class="info-cell-val" style="font-size:11px">${eggs}</div></div>
        </div>
      </div>
      ${flavorText?`<div><div class="sec-title">Lore</div><div class="flavor-box">"${flavorText}"</div></div>`:''}
      <div>
        <div class="sec-title">Atributos Base <span style="font-size:9px;color:var(--muted);font-family:var(--font-body);margin-left:4px">BST ${bst}</span></div>
        <div style="display:flex;flex-direction:column;gap:6px">${p.stats.map(s=>statBar(s.stat.name,s.base_stat)).join('')}</div>
      </div>
      <div>
        <div class="sec-title">Habilidades</div>
        <div style="display:flex;flex-direction:column;gap:7px">${abilitiesHtml.join('')}</div>
      </div>
      ${dmgHtml?`<div><div class="sec-title">Fraquezas e Resistências</div><div style="display:flex;flex-direction:column;gap:7px">${dmgHtml}</div></div>`:''}
      ${evoHtml?`<div><div class="sec-title">Cadeia Evolutiva</div><div class="evo-chain">${evoHtml}</div></div>`:''}
    </div>`;
}

let shinyOn={};
function toggleShiny(id){
  const img=document.getElementById('detail-art');
  if(!img) return;
  shinyOn[id]=!shinyOn[id];
  img.src=shinyOn[id]
    ?`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/${id}.png`
    :`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
}

async function buildEvo(chain,nodes=[]){
  const name=chain.species.name;
  const id=chain.species.url.split('/').filter(Boolean).pop();
  const details=chain.evolution_details?.[0];
  nodes.push({name,id,details});
  if(chain.evolves_to.length===0){
    return nodes.map((n,i)=>{
      let arrow='';
      if(i>0&&n.details){
        const d=n.details;
        let method=d.min_level?`Nv.${d.min_level}`:d.item?d.item.name.replace(/-/g,' '):d.trigger?.name==='trade'?'Troca':d.happiness?`Ami.${d.min_happiness}`:d.trigger?.name||'';
        arrow=`<div class="evo-arrow">→<div class="evo-method">${method.toUpperCase()}</div></div>`;
      }
      return `${arrow}<div class="evo-node" onclick="selectPokemon(${n.id})"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${n.id}.png" alt="${n.name}"><span class="evo-node-name">${n.name.replace(/-/g,' ')}</span></div>`;
    }).join('');
  }
  return buildEvo(chain.evolves_to[0],nodes);
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const gen=parseInt(document.getElementById('gen-filter').value);
  const type=document.getElementById('type-filter').value;
  const [gMin,gMax]=gen===0?[1,9999]:GEN_RANGES[gen];
  filtered=allPokemon.filter(p=>{
    const nameMatch=!q||p.name.includes(q)||String(p.id).includes(q);
    const genMatch=p.id>=gMin&&p.id<=gMax;
    const typeMatch=!type||(typeCache[p.id]&&typeCache[p.id].includes(type));
    return nameMatch&&genMatch&&typeMatch;
  });
  document.getElementById('count-badge').textContent=`${filtered.length} Pokémon`;
  renderContainer();
}

document.getElementById('search').addEventListener('input',applyFilters);
document.getElementById('gen-filter').addEventListener('change',applyFilters);
document.getElementById('type-filter').addEventListener('change',applyFilters);

function setView(v){
  currentView=v;
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  renderContainer();
}

fetchList();
</script>
</body>
</html>

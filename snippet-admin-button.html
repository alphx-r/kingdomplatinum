<!--
  1) Botão — cole perto dos outros botões de migração
     (ex: perto de "⬇️ Banco antigo" / "🔄 Migrar JSON")
-->
<button class="btn btn-outline" onclick="runSpriteNormalization()" title="Padroniza o zoom dos sprites normal/shiny">
  🧼 Crop Sprites
</button>

<script>
/* ══════════════════════════════════════════
   NORMALIZAÇÃO DE SPRITES — corrige zoom inconsistente
   entre sprite normal/shiny, chamando /api/admin/normalize-sprite
   (que baixa, recorta e recentraliza, e sobe pro Storage).
   Ajuste TABLE_NAME e os nomes das colunas pro seu schema real.
══════════════════════════════════════════ */
const SPRITE_BUCKET = 'sprites'; // troque pelo nome do seu bucket, se for diferente

async function normalizeAndUpload(url, path) {
  const res = await fetch('/api/admin/normalize-sprite', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url, bucket: SPRITE_BUCKET, path })
  });
  const body = await res.json();
  if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
  return body.publicUrl;
}

async function runSpriteNormalization() {
  if (!confirm('Isso vai baixar, normalizar e re-subir os sprites de todos os Pokémon. Pode levar alguns minutos. Continuar?')) return;

  const TABLE_NAME = 'pokemons'; // ajuste se sua tabela tiver outro nome
  const rows = await sbSelect(TABLE_NAME);
  const withSprite = rows.filter(p => p.sprite || p.sprite_shiny);

  showProgress('Normalizando sprites');
  let done = 0;
  const erros = [];

  for (const p of withSprite) {
    try {
      const patch = {};
      if (p.sprite) {
        patch.sprite = await normalizeAndUpload(p.sprite, `normalized/${p.id}.png`);
      }
      if (p.sprite_shiny) {
        patch.sprite_shiny = await normalizeAndUpload(p.sprite_shiny, `normalized/${p.id}-shiny.png`);
      }
      if (Object.keys(patch).length) {
        await sbUpsert(TABLE_NAME, { id: p.id, ...patch });
      }
    } catch (e) {
      erros.push(`${p.id} (${p.name || '?'}): ${e.message}`);
    }
    done++;
    updateProgress(done, withSprite.length, p.name || p.id);
  }

  hideProgress();
  if (erros.length) {
    console.warn('Falhas na normalização:', erros);
    toast(`Concluído com ${erros.length} falha(s) — veja o console.`, 'err');
  } else {
    toast(`✓ ${done} sprites normalizados!`, 'ok');
  }
}
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MoveDex — Kingdom Platinum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#1a3a5c;--brand-mid:#2563a8;--brand-light:#e8f0fb;
  --accent:#e8a020;--accent-light:#fdf3dc;
  --surface:#fff;--surface2:#f0f3f8;
  --border:#dde3ee;--text:#1a1f2e;--muted:#6b7a99;
  --green:#2a7a2a;--red:#c0392b;

  /* ── tokens do tema "smartwatch" (mesmo do DataDex/NationalDex) ── */
  --deep:#050c18;--panel:#0c1a2c;--panel2:#0f2138;
  --cyan:#3fe8ff;--cyan-dim:rgba(63,232,255,.35);
  --magenta:#ff3fa0;--magenta-dim:rgba(255,63,160,.3);
  --line:rgba(63,232,255,.14);
  --ink:#cfe4f5;--ink-dim:#7b93ad;

  --r:12px;--font-title:'Cinzel',serif;--font-body:'Nunito',sans-serif;--font-mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{min-height:100%}
body{min-height:100vh;font-family:var(--font-body);color:var(--ink)}

html{
  background-image:
    radial-gradient(ellipse 900px 500px at 8% -5%, rgba(63,232,255,.10), transparent 60%),
    radial-gradient(ellipse 700px 600px at 100% 30%, rgba(255,63,160,.08), transparent 60%),
    repeating-linear-gradient(0deg, var(--line) 0 1px, transparent 1px 42px),
    repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 42px);
  background-color:var(--deep);
  background-attachment:fixed;
}

/* ══════════════ NAV ══════════════ */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;background:var(--brand);position:sticky;top:0;z-index:9000;border-bottom:1px solid rgba(63,232,255,.18);box-shadow:0 1px 24px rgba(0,0,0,.35)}
.nav-logo{font-family:var(--font-title);font-size:16px;font-weight:700;color:#fff;letter-spacing:1px;display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.nav-links{display:flex;gap:4px;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
.nav-link{font-size:13px;font-weight:600;font-family:var(--font-body);padding:7px 18px;border-radius:20px;border:none;background:transparent;color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center}
.nav-link:hover{background:rgba(255,255,255,.12);color:#fff}
.nav-link.active{background:rgba(255,255,255,.18);color:#fff}
.nav-link.locked{opacity:.4;cursor:not-allowed;pointer-events:none}
.nav-hamburger{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;width:36px;height:36px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);border-radius:8px;cursor:pointer;padding:0;flex-shrink:0}
.nav-hamburger span{display:block;width:18px;height:2px;background:#fff;border-radius:2px;transition:all .25s}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hamburger.open span:nth-child(2){opacity:0}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.nav-dropdown{display:none;position:absolute;top:58px;left:0;right:0;background:var(--brand);border-bottom:2px solid rgba(63,232,255,.18);z-index:8999;padding:10px 14px 14px;flex-direction:column;gap:4px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.nav-dropdown.open{display:flex}
.nav-dropdown .nav-link{width:100%;text-align:left;border-radius:8px;padding:10px 14px;font-size:13px}
@media(max-width:768px){.nav-links{display:none}.nav-hamburger{display:flex}}

/* ══════════════ HERO ══════════════ */
.hero{position:relative;padding:40px 24px 30px;text-align:center;overflow:hidden;border-bottom:1px solid var(--line)}
.hero-eyebrow{font-family:var(--font-mono);font-size:11px;color:var(--cyan);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;display:inline-flex;align-items:center;gap:8px}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:26px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan))}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--cyan),transparent)}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px 2px var(--cyan-dim);animation:pulse-dot 1.8s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.hero-title{font-family:var(--font-title);font-size:36px;font-weight:900;color:#fff;letter-spacing:3px;margin-bottom:8px;text-shadow:0 0 18px rgba(63,232,255,.35),0 2px 20px rgba(0,0,0,.4)}
.hero-title span{color:var(--cyan)}
.hero-sub{font-size:12px;color:var(--ink-dim);font-family:var(--font-mono);letter-spacing:1.5px;text-transform:uppercase}
.hero-scan{width:min(420px,80%);height:2px;margin:18px auto 0;position:relative;background:linear-gradient(90deg,transparent,var(--line),transparent);overflow:hidden;border-radius:2px}
.hero-scan::after{content:'';position:absolute;top:0;left:-30%;width:30%;height:100%;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scan 2.6s linear infinite}
@keyframes scan{from{left:-30%}to{left:100%}}

/* ══════════════ SEARCH / FILTER BAR ══════════════ */
.dex-wrap{max-width:1180px;margin:0 auto;padding:24px 20px 60px}
.search-bar{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1.5px solid var(--line);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sinput-wrap{position:relative;flex:1;min-width:200px}
.sinput-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-dim);pointer-events:none}
#search{width:100%;padding:9px 12px 9px 38px;border-radius:20px;border:1.5px solid var(--line);background:rgba(5,12,24,.5);font-family:var(--font-body);font-size:13px;color:var(--ink);outline:none;transition:border .2s}
#search:focus{border-color:var(--cyan)}
#search::placeholder{color:var(--ink-dim)}
.mfilter{padding:9px 14px;border-radius:8px;border:1.5px solid var(--line);background:rgba(5,12,24,.5);font-family:var(--font-body);font-size:13px;color:var(--ink);outline:none;cursor:pointer}
.mfilter option{background:var(--panel);color:var(--ink)}
.mfilter:focus{border-color:var(--cyan)}
.cpill{background:rgba(63,232,255,.08);border:1px solid var(--cyan-dim);border-radius:20px;padding:5px 16px;font-family:var(--font-mono);font-size:11px;color:var(--cyan);font-weight:700;white-space:nowrap;margin-left:auto;letter-spacing:.5px}

/* ══════════════ TABELA ══════════════ */
.table-card{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1.5px solid var(--line);border-radius:var(--r);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:760px}
thead th{position:sticky;top:0;background:#0a1626;font-family:var(--font-mono);font-size:10px;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;padding:12px 14px;text-align:left;border-bottom:1.5px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{background:#0d1c30}
thead th .sort-arrow{opacity:.35;margin-left:4px;font-size:9px}
thead th.sorted .sort-arrow{opacity:1;color:var(--cyan)}
tbody tr{border-bottom:1px solid rgba(63,232,255,.08);transition:background .15s}
tbody tr:hover{background:rgba(63,232,255,.05)}
tbody td{padding:10px 14px;font-size:13px;color:var(--ink);vertical-align:middle}
.mv-name{font-family:var(--font-title);font-weight:700;color:#fff;font-size:13px}
.mv-types{display:flex;gap:4px;flex-wrap:wrap}
.type-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-family:var(--font-mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#fff;white-space:nowrap}
.cat-pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-family:var(--font-mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.cat-physical{background:rgba(224,112,48,.16);color:#ff9860}
.cat-special{background:rgba(63,120,232,.16);color:#7ab0ff}
.cat-status{background:rgba(123,147,173,.16);color:var(--ink-dim)}
.mv-num{font-family:var(--font-mono);font-size:12px;color:var(--ink);text-align:center}
.mv-dash{color:var(--ink-dim);font-family:var(--font-mono)}
.mv-style{font-family:var(--font-mono);font-size:9px;color:var(--magenta);background:rgba(255,63,160,.08);border:1px solid var(--magenta-dim);padding:2px 7px;border-radius:10px;white-space:nowrap}
.mv-effect{color:var(--ink-dim);font-size:12px;max-width:340px;line-height:1.5}
.empty-msg{padding:60px 20px;text-align:center;color:var(--ink-dim);font-family:var(--font-mono);font-size:12px}
.spinner-wrap{padding:60px 20px;text-align:center}
.spinner{width:34px;height:34px;border:3px solid rgba(63,232,255,.15);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);letter-spacing:1px;text-transform:uppercase}

/* ── Mobile: cards empilhados no lugar da tabela ── */
@media(max-width:720px){
  .table-scroll{overflow-x:visible}
  table,thead,tbody,tr,td{display:block;width:100%}
  thead{display:none}
  table{min-width:0}
  tbody tr{border:1.5px solid var(--line);border-radius:10px;margin-bottom:10px;padding:12px 14px;background:rgba(15,33,56,.4)}
  tbody tr:hover{background:rgba(63,232,255,.06)}
  tbody td{padding:3px 0;border:none}
  td[data-lbl]{position:relative}
  td[data-lbl]::before{content:attr(data-lbl);display:inline-block;min-width:70px;font-family:var(--font-mono);font-size:9px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.5px;vertical-align:top;margin-right:8px}
  .mv-name-cell{display:flex !important;align-items:center;justify-content:space-between;margin-bottom:6px}
  .mv-name-cell::before{content:none !important}
}
@media(max-width:500px){.hero-title{font-size:28px}.dex-wrap{padding:16px 12px 40px}}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="https://kingdomplatinum.vercel.app"><img src="https://64.media.tumblr.com/bb526b9df0c7703d60a3e491a3f2ecf6/25947a08ea9632bf-74/s1280x1920/cff7702dac61e7830b197041196e3f7da571140b.pnj" style="height:35px;object-fit:contain" alt="Kingdom Platinum"></a>
  <div class="nav-links">
    <a class="nav-link" href="/datadex">Home</a>
    <a class="nav-link" href="/datadex/nationaldex">NationalDex</a>
    <a class="nav-link active" href="/datadex/movedex">MoveDex</a>
    <a class="nav-link" href="/datadex/abilitydex">AbilityDex</a>
    <a class="nav-link locked" title="Em breve">ItemDex</a>
  </div>
  <button class="nav-hamburger" id="nav-hamburger" onclick="toggleMobileMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="nav-dropdown" id="nav-dropdown">
  <a class="nav-link" href="/datadex">Home</a>
  <a class="nav-link" href="/datadex/nationaldex">NationalDex</a>
  <a class="nav-link active" href="/datadex/movedex">MoveDex</a>
  <a class="nav-link" href="/datadex/abilitydex">AbilityDex</a>
  <a class="nav-link locked" title="Em breve">ItemDex</a>
</div>

<div class="hero">
  <div class="hero-eyebrow"><span class="hero-dot"></span> Pokétch <span class="hero-dot"></span></div>
  <div class="hero-title">Move<span>Dex</span></div>
  <div class="hero-sub" id="hero-sub">Carregando golpes…</div>
  <div class="hero-scan"></div>
</div>

<div class="dex-wrap">
  <div class="search-bar">
    <div class="sinput-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Buscar golpe…" oninput="applyFilters()">
    </div>
    <select id="f-type" class="mfilter" onchange="applyFilters()"><option value="">Todos os tipos</option></select>
    <select id="f-cat" class="mfilter" onchange="applyFilters()">
      <option value="">Todas categorias</option>
      <option value="physical">Físico</option>
      <option value="special">Especial</option>
      <option value="status">Status</option>
    </select>
    <span class="cpill" id="count-pill">—</span>
  </div>

  <div class="table-card">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('name')" data-col="name">Golpe <span class="sort-arrow">▾</span></th>
            <th onclick="sortBy('type')" data-col="type">Tipo(s) <span class="sort-arrow">▾</span></th>
            <th onclick="sortBy('damage_class')" data-col="damage_class">Categoria <span class="sort-arrow">▾</span></th>
            <th onclick="sortBy('power')" data-col="power">Poder <span class="sort-arrow">▾</span></th>
            <th onclick="sortBy('accuracy')" data-col="accuracy">Precisão <span class="sort-arrow">▾</span></th>
            <th>Estilo</th>
            <th>Efeito</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7"><div class="spinner-wrap"><div class="spinner"></div><div class="spinner-text">Carregando MoveDex…</div></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SUPA_URL='https://fatdzivyqipmcbzaiftc.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhdGR6aXZ5cWlwbWNiemFpZnRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTMyNDAsImV4cCI6MjA5ODQyOTI0MH0.0SRPZt1RYSpEbPQazv7ttHJBZNDOyIax2YRO49bvpmE';
const SH={apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY};

const TYPE_COLORS={
  normal:'#9a9a78',fire:'#e06820',water:'#2a80c8',electric:'#c8a000',grass:'#3a8a3a',
  ice:'#3a9090',fighting:'#b02020',poison:'#8040a8',ground:'#a07820',flying:'#4a6ab8',
  psychic:'#c83060',bug:'#608010',rock:'#806830',ghost:'#5858a0',dragon:'#5030d0',
  dark:'#503828',steel:'#6a8888',fairy:'#c060a0',light:'#c8a800',scent:'#e070c0'
};
const CAT_LABEL={physical:'Físico',special:'Especial',status:'Status'};

async function sbFetchAllPages(url,headers,pageSize=1000){
  let all=[],from=0;
  while(true){
    const sep=url.includes('?')?'&':'?';
    const res=await fetch(`${url}${sep}limit=${pageSize}&offset=${from}`,{headers});
    if(!res.ok) break;
    const chunk=await res.json();
    all=all.concat(chunk);
    if(chunk.length<pageSize) break;
    from+=pageSize;
  }
  return all;
}

let ALL=[], sortCol='name', sortDir=1;

function typePillHtml(t){
  if(!t) return '';
  const c=TYPE_COLORS[t]||'#888';
  return `<span class="type-pill" style="background:${c}">${t}</span>`;
}
function catPillHtml(c){
  if(!c) return '<span class="mv-dash">—</span>';
  return `<span class="cat-pill cat-${c}">${CAT_LABEL[c]||c}</span>`;
}

function rowHtml(m){
  const types=[m.type,m.type2].filter(Boolean).map(typePillHtml).join('');
  const power=(m.power===null||m.power===undefined)?'<span class="mv-dash">—</span>':m.power;
  const acc=(m.accuracy===null||m.accuracy===undefined)?'<span class="mv-dash">—</span>':`${m.accuracy}%`;
  const style=m.contest_style?`<span class="mv-style">${m.contest_style}</span>`:'<span class="mv-dash">—</span>';
  const nameLabel=(m.name||'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  return `<tr>
    <td data-lbl="Golpe" class="mv-name-cell"><span class="mv-name">${nameLabel}</span></td>
    <td data-lbl="Tipo(s)"><div class="mv-types">${types}</div></td>
    <td data-lbl="Categoria">${catPillHtml(m.damage_class)}</td>
    <td data-lbl="Poder" class="mv-num">${power}</td>
    <td data-lbl="Precisão" class="mv-num">${acc}</td>
    <td data-lbl="Estilo">${style}</td>
    <td data-lbl="Efeito" class="mv-effect">${m.descricao||'<span class="mv-dash">—</span>'}</td>
  </tr>`;
}

function render(){
  const tbody=document.getElementById('tbody');
  const q=document.getElementById('search').value.trim().toLowerCase();
  const fType=document.getElementById('f-type').value;
  const fCat=document.getElementById('f-cat').value;

  let list=ALL.filter(m=>{
    if(q){
      const nameLabel=(m.name||'').replace(/-/g,' ');
      if(!nameLabel.toLowerCase().includes(q) && !(m.descricao||'').toLowerCase().includes(q)) return false;
    }
    if(fType && m.type!==fType && m.type2!==fType) return false;
    if(fCat && m.damage_class!==fCat) return false;
    return true;
  });

  list.sort((a,b)=>{
    let av=a[sortCol], bv=b[sortCol];
    if(sortCol==='name'){ av=(av||'').toLowerCase(); bv=(bv||'').toLowerCase(); }
    if(sortCol==='power'||sortCol==='accuracy'){ av=(av===null||av===undefined)?-1:av; bv=(bv===null||bv===undefined)?-1:bv; }
    if(av<bv) return -1*sortDir;
    if(av>bv) return 1*sortDir;
    return 0;
  });

  document.getElementById('count-pill').textContent=`${list.length} de ${ALL.length} golpes`;
  tbody.innerHTML = list.length ? list.map(rowHtml).join('') : `<tr><td colspan="7"><div class="empty-msg">Nenhum golpe encontrado.</div></td></tr>`;

  document.querySelectorAll('thead th[data-col]').forEach(th=>{
    th.classList.toggle('sorted', th.dataset.col===sortCol);
    th.querySelector('.sort-arrow').textContent = (th.dataset.col===sortCol) ? (sortDir===1?'▾':'▴') : '▾';
  });
}
function applyFilters(){ render(); }
function sortBy(col){
  if(sortCol===col){ sortDir*=-1; } else { sortCol=col; sortDir=1; }
  render();
}

function populateTypeFilter(){
  const sel=document.getElementById('f-type');
  const types=[...new Set(ALL.flatMap(m=>[m.type,m.type2].filter(Boolean)))].sort();
  sel.innerHTML='<option value="">Todos os tipos</option>'+types.map(t=>`<option value="${t}">${t}</option>`).join('');
}

async function init(){
  try{
    ALL=await sbFetchAllPages(`${SUPA_URL}/rest/v1/moves?select=*&approved=eq.true`,SH);
  }catch(e){
    ALL=[];
  }
  document.getElementById('hero-sub').textContent=`${ALL.length} golpes catalogados`;
  populateTypeFilter();
  render();
}
init();

// ── Menu mobile (hamburger) ──
function toggleMobileMenu(){
  const btn=document.getElementById('nav-hamburger');
  const drop=document.getElementById('nav-dropdown');
  btn.classList.toggle('open');
  drop.classList.toggle('open');
}
document.addEventListener('click',function(e){
  const btn=document.getElementById('nav-hamburger');
  const drop=document.getElementById('nav-dropdown');
  if(btn&&drop&&!btn.contains(e.target)&&!drop.contains(e.target)){
    btn.classList.remove('open');
    drop.classList.remove('open');
  }
});
</script>
</body>
</html>
